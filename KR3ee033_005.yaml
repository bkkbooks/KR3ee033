body:
  text: 卷五臨産門臨産將息之法婦人良方曰妊娠至臨月當安神定慮時常步履不可多睡飽食過飲酒醴雜藥欲産時不可多人喧鬨愴惶若見漿水腰間痛甚是胎已離經方用藥催生坐草不可早服催生藥早坐草慎之臨産調和用藥之法薛立齋曰欲産時覺腹內轉動即當正身仰臥待兒轉身向下時作痛試捏産母手中指中節或本節跳動方臨盆即産若初覺不可仰臥以待轉胞或未産而水頻下此胞衣已破血水先干必有逆生難産之意若胞衣破不得分娩用保生無憂散以固其血如血已耗損八珍湯加益母草濃煎時飲之凡孕婦止腹痛未産也連腰痛者將産也腎候於腰胞系於腎故也凡孕有生息不順宜囑穩婆只説未産或遇雙胎只説胞衣恐驚則氣散愈難生息大抵難産多患鬱悶安逸富貴之家治法雖云胎前順氣産後補血不可轉機若脾胃不實氣血不充宜預調補之臨産預備必用之藥婦人良方曰花蕊石散為血入胞衣脹大不能下或惡露上攻佛手散治血虛危證加味芎歸湯入龜板治交骨不開萆麻子治胎衣不下失笑散治惡露腹痛不醒人事麻油調滑石塗入産門為滑胎之聖藥清魂聖治血暈諸證平胃散朴硝水銀為腐化死胎之劑皆為臨産時緊要之藥也若氣血虛損以八珍十全湯加減臨産腹痛宜辨弄胎試胎二候便産須知曰臨月或腹痛或作或止或一二日三五日胎水已來腹痛無已時名曰弄胎非當産也又有一月前忽然腹痛如欲便生名曰試胎非當産也凡腹痛胎水來與不來但不妨事但覺寬心候時若果當生痛極不已腰間重脹穀道挺並漿水淋下其兒遂生蓋産自有時如果熟香飄瓜熟蒂落是也慎齋按已上四條序臨産時有將息調護之法有預備必用之藥若弄胎試胎一條亦臨産或有之事不可愴惶鹵莽反致有害也難産由於安逸氣滯大全良方曰婦人以血為主惟氣順則血和胎安則産順今富貴之家過於安逸以致氣滯而胎不轉或為交合使精血聚於胞中皆致難産也難産由於恐懼氣結許叔微曰有産纍日不下服催生藥不驗此必坐草太早心懼而氣結不行也經云恐則氣下恐則精怯怯則上焦閉閉則氣還還則下焦脹氣乃不行得紫蘇飲一服便産難産由於胞中敗血壅滯郭稽中曰産難者因兒轉身將兒枕血破碎與胞中敗血壅滯兒身不能便利是以難産急服勝金散消其血則兒易生矣難産由於胞破血乾陳無擇曰難産多因兒未轉順坐草太早或努力太過以致胞衣破而血水乾産路滯而兒難下宜先服催生如神散以固其血難産由於妊孕房事不謹虞天民曰或問丹溪所謂難産之婦多是八九個月內不能謹慎以致氣血虛故也其旨何與曰婦人有娠不宜與丈夫同寢今人未知此理至八九月內猶有房室夫情欲一動氣血隨耗胎孕全賴氣血培養氣血既虧則胎息羸弱日月既足即欲分娩拆胞求路而出胞破之後胞中漿水沛然下流胎息強健者即翻隨漿而下此為易産胎息倦弱者轉頭遲慢不能隨漿而出胞漿既干汙血閉塞生路子無所向遂致橫生逆産急服催生藥逐去惡血道路通達庶速産也慎齋按已上五條序臨産時有難産之患也難産之由在平時則有安逸氣滯有心恐氣結有房事不謹在將産則有敗血壅滯有胞漿乾涸大要不外此數證治難産胞漿干令通上下之氣大全曰胞漿先破惡水來多胎幹不得下先與四物補養氣血次煎濃蔥湯令穩婆洗産戶令氣上下通暢更用酥油滑石塗産門次服神妙乳砂丹或葵子如聖散治難産以順氣和血為主女科正宗曰有因母氣血盛胎肥而難産者有因母氣弱血枯澀而難産者悉是平時不善調攝或七八月犯房室致汙濁凝滯不得順生大法以順氣和血為主如漿幹不下者滋潤為主汙血阻滯者逐瘀為主如坐草用力早胞水乾者滑胎散神應散連進大劑如魚得水自順矣治産難子死腹中有下法陳良甫曰産難子死腹中者多因驚動太早或觸犯禁忌致令産難胞漿已破無血養胎枯涸而死故也須驗産母之舌若舌青黑者其胎已死當下之平胃散加朴硝薛立齋曰若胎死服朴硝下穢水肢體倦怠氣息奄奄急用四君子為主佐以四物加薑桂調補之慎齋按已上三條序治難産之大法也難産治法或開滑子宮或通上下之氣或滋養氣血當隨機應變若胎死腹中惟有下法下後當從立齋之言為是不可不知交骨不開産門不閉子宮不收三證薛立齋曰三者皆由元氣素弱胎前失於調理致氣血不能運行而然交骨不開者陰血虛也佛手散加龜板産門不閉者氣血虛也十全大補湯加五味子收之子宮不收者補中益氣加醋炒白芍五味如初産腫脹痛而不閉者加味逍遙散若腫既消而不閉者補中湯加半夏蒸苓以健脾使元氣復而諸疾自愈切忌寒涼之劑又曰交骨不開者陰氣虛也龜為至陰版則交錯相解故用之又有間骨膏明乳香一兩五月五日研細豬血為丸如雞豆大辰砂為衣加味佛手散送下單養賢曰産後見此三證總服生花湯如交骨不開加龜板一枚盤腸生便産須知曰盤腸生者臨産子腸先出然後産子則腸不收名曰盤腸産穩婆以醋水各半盞默噴産婦之面腸即收上又古方用萆麻子仁四十九粒研塗産母頭頂腸即收上急洗去其腸若干不收以磨刀水少許溫潤之若以水噴而恐驚則氣散愈難收也腸乾者濃煎黃耆湯浸其腸於漆盤中溫暖熏之即收李太素按盤腸生是必母氣血虛弱因而下脫當用補氣補血之藥兼以升提則腸自收矣大劑參耆芎歸加升麻慎齋按已上二條序交骨不開盤腸生是難産中之見證也難産不知此二證橫逆産法在穩婆妙手其用藥亦不外後條諸法寒月凍産宜暖楊子建曰凍産者冬月天冷産母經血得冷則凝致兒不能下此害最深故冬月産者下部不可脫去綿衣並不可坐臥寒處使滿房圍爐常有暖氣令産母背身向火臍下腿膝間常暖血得熱則散兒易生也夏月熱産宜涼楊子建曰熱産者盛夏之月産婦要溫涼得所不可任意取涼傷損胎氣産室不可多人熱氣逼襲致産母心煩血熱沸騰有鬱冒沖暈之患慎齋按楊子建有十産論俱不可不知但八條悉屬産母與穩婆之事故不盡録其凍産熱産二條惟在醫者用藥調護因節取之豫謂古方臨産用藥最多丹溪云只用佛手散最穩當又效捷後讀單養賢産寶新書有生化湯一方為産後加減今當以二方為主如寒月凍産多用肉桂乳香夏月熱産多加辰砂益元散均用童便半盞衝入人參量産婦元氣虛實多寡加之可也催生藥宜助氣血為主楊子建曰催生者言欲産時兒頭至産門方服藥催之或經日久産母困倦難生宜服藥以助血氣令兒速生也催生大法大全曰大法滑以流通滯澀苦以驅逐閉塞香以開竅逐血氣滯者行氣胞漿先破血乾者滋血慎齋按大全云滑以流通澀滯者如車前滑石鳳仙子蜀葵子麻油香油白蜜牛乳豬脂之屬皆滑劑也苦以驅逐閉塞者如桃仁乾薑赤芍厚朴朴硝大黃之屬皆苦劑也香以開竅者如乳香麝香白芷肉桂之屬皆香劑也氣滯則香附枳殼陳皮烏藥青皮皆順氣之劑也血乾則當歸川芎益母紅花丹參之屬皆滋血也催生用藥諸方女科正宗曰催方多用滑利迅速之藥古方有兔腦蛇蛻筆尖弩牙急性子之類皆一時妙用惟佛手散為至當不易至如手握石燕足貼萆麻子道乾澀則用葵子榆白皮豬脂蔥油蜜牛乳以潤之天寒風冷使氣血凝滯則用乳香麝香之類以香能開竅逐汙也慎齋按已上三條序催生用藥之大略也催生古方甚多有不甚穩者概刪之産後脈叔和曰産後寸口洪疾不調者死沉微附骨不絶者生又曰沉小滑者生實大堅弦急者死朱丹溪曰胎前脈當洪數既産而脈仍洪數者死又曰胎前脈細小産後脈洪大者多死産後之脈貴虛濟生産經曰胎前之病其脈貴實産後之病其脈貴虛胎前則順氣安胎産後則扶虛消瘀此大要也産後辨生死之法脈要曰欲産之脈必見離經或沉細而滑夜半覺痛來朝日中必娩新産之脈緩滑為吉若實大弦急近乎無胃凶危之候或寸口澀疾不調惡證立見惟宜細沉附骨不絶雖劇無恙潘碩甫曰臨産氣血動蕩胞胎迸裂與常經離異必有水先下俗謂之胞漿養胎之液也水下則胞裂而産及已産氣血兩虛脈宜緩滑緩則舒徐不因氣奪而急促滑則流利不因血去而枯澀均吉兆也若實大弦牢非産後氣血兩虛所宜實為邪實大為邪進弦為陰斂宣布不能牢為堅著皆相逆之脈也慎齋按已上三條序新産之脈有吉凶之別婦人良方自臨産將息一條至此序難産催生用藥立齋云産難既明須知産後疾病因遵良方之法序後諸證於下新産下有調理之法大全曰凡産畢飲熱童便一盞不得便臥宜閉目而坐須臾上床宜仰坐不宜側坐宜豎膝不宜伸足高倚床頭厚鋪裀褥遮圍四壁使無孔隙免致賊風以醋塗鼻或燒用醋炭更燒漆器頻以手從心擀至臍下以防血暈血逆如此三日不問腹痛不痛以童便和酒溫服五七次酒雖行血亦不可多恐引血入四肢能令血暈宜頻食白粥漸食羊肉豬蹄少許仍慎言語七情寒暑梳頭洗足以百日為度若氣血素弱者不計月日否則患手足腰腿痠痛等證名曰蓐勞最難治療初産時不可問是男是女恐因言語而泄氣或以愛憎而動氣皆能致病不可獨宿恐致虛驚不可刮舌恐傷心氣不可刷齒恐致血逆須氣血平復方可治事犯時微若秋毫成病重如山嶽可不戒哉慎齋按已上一條序新産下調理之法古人垂誡周詳後人守此調護安有産後諸疾此在人事宜慎非醫者事也新産婦有三病張仲景曰問新産婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新産血虛多汗出喜中風故令病痙亡血復汗多故令鬱冒亡津液胃躁故令大便難産後十二癥病千金方曰婦人産後十二癥病帶下無子皆是風冷寒氣或産後未滿百日胞絡惡血未盡便利於懸圊及久坐寒濕入胞里結在小腹牢痛積聚小如雞子大者如拳按之跳手隱隱然或如蟲齧或如針刺氣時搶心兩脅支滿不能食食飲不消産後十八證大全曰産後十八證一曰因熱病胎死腹中二曰難産三曰胞衣不下四曰血暈五曰口乾心悶六曰乍寒乍熱七曰虛痛八曰乍見鬼神九曰月內不語十曰腹痛泄瀉十一曰遍身疼痛十二曰血崩十三曰血氣不通咳嗽十四曰寒熱心痛月候不來十六曰口鼻黑氣及鼻衄十七曰喉中氣喘急上二證俱不治十八曰中風産後危證有三沖三急張飛疇曰産後諸證非行血則邪不去即諸虛證亦須血行其氣乃復第行之有方不可過峻凡産後危症莫如三沖三急三沖者敗血沖肺衝心沖胃也三急者新産之嘔吐泄瀉多汗也其用藥則有三禁佛手散以川芎能發汗也禁四物湯以地黃能作瀉也禁小柴胡以黃芩能阻惡露也禁然皆産後常法設有風寒發熱喘脹下痢危急證後亦將守此致令坐斃乎古人未嘗不用汗下不用寒涼而暴病勢緊不得不猛治者下手稍軟畏縮逡巡去生便遠惟病氣久衰者非但不可峻攻亦不可峻補必緩劑輕劑以俟胃氣之復耳産後諸證其源有三方約之曰産後之證多端其源有三曰血虛火動曰敗血妄行曰飲食過傷何以明之氣屬陽血屬陰産後去血過多血虛火動為煩躁發熱之類一也虛火上載敗血妄行為頭暈腹痛之類二也經云少火生氣壯火食氣東垣云火為元氣之賊産後火傷元氣脾胃虛弱若飲食過傷為痞滿泄滿之類三也治法血虛火動則補之敗血妄行則散之飲食過傷則消之但人元氣有虛實疾病有淺深治療有難易又不可一概論也慎齋按已上五條序婦人新産後有諸證之變現也産後見證多端仲景下三條其大略也約之一條尤為切要而産後犯之者衆但云壯火食氣産後火傷元氣致脾胃虛弱飲食過傷為痞瀉證夫産後之火虛乎實乎況痞滿泄瀉亦不專主壯火為害也立論不能無弊産戒産後戒食湯孫真人曰産後七日內惡血未盡不可服湯候臍下塊散乃進羊肉湯有痛甚者不在此例候二三日消息可服澤蘭丸産後戒飲酒産寶曰才産不得與酒緣酒引血迸入四肢産母臟腑方虛不禁酒力熱酒入腹必致昏悶不可多飲時呷少許可以避風邪養氣血下惡露行乳汁也産後戒服童便胎産須知曰新産後童便不宜亂服大全云産畢可飲熱童便一盞即一熱字或與藥同服或與酒同服童便有益陰降火之功無寒涼凝瘀之患則童便不宜單服明矣況童便必擇清白無臭味者佳若黃濁不堪則氣既混雜味亦腥膻此時産母氣血已虛胃氣甚薄飲之必至嘔惡泄瀉非徒無益而反害之産後戒食雞子夥鹽朱丹溪曰初産之婦將護之法不可失宜肉汁發陰經之火易成肉傷先哲具有訓戒何以羊雞濃汁作糜服乎若兒初産母腹頓虛便啖雞子且吃夥鹽不思雞子難化夥鹽發熱必須卻去夥鹽諸食肉與白粥將理以鯗魚淡煮食半月後方少與肉雞子豁開淡煮大能養胃卻疾也産後戒早行房孫千金曰凡産後滿百日乃可會合不爾至死虛羸百疾滋長慎之凡婦人患風氣臍下虛冷莫不由早行房故也慎齋按已上五條序産後有飲食起居之戒也新産調理已載大全一條之內而飲食之不節起居之不慎此五者人所易犯故再序以示人節戒之意産後戒用發表一切不可用風藥朱丹溪曰産後一切病皆不可發表産後病多是血虛故不可用風藥發表出汗産後戒服黑神散熱藥論張子和曰婦人産余之疾皆是敗血惡物發作寒熱臍腹撮痛食飲稍減醫者不察謂産後氣血俱虛便用溫熱之劑養血補虛止作寒治舉世皆然豈知婦人之孕如天地孕物物以陰陽和合而後孕偏陰偏陽豈有孕乎此與禾黍瓜果之屬何異水旱不時華之與實俱萎落矣此又與孕而不育者何異七月立秋後十八日寸草不結者天寒故也婦人妊娠終十月無難而生反謂之寒何不察理之甚也竊譬之治磚者炎火在下以水沃窯之顛遂成磚矣磚既出窯窯頓寒矣世俗竟傳黑神散治産後十八證非徒不愈經脈閉涸前後淋閟嘔吐痰嗽凡百熱症生矣若此誤死者不可勝計曷若四物以涼膈散對飲以作湯劑下之利以數行惡物俱盡後服甘淡之劑自愈慎齋按子和以産後不可服熱藥而以治磚為喻夫磚未出窯其熱為實熱磚既出窯則熱為虛熱矣胎在腹當用清熱養血胎既産惡露行而氣血虛虛則生寒黑神散固不可多服久服而任以涼膈散大黃連翹之苦寒則誤矣矯枉之論殊未盡善産後戒服黑神散致病論朱丹溪曰或問初産之婦好血已虧汙血或留彼黑神散非要藥乎答曰至哉坤元萬物資生理之常也初産之婦好血未必虧汙血未必積臟腑未必寒何以藥為飲食起居勤加調護何病之有誠有汙血體怯而寒服之或可若有他病當求病起何因病在何經氣病治氣血病治血寒者溫之熱者清之凝者行之虛者補之血多者止之何用海制此方例令服餌不恤無病生病彼黑神散用乾薑當歸之溫熱黑豆之甘熟地之厚以補血之虛佐以炒蒲黃防出血之多芍藥之酸寒有收有散為四藥之助肉桂大辛熱以行滯血和以甘草之緩其取用似乎精密然驅逐與補益似難同方施治設有性急者形瘦者本有怒火者夏月坐蓐者時在火令薑桂皆為禁藥雖是補劑並有偏勝臟腑無寒何處消受必教卻去黑神散彼富貴之家驕姿之婦卒有白帶頭風氣痛膈滿痰逆口乾經事不調發禿體倦皆是陽盛陰虛之候天生氣血本自和平曰盛曰虛又烏知非此等迷謬有以兆之耶張嶟璜按新産婦有稟質瘦熱素有鬱火積熱多産衝任血枯脈澀一經産後兒枕作痛粗工膠執古方妄投肉桂禍不旋踵故必嚴寒凍産風冷乘虛血瘀不行方投肉桂以通行血脈也産後戒服五積散論朱丹溪曰局方五積散言治産後余血作痛方中以蒼朮為君麻黃為臣厚朴枳殼為佐雖有芍藥當歸之補血僅及蒼朮三分之一且方中言婦人血氣不調心腹撮痛閉而不行並宜服之何不思産後之婦有何實耶血氣未充似難發汗借曰推陳致新藥性溫和豈可借用麻黃之散附以蒼朮枳殼虛而又虛禍不旋踵矣産後用白芍藥宜制妙論虞天民曰問婦人産後諸疾古方多用四物湯加減而丹溪獨謂芍藥酸寒伐生髮之氣禁而不用何歟曰新産之婦血氣俱虛但存秋令肅煞之令少春夏生髮之氣故産後諸病多不利於寒涼之劑大宜溫熱之藥以助資始資生之化源也先哲制四物湯以芎歸之辛溫佐以地芍之寒是寒溫適中為婦人諸疾妙劑若用於産後必取白芍藥以酒重復制炒去其酸寒之性但存生血活血之能胡不可用也後人傳寫既久脫去制炒注文丹溪慮俗醫鹵莽不制而用之故特舉其為害之由以戒之耳産後宜用芍藥論張景嶽曰按丹溪云芍藥酸寒大伐發生之氣産後忌之此亦言之過也夫芍藥之寒不過於生血藥中稍覺其清耳非若芩連輩之大苦大寒也使芍藥猶忌如此則他藥之更寒者更不可用矣豫每見産家過慎或因太暖或因年力方壯飲食藥餌大補過度以致産後動火病熱極多若盡以産後為虛必須皆補豈盡善哉且芍藥性清微酸而收最宜於陰氣失散之證豈不為産後要藥乎不可不解也産後戒不可遽用參耆單養賢曰凡産後服生化湯加人參須血崩血暈形色俱脫者加之若無虛脫形證不可加若有血塊痛甚不移處止加紅花肉桂切不可用參耆術補氣天人命也慎齋按已上七條序産後有用藥之戒也産後病誤治者多用藥之際不可不詳慎産後先消瘀血為第一義葉以潛曰良方云産後以去敗血為先血滯不快乃成諸病夫産後元氣既虧運行失度不免瘀血停留治者必先逐瘀瘀消然後方可行補此第一義也今人一見産後有內虛證遽用參耆甘溫之劑以致瘀血攻心而死慎之慎齋按已上一條序産後有先消瘀之治也産後證虛者固多而虛中見實莫如瘀血停滯一證為吃緊此條最宜留意産後不可作諸虛不足治張子和曰産後慎不可作諸虛不足治必變作骨蒸寒熱飲食不入肌膚瘦削經水不行經曰寒則衰飲食熱則消肌肉人病瘦削皆粗工以藥消爍之故也嗚呼人之死者豈為命乎慎齋按新産後證虛者多實者少子和以為慎不可作諸虛不足治是必以攻伐峻厲為法矣産後而亦可任汗吐下之三法乎趙嗣其嘆子和之書其詞直其義明顧其一不顧其二知言哉産後以大補氣血為主朱丹溪曰産後有病先固氣血故産後以大補氣血為主雖有雜證以末治之汪石山曰産後百日之內縱有雜證必遵丹溪之法以末治之當大補氣血為主不可攻擊此正理也産後先補氣血兼用消散陳良甫曰産後元氣大脫新血未生概以大補氣血為主如惡露未盡補藥中入行血藥如感冒風寒停滯亦須先補然後發散消導勿得泛用峻厲傷氣血之藥産後去邪必兼補劑何松庵曰産後氣血大損諸事必須保重切不可恃健勞碌致內傷外感六淫七情諸證為患莫測故産後證先以大補氣血為主雖有他證以末治之或欲去邪必兼補劑為當不宜專用峻厲再損血氣慎齋按已上四條序治産後有攻補之法也子和之論專主攻邪丹溪之論專主補虛兩賢之法各自有見而丹溪之説為長故必合良方正宗二説以參之乃攸當也辨丹溪主末二字即標本論虞天民曰或問産後證丹溪云當大補氣血為主雖有雜證以末治之又云産後中風切不可作中風治用風藥然則産後不問諸證悉宜大補氣血乎曰詳主末二字其義自明虛而無他證者宜大補氣血自愈或因虛而感冒風寒者補氣血藥帶驅風之劑或因脾虛而食傷太陰者補氣血藥加消導之劑或因瘀血惡露未盡而惡寒發熱者必先逐去瘀血然後大補經曰有本而標之者有標而本之者又曰急則治標緩則治本丹溪主末二字即標本之意也産後攻補二法辨疑論葉以潛曰或問産後氣血大虛縱有雜證以末治又謂産後須以去惡露為主二説孰是不知古人之言各有攸當假如産後去血過多有血暈之狀脈必弦浮大散乃陰血既亡陽無所依宜大劑芎歸加熟附乾薑頓服補虛或有滯血作痛兼用行血藥此大補為本他證為末也若産後三四日余瘀卒止腰腹疼痛漸生潮熱咳嗽脈洪實而數乃是敗血停積上衝心肺惡露與血相搏留結不行非用行血破氣以消瘀何以得安若徒知當補不當瀉病必益劇故産後雖為不足亦有餘之證不當泥産後無熱胎前無虛之説如胎前惡阻少食腹脹二便清滑經水時下胎動不安不用溫補何以了病非胎前亦有虛乎如産後傷寒熱病煩渴祕結不用苦寒何以解利非産後亦有熱乎今人但見産後六脈浮洪弦緊便説有熱不知産後脈與別病脈不同産後洪大是氣血耗散內無存畜故顯是脈如用涼劑殺人反掌不可不知也慎齋按已上二條序産後辨攻補之法也産後用藥攻補最難調劑虛則補實則攻其定法也惟虛證而兼實邪在産後見之者甚多丹溪之論專為世醫不顧産後大虛惟務攻邪者立誡也豈知守丹溪之法亦不無峻補之患此虞天民葉以潛兩論所宜急玩也産後誤藥成病論單養賢曰丹溪先生云産後當大補氣血為主雖有他證以末治之恐人用消耗之劑以虛其虛也豫見世醫但知傷食當消氣滿當順惡露當攻不顧産虛遽用消耗不知産婦服消耗藥胃氣反傷滿悶益增氣不能降鬱積既久遂成腫脹危證誰之咎哉豫於傷食氣滿證微加消導於補中湯內則脾強而所傷食氣消散助血行氣氣行而惡露自行矣又於誤用消食耗氣下藥以致絶穀日久者先用人參湯送鍋焦粉引開胃口以救絶谷然後漸加補脾藥助以消導又於誤用消耗等藥成脹滿者仍用大補氣血之劑不致夭枉後之學者須遵丹溪方案毋私心自用以夭人命也産後諸證不可誤治論單養賢曰凡病起於氣血之衰脾胃之弱至産後而虛又甚焉故丹溪論産後當大補已盡醫産之旨若能擴充用藥治産可無過矣産後氣血暴虛諸證乘虛易襲如有氣不行毋專耗氣有食不消毋專消導有熱不可用芩連有寒不可用桂附用寒涼則血塊停滯用辛熱則新血崩流至若虛中外感見三陽表證似可汗也在産後而用麻黃慮有亡陽之誤見三陰里證似可下也在産後而用承氣恐致竭陰之患耳聾脅痛乃腎虛惡露之停休用柴胡譫語汗出乃元弱似邪之證毋加宣導厥由陽氣之衰雖分寒熱非大補不能回陽而起弱痙因陰血之損毋論剛柔非滋陰不能活絡而舒筋有如乍寒乍熱發作有期證類瘧疾若以瘧論病甚難痊神不守舍言語無倫病似邪侵如以邪論危亡可待去血多而大便燥結蓯蓉加於生地莫投潤下之湯汗出多而小便短澀六君倍用參耆更加生津之劑人參生化湯頻灌可救産後之虛危長生活命丹屢用能蘇絶谷之人脫肛久瀉多是血虛下陷補中益氣正宜口噤筋攣乃因血燥類風加人參生地為最産戶入風而痛甚服宜羌活養榮方玉門傷冷而不閉先須床免茱硫因氣而滿悶中虛生化湯加木香為佐因食而噯酸惡食六君子加神麯為良蘇木稜蓬大能破血青皮穀食最惡虛中一切耗氣破血之劑汗吐下之策可施少壯之人豈宜胎産之婦大抵新産之婦先問惡露何如塊痛未除不可遽加參術腹疼若止補中益氣無疑至若汗出亡陽氣虛喘促頻用加參生化湯固是從權如因大熱陰虛血崩厥暈速煎生化原方乃為救急言雖未能盡證大略如是而已慎齋按已上二條序産後用藥之失而有誤治之戒也産後證先調脾胃婦人良方曰新産之後雖無疾宜將息調理脾胃進美飲食則臟腑易平復氣血自然和調百疾不生也加味四君子湯四順理中丸百日之內宜常服之産後服生化湯論産寶新書曰産後氣血暴虛理當大補但惡露未盡用補恐致滯血惟生化湯行中有補能生又能化真萬全之劑也如四物産後誤人多矣地黃性滯白芍酸寒伐生氣生化湯除此二味加以溫中行血之劑如産後兒枕作痛世多用消塊散血之劑然後議補又有消與補混施不知舊血雖當消化新血亦當生養若專攻舊則新血轉傷世以回生丹治産用攻血塊下胞衣落死胎雖見速效其元氣未免虧損生化湯因藥性功用而立名也産後血塊當消而新血亦當生若專用消則新血不生專用生則舊血反滯考諸藥性多芎歸桃仁三味善攻舊血驟生新血佐以黑薑炙草引三味入於肺肝生血利氣五味其方行中有補實産後聖藥也産後胞衣一破速煎一帖候兒頭下地即服不拘半産正産雖平安少壯婦無恙者俱宜服一二帖以消血塊而生新血自無血暈之患若胎前素弱至産後見危證不厭頻服病退即止若照常日服一帖豈能扶將絶之氣血也如血塊痛加肉桂三分紅花三分益母草五錢如産後勞甚血崩形色虛脫加人參三四錢如汗出氣促人參倍加慎齋按生化湯一方載之産寶新書凡産後一切證俱以是方為加減頗穩當可法故録之與婦人良方所載用加味四君子四順理中一治産證一治脾胃可並參之産後胞衣不下屬冷乘血澀大全曰兒産出胞衣不落謂之息胞由初産時用力兒出體已疲憊不復能用力産胞經停之間外冷乘之則血道澀故胞衣不出急以藥治之庶不妨於兒所奈胞系連臍帶胞不下即不得以時斷臍浴洗冷氣傷兒成病舊法胞衣不出恐損兒依法截臍而已産後胞衣不下屬血入胞中郭稽中曰胎衣不下者何曰母生子訖流血入衣中衣為血所脹故不得下治稍緩脹滿腹中上衝心胸疼痛喘急者難治服奪命丹逐去衣中之血血散脹消胞衣自下牛膝湯亦效産後胞衣不下有虛實之分薛立齋曰胞衣不下有二有因惡露入衣脹而不能自出有因元氣虧損虛而不能出惡露流入衣中者腹必脹痛用奪命丹或失笑散以消瘀血緩則不救元氣虛弱不能送下者腹中不脹痛用保生無憂散以固元氣産後胞衣不下急斷臍帶法寶慶方曰婦人百病莫甚於生産産科之難臨産莫重於催生既産莫甚於胞衣不下惟有花蕊石藥散一藥最為緊要更有一法産訖胞衣不下停久非特産母疲倦又血流胞中必致危篤宜急斷臍帶以物系墜使血不潮入胞中則胞衣自萎縮而下只要産母安心以物系墜之時宜用心先系然後截斷不爾胞上掩心而死慎之慎齋按已上四條序産後有胞衣不下之證也胞衣不下有冷乘血凝有血流衣脹有元氣虛脫三證當分因用藥急治如天冬嚴寒風冷乘虛而入胞冷血凝而不下則當用奪命丹牛膝散桂附熱藥以下之如血入胞衣脹滿惡露不下則當用失笑散花蕊石散逐血消瘀藥以下之若元氣弱氣血虧損不能下則當用無憂散生化湯以溫補之寒熱虛實之際不可不詳審施治也血暈産後血暈屬敗血流入肝血熱逆上大全曰産後血暈者由敗血流入肝經眼生黑花頭目旋暈不能起坐昏悶不省人事謂之血暈此血熱乘虛逆上湊心故昏迷不省氣閉欲絶也服童便最好産後血暈屬瘀血奔心虛火炎上陳良甫曰産後瘀血奔心因分娩後不飲童便以致虛火炎上也用鹿角燒灰童便調下即醒此物行血極效又用五靈脂半生半熟名獨行散又用返魂丹即益丹丸也産後血暈屬惡露乘虛上攻家居醫録曰産後元氣虧損惡露乘虛上攻眼花頭暈或心下滿悶神昏口噤或痰壅盛急用失笑散主之若血下多而暈或神昏煩亂大劑芎歸湯加童便慎齋按已上三條序産後血暈之屬有餘也敗血入肝惡露上攻此瘀血為患當用行血逐瘀之藥産後血暈屬陰血暴亡心虛火炎李東垣曰婦人分娩昏冒瞑目因陰血暴亡心神無所養心與包絡君火相火也得血則安亡血則危火上熾故令人昏冒火乘肺故瞑目不省人事是陰血暴亡不能鎮撫也經云病氣不足宜補不宜瀉瞑目閣眼病悉屬陰暴去有形之血則火上熾但補其血則神自安心得血則能養而神不昏迷矣産後血暈屬血隨氣上郭稽中曰産後血暈者何曰産後氣血暴虛未得安靜血隨氣上迷亂心神故眼前生花或悶絶不省口噤神脫但服清魂散即醒産後血暈屬虛火載血上升腹中空虛所致朱丹溪曰婦人産後血暈乃虛火載血漸漸上暈也又崔氏云凡暈皆是虛熱血氣奔送腹中空虛所致慎齋按已上三條序産後血暈之屬於不足也陰血暴亡虛火上升皆由腹中空虛所致當用補血滋陰降火之藥但滋陰不可用地芍降火不可用苦寒産後血暈分下血多少治法陳良甫曰産後血暈其由有三有使力過多而暈有下血多而暈有下血少而暈其暈雖同治之則異如下多而暈者但昏悶煩亂當以補血清心藥如下血少而暈者多惡露不下上搶干心心下滿急神昏不省當以破血行血藥按下血多而暈名為血脫當大劑人參可以回陽何云補血又加清心若下血少而暈非血滯即屬血竭未便以破血行血為妄投也良甫晰證最明治法尤未盡善産後血暈用醋漆法崔氏曰産婦分娩訖將稱錘或黃石子入炭中燒令通赤置器中於床前以醋沃之可除血暈時作為佳或先取釅醋以塗口鼻仍置醋於傍淬火炭使聞其氣又一法燒乾漆令煙燻産母之面即醒如無干漆舊漆器燒煙亦妙慎齋按已上三條序産後血暈分血之多少而用治法也産後血暈總屬陰血暴亡虛火上炎所致夫心主血肝藏血肝虛則魂無所附而目暈心虛則神不守而火乘東垣丹溪已悉病機之要若良甫又分血下多少為治如雲惡露不下上搶心而暈此在壯實婦人新産下恆有此患當用行血破血之劑若氣血虛弱人血脫過多當大補氣血為主如大劑芎歸湯生化湯加人參服之可也惡露産後惡露不下屬風冷乘虛搏血大全曰惡露不下由産後臟腑勞傷氣血虛損或胞絡挾於宿冷或産後當風取涼風冷乘虛而搏於血壅滯不宣積畜在內故不下也立齋按前證若惡露不下用失笑散氣滯血凝用花蕊石散慎齋按已上一條序産後惡露不下之證也彭用光有云凡看産後病須問惡露多少有無此要語也夫新産惡露屬養胎余血雜濁漿水兒既産如氣血旺者惡露隨之而下如氣血弱者阻礙小腹為病上攻則為血暈悶絶蓄瘀則為兒枕痛心腹痛瘕癥積聚四肢腫滿血鼓諸證大全以風冷乘虛搏血不宣所致此在秋冬寒月多有犯之但大全既云風冷搏血何療三四日惡露不下方中獨加芍藥知母廣濟方內更用大黃生地汁夫以寒藥治寒凝之血有是理乎準繩獨首載之不可解産後惡露不絶屬虛損臟腑挾冷大全曰産後惡露不絶由産後傷於經血虛損不足或分娩之時惡血不盡在於腹中臟腑挾於宿冷致氣血不調故令惡露淋瀝不絶也産後惡露不止屬血滯不化戴復庵曰孕人服固胎藥太多或正産或半産胎雖下而惡血不去或經二三月惡露猶點滴不盡此非敗血之比正緣當來有固經藥在內致血滯不化藥宜順血通氣不宜蓄血閉氣也産後惡露不絶屬肝脾經病薛立齋曰前證屬肝氣熱不能生血六味丸若肝氣虛不能藏血逍遙散若脾氣虛不能攝血六君子湯胃氣下陷不能統血補中湯若脾經鬱熱血不歸源加味歸脾湯若脾經怒火血妄行加味四物湯若氣血兩虛十全大補湯若肝經風邪其血沸騰一味防風丸慎齋按已上三條序産後有惡露不絶之證也婦人産下其血不止大約一月為期如不及一月而止者氣血虛也如逾一月二月而淋瀝不絶非氣虛不能攝血即立齋所論肝脾二經有虧大全云經血虛損不足是矣又主於臟腑挾宿冷所致夫血熱則行冷則凝豈惡露不絶反為寒冷致病之理立齋以為肝脾鬱熱怒火此誠善悉病機者也但産後血脫當用益氣升提之法如千金方治惡露不絶經月半歲用一味升麻酒煎服正是此意至下多亡陰則有寒無熱薑桂亦所宜用臨證審之頭痛附心腹腰脅遍身痛産後頭痛屬陽實陰虛大全曰頭者諸陽之會也産後五臟皆虛胃氣虧損飲食不充穀氣尚乏故令虛熱陽氣不守上湊於頭陽實陰虛則令頭痛又有産後敗血頭痛不可不知薛立齋曰前證若中風氣虛補中湯加蔓荊若血虛四物加參術氣血俱虛八珍湯若風寒陰傷補中湯倍加川芎産後頭痛屬風寒用生化湯單養賢曰産後頭痛身熱惡寒雖是感冒風寒只宜服生化湯一二服慎不可用柴胡麻黃等藥以表虛其汗劑中川芎乾薑其味辛溫亦能散邪退熱如頭痛不解加連須蔥白三枚慎齋按已上二條序産後有頭痛之證也頭痛有三陽三陰經之分屬風寒外感居多若産後頭痛雖有風寒而本之血虛其病源也惟大劑芎歸養血血行風自滅若立齋以補中湯倍川芎此是治氣虛頭痛為宜至汙血頭痛産後恆有若用黑龍丹下蝗蟲子此又病機之不可測矣産後心痛屬虛寒血凝不散産寶百問曰心者血之主産後虛寒血凝不散氣逆上衝於心以溫熱治之寒去則血脈溫而經脈通大岩蜜湯主之四物去川芎加獨活吳茱乾薑細辛桂心甘草産後心痛屬陰虧火沖包絡大全曰産後心痛為陰血虧損隨火上衝心絡名曰心包絡痛宜大岩蜜湯主之若寒傷心經名曰真心痛無藥可救産後心痛屬寒氣上攻單養賢曰産後寒氣上攻則心痛下攻則腹痛兼血塊者宜服生化湯加桂未止加吳茱萸薑三片助血若獨用諸熱藥攻寒其痛難止其血未免來多以虛産母也産後心痛屬血虛薛立齋曰前證屬陽氣虛寒若蜜湯溫之瘀血上衝失笑散行之血既散而痛仍作八珍湯補之大凡心腹作痛以手按之不痛此血虛也須用補養之劑慎齋按已上四條序産後有心痛之證也心痛在産後非血虛火逆即寒凝傷血産寶用岩蜜湯治虛寒血凝則得矣若大全火衝心包絡而亦用岩蜜湯治之豈熱藥從治之意能無助邪為患至有産後殺血心痛亦屬惡露不盡如陳無擇評大岩蜜湯下云産後心痛雖非産蓐常疾痛或有九未必便是血痛設是岩蜜湯豈可用熟地凝血安能去痛以此湯治血痛不若失笑散更捷豫謂産後心痛屬血者多但有寒熱虛實不同若云未必便是血痛則非矣産後腹痛屬腹有乾血金匱要略曰産後腹痛法當以枳實芍藥散假令不愈此謂腹中有乾血著臍下宜下瘀血湯主之産後腹痛屬余血壅滯大全曰産後惡血雖常通行或因外感五邪內傷七氣致令斬然而止余血壅滯所下不盡故令腹痛當審察治之産後腹痛屬傷食裹血王節齋曰假如産婦朝數內或飲食如常忽作腹痛六脈沉伏四肢厥冷此惡露不盡傷食裹血而脈不起也不可誤認為氣血兩虛用大補劑須用消導行血之藥産後腹痛屬氣弱阻寒金匱要略曰産後腹中㽱痛當歸生薑羊肉湯主之注曰㽱痛者緩緩痛也概屬客寒相阻故以當歸通血分之滯生薑行氣分之寒君以羊肉者所謂形不足者補之以味羊肉補氣㽱痛屬氣弱故宜之産後腹痛屬冷氣乘虛入産門寇宗奭曰婦人産當寒月寒氣入産門臍下脹滿手不得犯此寒疝也醫將治以抵當湯謂有瘀血也豫教之曰非其治也可服仲景羊肉湯又産後六七日忽然臍腹痛皆由呼吸之間使冷氣乘虛而入宜服當歸建中湯四順理中丸慎齋按産後有下血過多衝任空虛肝經血少而腹痛脈弦者以熟地山茱為主加白芍木瓜蒺藜一劑有難産久坐風入胞門而腹痛欲絶脈浮而弦續斷一兩防風五錢服之立愈一虛一實不可不辨産後腹痛分證用藥法家居醫録曰産後腹痛惡露既去而仍痛四神散調補之不應八珍湯若痛而噁心或欲作嘔六君子湯若痛而泄瀉六君子湯送四神丸若胸膈飽悶或惡食吞酸或腹痛手不可按此是飲食所傷用二陳加白朮山楂消導之若食既消而仍痛或按之不痛或更加頭痛煩熱作渴惡寒欲嘔等證此是中氣被傷宜補脾胃為主若發熱腹痛按之痛甚不惡食吞酸此是瘀血停滯失笑散消之若止是發熱頭痛或兼腹痛按之卻不痛此是血虛用四物加炮薑參術以補之産後血塊腹脹戒用峻厲藥産寶新書曰産後血塊痛用生化湯加肉桂紅花塊散痛止慎不可用蘇木三稜蓬朮等峻利之藥雖山楂行氣行血亦不宜多服恐虛産母也慎齋按已上七條序産後有腹痛之證也産後腹痛有虛實之分實者有惡露不盡有乾血瘀滯有食傷裹血虛者有氣弱寒阻有血虛空痛自當審因施治在虛者固宜補氣補血而實者亦未可以峻厲克伐重虛其虛也産後小腹痛屬惡露凝結産寶百問曰産後小腹痛由惡露凝結或外寒搏之若久而不散必成血瘕月水不調産後小腹痛屬血滯名兒枕痛大全曰兒枕者由母胎中宿有血塊因産時其血破敗與兒俱下則無患若産婦臟腑風冷使血凝滯在小腹不能流通令結聚疼痛名曰兒枕痛胎以食母之血十月滿足余血結成塊俗呼為兒枕欲産時血塊先動敗血裹其子是以難産産後小腹痛屬瘀血停滯有骨疸證薛立齋曰有産婦小腹作痛服行氣破血藥不效脈洪數此瘀血內潰為膿也大抵此證因營衛不調瘀血停滯宜急治之緩則腐化為膿最難治療若流注關節則患骨疸失治多為敗證脈數而洪已有膿遲緊乃瘀血也下之則愈若腹脹大轉側作水聲或膿從臍出或從大便出宜蠟礬丸太乙膏或瓜子仁湯下膿而愈産後臍下痛作惡露不盡論單養賢曰産後臍下痛在七日內未曾服藥者當作惡露不盡論如按而痛止者屬虛加味生化湯慎齋按已上四條序産後有小腹痛之證也産後小腹痛非惡露瘀畜即風寒乘襲小腹為足厥陰部分藏血之所兒産後一有不慎則風寒乘虛與惡血凝結即有兒枕痛之名若瘀血潰膿亦不早治之故也臨證宜慮及之産後腰痛屬血滯經絡大全曰産後惡露方行忽然漸止斷絶不來腰中重痛下注兩股痛如錐刺入骨此由血滯經絡不即通之必作癰疽宜桃仁湯五香連翹湯慎齋按産後惡露不行血滯經絡而作癰疽必是血氣大虛營衛不調所致必八珍十全可療用桃仁五香則謬矣産後腰痛屬勞傷腎氣風冷乘虛大全曰腎主腰腳産後腰痛者腎為胞胎所繫産則勞傷腎氣損動胞絡虛未平復風冷客之冷氣乘腰故令腰痛若寒冷邪氣連滯背脊痛久未已後忽有娠必致損動蓋胞絡屬腎腎主腰故也産後腰痛屬真氣虛薛立齋曰前證真氣虛邪乘之用當歸黃耆湯或十全湯為主佐以寄生湯不應十全湯加附子慎齋按已上三條序産後有腰痛之證也胞胎繫於腎腰者腎之外候産後勞傷腎氣損動胎絡屬虛者居多雖有風冷滯血亦必兼補真氣為要立齋一條抉其旨矣産後脅痛屬氣與水相激大全曰産後兩脅脹滿氣痛由膀胱宿有停水因産後惡露下不盡水壅與痞氣相搏積在膀胱故令脅肋脹滿氣與水相激故令痛也産後脅痛分證用藥之法薛立齋曰此證若肝經瘀血延胡索散若肝經氣虛四君子加柴胡青皮若肝經血虛四物加參朮柴胡若腎水不足不能生肝六味丸若肺金勢盛剋制肝木瀉白散仍參前證治之此證苟非用薑桂辛溫助脾肺以行藥不惟無以施功而反助其脹矣慎齋按已上二條序産後有脅痛之證也脅者肝之部肝藏血産後惡露不盡與去血過多均足以致脅痛未必屬於水氣相激必參立齋一條始攸當爾産後遍身疼痛屬血氣失其常度郭稽中曰産後遍身疼痛者何曰因産走動氣血升降失其常度留滯關節筋脈引急是以遍身疼痛甚則腰背強硬不能俯仰手足拘攣不能屈伸或身熱頭痛不可作他病但服趁痛散循流血氣使筋脈舒暢疼痛自止陳無擇曰趁痛散不特治産後氣弱血滯兼能治太陽經感風頭痛腰背疼自汗發熱若感寒傷食憂恐驚怒皆致身疼發熱頭痛況有蓐勞諸證尤甚趁痛皆不能療不若五積散入醋煎用卻不妨立齋按五積散治産後身痛兼感寒傷食若氣虛血弱人似非所宜如手按而痛是血瘀滯也用四物炮薑桃仁紅花澤蘭補散之按而痛稍緩者血虛也四物加參朮炮薑補養之慎齋按已上一條序産後有遍身疼痛證也産後百節開張血脈流散曰遍身則自筋骨皮肉手足脅腹腰背無處不痛大全以為血滯經絡似屬有餘然去血過多虛而風寒襲之亦為疼痛故趁痛散為的對藥無擇乃云不能療不若五積散殊未確也産後血塊築痛屬風冷凝血楊仁齋曰此因産後趕血未盡所致世俗收生多就踏板趕血不思生産時已坐草近地産畢臟腑空虛又近地趕血冷濕風邪乘虛而入使敗血凝為血塊足謂母血沖築硬痛治法以不換金正氣散加辣桂蓬朮乾薑川芎白芷熱服散其冷涇風邪從二便出産後積聚屬氣血為風冷所搏陳良甫曰積者陰氣也五臟所生聚者陽氣也六腑所成然積為陰陰性沉伏故痛不離其部聚為陽陽性浮動故痛無常處皆由産後氣血虛弱風冷所乘搏於臟腑其血氣相結故成積聚癥塊也産後瘕痛屬風冷搏血大全曰新産後有血與氣相搏而痛者謂之瘕瘕者假也謂其痛浮假無定處也此由夙有風冷血氣不調至産血下少故至此病不急治多成積結妨害月水産後寒氣入腹名寒疝婦人良方曰産後寒氣入腹硬築臍下刺痛此名曰寒疝當用炒吳茱若誤認為惡露不盡小腹畜血則謬矣産後有血損筋攣之證薛立齋曰有産婦腹中有一物時痛不止以為血瘕用行血破氣藥兩脅肚腹尤甚支節間各結小核隱以肉裡以為鱉子方用下蟲藥夫肝藏血而養諸筋此肝血虛損筋涸而攣結耳支節胸項皆屬肝膽部分養其脾土補水以滋肝血則筋自舒八珍湯逍遙散歸脾湯加減治之産後氣血壅結宜固元氣薛立齋曰凡真氣虧損則邪氣乘之況産得此尤當固元氣為主若求旦夕之效而攻邪則速其危矣如寒邪乘客氣血壅結此因氣病而血病也當補養胃氣調和月經寬緩靜養為善慎齋按已上六條序産後有血塊積聚瘕疝筋攣諸證也産後惡血不盡氣血虛而風寒乘襲則血凝氣滯遂為血塊瘕疝等證若用破血耗氣之劑以攻有形之邪禍不旋踵故以立齋固元氣一條序後示人求本之道也産後口乾痞悶屬面毒聚胃郭稽中曰問産後口乾痞悶者何答曰産後榮衛大虛血氣未定食麵太早胃不能消化面毒結聚於胃上薰胸中是以口乾燥渴心下痞悶醫者不識認為胸膈壅滯以藥下之萬不得已但服見睍丸則愈陳無擇曰産後口乾痞悶未必只因食麵或産母內積憂煩外傷躁熱飲食甘肥使口乾痞悶當隨所因調之可也産後傷食停滯分證用藥法薛立齋曰前證若宿食停滯六君子加枳實神麯若因肉食加山楂若因魚鱠加陳皮其物既消而仍痞或反作痛作嘔此脾胃受傷六君子或咽酸噯腐加炮薑作瀉加升麻不應佐四神丸或間用補中湯慎齋按已上二條序産後有傷食之證也産後氣血已虛胃中元氣甚弱凡飲食偶有所傷必難運化而成痞悶誠不止面毒也但北方以面為飯南方風俗三朝洗兒有食麵之例産婦恃健傷之者多此稽中舉此為言也故丹溪教新産婦食白粥並戒雞子正以虛人易致停滯故耳腹脹嘔吐厄逆喘産後腹脹嘔吐屬敗血入脾胃郭稽中曰産後腹脹滿悶嘔吐不定者何曰敗血散於脾胃脾受之則不能運化精微而成腹脹胃受之則不能受納水穀而生吐逆醫者不識若以尋常治脹止吐藥病與藥不相關轉傷動正氣疾愈難治但服抵聖湯則愈産後腹脹嘔吐屬飲食傷脾胃薛立齋曰前證屬敗血傷脾胃宜用前方若飲食傷脾宜六君子加厚朴若飲食傷胃宜六君子湯大抵損其脾者當節飲食為善慎齋按已上二條序産後有腹脹嘔吐之證也産後腹脹嘔吐未有不因脾胃虛弱所致郭論則主於敗血薛論則止於傷食食與血均屬有餘證攻補合宜是在臨證之功耳産後嘔吐屬腸胃燥澀氣逆大全曰胃為水穀之海水穀之精以為血氣榮潤臟腑因産則臟腑傷動有時而氣獨盛氣盛腸胃腸胃燥澀其氣則逆故嘔逆不下食産後嘔逆屬惡露不下郭稽中曰胃受水穀脾主運化生血生氣內濡臟腑産後暴虛惡露不下敗血乘虛散於脾胃脾受之為腹脹胃受之為嘔吐亦有惡露過多氣無所主聚於脾胃脾受之亦為腹脹胃受之亦為吐逆也産後嘔吐屬脾胃病分證用藥薛立齋曰産後嘔吐因飲食過多者六君子加楂曲兼勞役者補中湯因飲食停滯者人參養胃湯腸胃氣虛者六君子胃氣虛寒者加炮薑木香寒水侮土者益黃散肝木侮土者六君子加升柴命門火衰不能生土者八味丸嘔吐泄瀉手足俱冷或肚腹作痛乃陽氣虛寒急用附子理中慎齋按已上三條序産後有嘔吐之證也嘔吐為中焦病産後氣血大虧則中氣不運為飲食所傷而嘔吐者多若大全主於燥澀氣逆稽中主於惡露不下此在新産三四朝內庸有之病機不可不審産後厄逆屬脾虛聚冷胃中伏寒大全曰肺主氣五臟六腑俱稟於氣産後氣血傷臟腑皆損風冷搏於氣則氣逆上又脾虛聚冷胃中伏寒因食熱物冷熱之氣相為衝擊使氣厥不順則為厄逆腸主中焦為三焦之關五臟之倉廩貯積水穀若陰陽氣虛使營衛之氣厥逆致生斯病經云厄噫者胃氣所生服藥無效灸期月三壯必愈産後厄逆分證用藥法薛立齋曰前證屬胃氣虛寒之惡候如用丁香散未應急投參附湯亦有生者若産後厄逆有寒熱虛實之不同如寒者丁香薑桂熱者宜乾柿竹茹虛者宜人參附子實者宜香附橘皮誤施則有噬臍之悔慎齋按已上二條序産後有厄逆方證也經云病深者其聲噦噦即厄逆也諸病見之為惡候況産後犯此有虛無實有寒無熱矣立齋必兼熱實論殊謬若古方治産後厄逆又兼敗血瘀停胃逆用丁香豆蔻散煎桃仁吳茱萸湯下之病機又不可不知産後氣喘屬敗血停凝上熏於肺郭稽中曰産後惡露不快敗血停凝上熏於肺亦令喘急但服奪命丹血去而喘自定又産後敗血衝心胸滿上喘命在須臾服血竭散或參蘇飲治産後血入於肺面黑髮喘欲死人參一兩蘇木二兩産後發喘屬汙血感寒婁全善曰産後喘者多死有産二月洗浴即氣喘坐不得臥者五月惡風得暖稍緩用丹皮桃仁桂枝茯苓乾薑枳實厚朴桑皮紫蘇五味栝蔞煎服即臥其痰如失作汙血感寒治也産後氣喘屬孤陽絶陰郭稽中曰産後喉中氣急喘促者何答曰榮者血也衛者氣也營行脈中衛行脈外相隨上下謂之營衛因産所下過多榮血暴竭衛氣無主獨聚肺中故令喘此名孤陽絶陰為難治産後發喘不可誤藥單養賢曰産後發喘氣促此第一危證也世每以痰火實證治之訛以傳訛當以人參生化湯加減人多疑參能助喘不用致不救者多矣加芎歸在內萬無有失有用參加陳皮監製反致耗散切不可信慎齋按已上四條序産後有發喘之證也産後發喘有虛實之分敗血入肺汙血感寒此屬於實也參蘇飲奪命丹血竭散下之而愈若去血過多榮血暴竭衛氣無主孤陽上浮此血脫而氣不歸元也非大劑人參生脈散與生化湯加桂附莫療誤以風痰汙血為治是速之斃矣觀立齋治産後喘急謂脾肺氣弱用六君中氣虛寒用補中湯加薑桂更有陽氣虛脫喘促自汗手足俱冷以參附湯大劑服之論誠知本也
