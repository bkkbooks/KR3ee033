body:
  text: 卷一調經門總論經云女子七歲腎氣盛齒更髮長二七而天癸至天謂天真之氣癸謂壬癸之水馬玄臺曰男女之精皆稱天癸此為陰精屬腎水非經血也下文月事方指經血任脈通太衝脈盛月事以時下沖為血海任主包胎二脈通流經血漸盈應時而下以象月盈則虧不失其期故曰月事以時又云衝脈起於胞中出於氣街在毛中兩旁各二寸挾臍左右上行至胸前行於胸伏行於背上出頏顙滲灌諸陽下入於足注諸絡下注諸絡以溫足脛此太谿等脈所以常動為十二經脈之海其出入皆少陰經以行與足少陰腎經並行故為血海眉批天真天一也天一之氣升而為壬降而為癸壬陽而癸陰也三旬一見者為一小會之周天此其常也然有大會中會之不同故又有三月一行一年一行之變異究其盈虧之義則一也甚有數年不行而一行即受妊者又超於理之外矣又云天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起人身一天地故經脈亦應之王太僕曰沖為血海諸經朝會男子則運而行之女子則停而止之謂之血室經云任脈通衝脈盛男既運行女既停止運行者無積而不滿動也陽也氣也停止者有積而能滿靜也陰也血也故滿者以時而溢謂之信男子以氣運故陽氣應日而一舉女子以血滿故陰血應月而一下程若水曰婦人經水與乳俱由脾胃所生經脈別論云食氣入胃其清純津液之氣歸於心入於脈變赤而為血稟心之色血有餘則注於衝任而為經若媾精成孕則移蔭於胎胎既產則清純津液之氣歸於肺朝於脈流入乳房變白為乳稟肺之色或兒不自哺則陽明之竅不通其胃中津液仍歸於脈變赤而復為月水矣程扶生曰太衝脈屬陽明為血之海故穀氣盛則血海滿月事以時下薛立齋曰血者水穀之精氣也和調五臟灑陳六腑男子則化為精婦人上為乳汁下為月水故雖心主血肝藏血要皆統攝於脾東垣云脾為生化之原補脾和胃血自生而經自調矣眉批知水穀之精氣是生血之本則知脾胃是生血之源故脾胃不健而血不生者不可專主四物矣脾氣化液入心而變為血即水入於經其血乃生之意此榮出中焦也故曰生化之源陳良甫曰婦人以血為主脾胃虛弱不能飲良榮衛不足月經不行但滋其化源其經自通虞世曰女子以血為寶血虛則發熱而水不足則燥氣燔燥氣燔則金受邪金受邪則肺家嗽嗽則咳血吐血之病成矣醫者見經不行用峻藥以攻之見熱用寒藥以伐之血海涸竭無以滋養其能行乎當治其源趙養葵曰衝任起於胞中男子藏精女子系胞其間又恃一點命門之火為之主宰火旺則紅火衰則淡火太旺則紫火太衰則白所以滋水更當養火甚有乾涸不通者雖曰火盛之極亦不宜以苦寒之藥降火只宜大補其水從天一之源以養之使滿萬無有毒藥可通之理濟生曰經云百病皆生於氣喜怒憂思悲恐驚七氣也益以寒熱二氣為九氣也氣之為病男子婦人皆有之惟婦人血氣之患為尤甚蓋人身血隨氣行氣一壅滯則血與氣並或月事不調心腹作痛或月將行預先作痛或月事已行淋漓不斷或作寒熱或為癥瘕或痛連腰脅或引背膂上下攻刺吐逆不食肌肉消瘦非特不能受孕久而不治轉為瘵疾者多此皆氣之為病也故調經養血莫先以順氣葛仙翁曰凡治婦人諸病兼治憂恚令寬其思慮則病無不愈此治氣之要妙也朱丹溪曰調經莫先以調氣氣為血之帥氣熱則熱氣寒則寒氣升則升氣降則降氣凝則凝氣滯則滯氣虛則虛氣實則實往往見有成塊者氣之凝也將行而痛者氣之滯也來後作痛者氣血俱虛也色淡者亦虛也而有水混之也錯經妄行者氣之亂也紫者氣之熱也黑者熱之甚也故調經而專治其血未得病機之要者也葉以潛曰女子經候不調多主耗氣益血之說但血為氣配陽生則陰長氣衰則血亦弱豈可專耗其氣適有憂愁傷心恚怒傷肝思慮傷脾當審其順逆治之而已方約之曰憂思過度則氣結氣結則血亦結忿怒過度則氣逆氣逆則血亦逆而經於是乎不調矣朱丹溪曰經水者陰血也陰必從陽故其色紅稟火色也色淡白者屬氣虛屬痰色紫者屬熱色黑者屬熱之甚而或作風冷誤治禍不旋治經云亢則害承乃制熱甚必兼水化故熱則紫甚則黑也況婦人性多拂鬱臟腑厥陽之火無日不有非熱而何葉氏曰亦有血寒凝塊而色黑者如巢氏所云風冷乘之也但寒主收引少腹必常冷痛經行時或手足厥冷唇青面白脈必遲或無此證而脈見數為熱明矣準繩云冷證外邪初感入經必痛或不痛者久則鬱而化熱且血寒則凝既行而紫黑故非寒也李氏曰心主血故色紅為正雖不如期而色正者易調色紫者風也四物加荊防黑者熱甚也淡白者虛也有挾痰停水以混之如煙塵水屋漏水者寒濕也如蟹黃水者濕熱也帶黃混濁者濕痰也白而成塊者氣滯也丹溪曰經水先期而至者血熱也四物加芩連之類後期而至者血虛也川芎當歸人參白朮兼痰藥治之忽前忽後乍多乍少者氣之亂也宜調其氣趙養葵曰經水先期而來者火也宜六味丸滋水如半月或十日而來且綿延不止此屬氣虛用補中湯後期而色淡者火衰也六味加桂亦有先期無火後期有火者難拘一定也眉批血生於脾故色淡者宜補脾胃此白朮所必用也而丹溪以芎歸為配不用地芍豈無深意如立齋養榮八珍等湯俱本於此甚用六味丸者又為補母之法宜詳李時珍曰經者常也上應太陰下應海潮月有盈虧潮有朝夕經候一行與之相符故謂之月水有臨期不行而或吐血衄血或眼耳出血是謂倒經錯經妄行由氣之亂火之升也有三月一行者是謂居經脈經云脈微血氣俱虛年少者亡血也乳子下利為可否者此為居經又寸口脈微而澀微則衛氣不足澀則血氣無餘趺陽脈浮而澀澀則衛氣虛虛則短氣此為居經又寸口脈浮而大衛強榮反而弱孤陽獨呼陰不能吸二氣不停衛降榮竭故令血少而三月一來其人或咽燥汗出溲稠數唾涎沫津液漏泄所致有一年一行者是謂避年此由真元不足宜固先天真氣有一生不行而受胎者是謂暗經此由先天陽氣獨盛有運行而無停止血室無積而不滿非病也故亦能受胎有受胎之後月月行經而產子者是謂胎盛俗名垢胎此由養胎之血有餘故經行如常但少耳有受胎數月血忽大下是謂漏胎此病有因久漏不止必隕胎眉批此言脈微氣血兩虛之居經此言寸脈微澀反胃脈浮澀陽不生陰之居經女子尺脈宜盛今反見弱榮不足於下也寸口衛脈浮大衛氣盛於上也此言陽脈浮大陰脈反弱之居經王子亨曰經者常候也謂候其一身之陰陽愆伏陽太過則先期而至陰不及則後時而來其有乍多乍少斷絕不行崩漏不止者皆由陰陽盛衰所致許叔微曰陰氣乘陽則胞寒氣冷血不運行故令乍少而在月後陽氣乘陰則血流散溢故令乍多而在月前當別其陰陽調其氣血使不相乖以平為期也褚侍中曰女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不出新血誤行或漬而入骨或變而為腫或雖合而難子合多則瀝枯虛人產乳眾則血枯殺人王叔和曰婦人病如癲疾鬱冒起年少時經來以合房室移時過度精感命門開精下血則虛虛則百脈皆張中極感傷動微風激成寒因虛合於榮衛積于丹田上奔胸膈涎唾溢出狀如厥氣陳藏器曰犯月水行房精血相射入任脈留於胞中致小腹結病如伏梁水溺頻澀是名積精原病集曰婦人經來交合陰陽致傷血絡多成經漏俗名血沙淋治當調和血氣陳良甫曰婦人月水不調由風冷乘虛客於胞中傷衝任之脈故凡遇經行最宜謹慎否則與產後證相類王子亨曰婦人冷熱調和則衝任氣盛手太陽少陰所生之血宣流依時而下若寒溫乖適經脈則虛虛則邪搏於血寒則血結溫則血消眉批經云二陽之病發心脾此則又兼小腸而言不過與心為合豈可混淆故當以素問為是丹溪云經水將來作痛者血實也一雲氣滯四物加桃仁香附黃連阿川用連須識其故臨行時腰疼腹痛乃是鬱滯有瘀血四物加紅花桃仁莪朮延胡木香有熱加黃連柴胡經行後作痛者血氣俱虛也八珍加減有加香附青皮桃仁烏藥丹皮小茴五靈眉批思致工夫更進一層滑伯仁曰有經行前臍腹絞痛如刺寒熱交作下如黑豆汁兩尺沉澀余皆弦急此由下焦寒濕之邪搏於衝任經來邪與血爭故作㽲痛寒濕生濁下如豆汁宜治下焦以辛散苦溫王海藏曰經行臍腹後痛者血澀也宜八物湯加木香延胡苦楝子朱丹溪曰經將行腹痛屬氣滯腹中陣痛乍作乍止者血熱氣實也氣滯者抑氣散之類血熱氣實者四物加連牡丹皮戴元禮曰經來腹痛不來亦腹痛皆血不調也欲調其血先調其氣四物加香附吳萸或和氣飲加吳萸痛甚延胡索湯然又恐感外邪傷飲食致痛痛不因血尤宜詳審和氣飲卻能兼治因冷而積因積而痛宜大溫經湯冷甚者去麥冬產寶曰婦人經候欲行身體先痛血氣不足也越痛散丹溪曰經後作痛者氣血俱虛也亦有虛中有熱腹中綿綿走痛者血行而氣滯未盡行也虛者八珍湯有熱者逍遙散未盡行者四物加木香大全曰經行客熱者體虛也其狀心煩口燥手足壯熱攝要曰經後發熱倦怠兩目如帛蔽夫脾為諸陰之首目為血脈之宗此脾傷而五臟皆失所不能歸於目也治在脾胃歸脾補中之類汪石山曰婦人經行必先瀉二三日脈濡弱此脾虛也脾統血屬濕土經水將行脾血先注血海脾虛不能運行其濕故先瀉二三日眉批據此直用十全大補湯八珍養榮之類李氏潮熱有時為內傷為虛無時為外感為實虛者大溫經湯熱者四物湯加柴胡黃芩經閉者滋血湯骨蒸者大胡連丸大烏雞丸五心潮熱者四物湯加黃連胡連無汗者茯苓補心湯有汗者逍遙散經前潮者血虛有滯逍遙散加丹皮桃仁延胡經後潮者血虛有熱逍遙去柴胡加地骨生地此藥加減為退熱聖藥尋常熱者腎氣丸大造丸或四物加黃芩香附經水適來適斷或寒熱往來先服小柴胡去其寒熱後以四物湯和之薛新甫治一婦耳後作痛寒熱口苦經不調此肝火氣鬱而血凝小柴胡加黑梔丹皮川芎而愈大全云師尼寡婦室女失嫁欲心不遂乍寒乍熱久則為勞薛氏曰前證若肝脈弦出魚際用小柴胡加生地煎湯下生地黃丸久而血虛佐以四物湯若兼怒動肝火而寒熱者佐以加味逍遙散一婦因夫久不歸發寒熱月經旬日方止服降火涼血藥反潮熱內熱自汗盜汗月經頻數余曰熱汗氣血虛也經頻肝脾虛也用歸脾湯六味丸而愈良方云婦人經水過來晝則安靜暮則譫語有如瘧狀此為熱入血室治者無犯胃氣及上二焦宜服小柴胡湯析理無餘論症極確醫能悉此何患不良眉批以類字推之則所該者廣幸毋熱也而為先為佐尤所當知繆仲淳曰月水過多白帶時下日輕夜重泄瀉無時作下多亡陰論治服四物益甚始悟此病正合仲景陽生陰長之法夫經多帶下泄瀉皆陽虛陷下而然命曰陽脫是也以參術助陽之藥服而漸愈陳良甫曰婦人月水淋漓因勞傷衝任外邪客於胞內故也若氣不能攝血但養元氣病自愈產寶曰婦人年逾七七或因勞傷過度又為邪氣攻衝則當止不止而復下許叔微曰婦人天癸過期不止腰腹疼痛經云七損八益謂女子七數盡而經不依時者血有餘也不可止之但令得依時不腰痛為善宜服當歸散之類李時珍曰婦人年過五十而經不止者作敗血論方用條芩二兩醋浸七日炙乾又浸七次為末醋丸空心溫酒下名芩心丸方氏曰婦人經病有月候不調者有月候不通者然不調不通中有兼疼痛者有兼發熱者此分而為四也細詳之不調中有趲前者有退後者趲前為熱退後為虛不通中有血枯者有血滯者血滯宜破血枯宜補也疼痛中有常時作痛者有經前經後作痛者常時與經前為血積經後為血虛也發熱中有常時發熱者有經行發熱者常時為血虛有積經行為血虛有熱也是四者之中又分為八矣人之氣血周流忽有憂思忿怒則鬱結不行經前產後忽遇飲冷形寒則惡露不盡此經候不調不通疼痛發熱所由作也大抵氣行血行氣止血止故治血病以行氣為先香附之類是也熱則流通寒則凝泣故治血病以熱藥為佐肉桂之類是也葉以潛曰月經不行四肢發腫者屬瘀血滲入脾經也宜辛溫以導之月經上行口鼻者火載血上氣之亂也四物加梔子黃連粉丹皮犀角楊仁齋曰女子經脈不行者有三一則血氣盛實經絡遏閉其脈滑實治當通經疏利一則風冷外傷七情內賊以致經絡痹滯其脈浮澀治之當解風散冷去瘀滌熱一則形體憔悴經絡涸竭其脈虛弱治當滋血養血氣李氏曰婦人潮熱則血愈消耗汗出咳嗽嘔惡則氣往上行泄瀉則津偏於後腹痛則積結於中凡此諸病皆阻經候不調是以必先去病而後可以滋血調經蕭慎齋曰婦人有先病而後致經不調者有因經不調而後生諸病者如先因病而後經不調當先治病病去則經自調若因經不調而後生病當先調經經調則病自除薛立齋曰先期而至有因脾經血燥宜加味逍遙散有因脾經鬱滯宜歸脾湯有因肝經怒火宜加味小柴胡湯有因血分有熱宜加味四物湯有因勞役火動宜補中湯如過期而至有因脾經血虛宜人參養榮湯有因肝經血少宜六味丸蓋血生於脾故云脾統血凡血病當用甘苦之劑以助陽氣而生陰血也眉批脾虛氣鬱宜歸脾湯脾實氣鬱宜越鞠丸之類準繩云婦人經來腹痛由風冷客於衝任用溫經湯桂枝桃仁湯若因憂思氣鬱而氣滯用交加地黃丸天香正氣散延胡索湯若血結成塊者萬病丸鱉甲丸前症若寒冷傷脾六君加炮姜思慮傷脾四物加參朮思慮傷氣歸脾加柴梔鬱怒傷血歸脾逍遙兼服若因血虛肝氣作痛四物加吳萸若脾胃虛寒腹痛和氣飲加吳萸此大略也尚宜隨症應變又月水不斷因鬱結傷脾歸脾湯恚怒傷肝逍遙散肝火妄動加味四物湯脾氣虛弱六君子湯元氣下陷補中益氣湯熱傷元氣前湯加五味子麥冬炒川柏又月水不利寸脈弦關脈沉是肝病也兼主腹痛孔竅生瘡肝與膽為表裡多因鬱怒所傷若本經風熱或肝虛脅痛者補肝散之類若患諸瘡瘍治見後凡經行時禁用苦寒辛散之品飲食亦然張戴人曰凡看婦人病脈不可純用破血行氣之藥恐有妊娠在疑似間也調經類方四物湯治衝任虛損月水不調或臍腹痛或腰足痛或崩中漏下及胎產諸症常服益榮衛滋氣血當歸利血除血刺痛如刀刺川芎治風泄肝木除血虛頭痛芍藥利血理脾除腹中虛痛熟地補血除臍痛春倍川芎夏倍芍藥秋倍地黃冬倍當歸觀其加減法便是四時妙理倍當歸以迎春氣倍川芎以迎夏氣倍芍藥以迎秋氣倍地黃以迎冬氣用當歸以生一陽用芍藥以生一陰皆升降之妙也此方始於朱梁時節度巡官昝膺所撰此金匱膠艾湯中脫胎出來非杜撰也產寶方中有四物散後醫易散為湯陳修園曰妙在川芎一味夫春生夏長秋收冬藏四時生物之功也順四時而生人亦順四時而養當歸甘辛溫潤喻春日之融和川芎辛溫而散喻夏日之敷榮生長矣而不為收藏何以成物故用芍藥酸收以成秋地黃味厚以成冬四時之中甘為土德歸地味厚而甘此又五行之不離乎土也王海藏曰如用血藥於四物中擇其一二可也豈無意哉故如行血則用芎歸以行春夏之令如用止血則取地芍以行秋冬之令觀佛手散犀角地黃湯止取四物之二可想矣簡易當歸散治月經不勻或三四月不行或一月再至腰腿疼痛當歸川芎白芍炒黃芩炒各一兩白朮萸肉各一兩半上為細末空心溫酒調下三錢日三服或銼每服七錢加生薑水煎如冷去黃芩加肉桂一方有熟地大溫經湯金匱治衝任虛冷月候不調或來多不已或過期不行或崩中去血過多此溫劑內冷者宜之兼血氣當歸川芎白芍炒人參甘草阿膠炒各二錢麥冬肉桂原本桂枝丹皮吳萸各二錢半夏制二錢五分加生薑五片水煎食前稍熱服拱辰丹孫琳葛承丞相夫人少年時服之有效鹿茸酥炙萸肉當歸各四兩麝香三錢上為細末酒糊丸每服七十丸溫酒淡鹽湯任下嚴氏抑氣散治婦人氣盛於血胸滿體痛香附四兩陳皮二兩茯神甘草上為末每服二錢食食前沸湯調下十味香附丸治婦人經候不調赤白帶下陰虛氣滯不能生育四制香附一斤四兩當歸川芎白芍炒熟地各四兩白朮澤蘭陳皮各三兩鹽水炒川柏甘草炙各一兩上為末醋糊丸桐子大一水法丸一煉蜜丸每服七十丸空心淡鹽湯下此方以香附為君以香附血中氣藥也氣和則血調絕妙好方四制香附四制者酒浸四兩醋浸四兩童便浸四兩黑山梔四兩煮汁浸四兩人參養血丸治女人稟受素弱血氣虛損經候不調熟地五兩人參烏梅三兩當歸二兩川芎赤芍炒蒲黃各一兩上為末煉蜜丸桐子大每服八十丸溫酒米飲任下稟弱者先天之氣弱也血生於氣上生於下故用熟地為君人參佐之以生下焦之氣使陰氣旺而生血也臣以烏梅取生液而斂血入肝夫既生矣聚矣而不為流行之則血凝故芎歸為使或瘀也以赤芍破之或潰也以炒蒲黃澀之庶乎生而不壅止而不塞先期湯治經水先期而來宜涼血固經當歸白芍炒生地各二錢黃柏炒知母炒各一錢條芩炒川連炒川芎阿膠炒各八分艾葉香附甘草炙各七分先期血熱也艾葉乃溫下元之藥非先期所宜上作一服水兩鍾煎一鍾食前溫服過期飲治經水過期乃血虛氣滯之故法當補血行氣當歸白芍熟地各二錢川芎一錢香附二錢紅花七分桃仁六分蓬朮木通各五分甘草炙各四分肉桂四分上作一服水二鍾煎一鍾食前溫服此方補血行血溫氣破氣故為氣寒氣滯者所宜而脾虛不能生血以致過期者無與也滋血湯治婦人血脈虛弱月水過期人參黃耆山藥各一錢白茯苓川芎白芍熟地此八珍湯之變方也如脾肺元氣不足者尤宜當歸散治經水過多取抑陽助陰之義四物加白朮黃芩如久不止成崩者加炒阿膠山梔地榆荊芥甘草或再不止茅根汁磨墨服久不止而熱者固宜若脾氣下陷血不歸經者不宜如此加法膠艾湯金匱治勞傷衝任經水淋瀝熟地白芍各一錢當歸艾葉各七分半阿膠炒川芎炙草五分一方加地榆黃耆此方暖下元也血熱者去艾丹溪方治稟弱氣不攝血經水過多白朮一錢五分黃耆生陳皮各一錢人參五分甘草炙二分此東垣法此方治血不用一味血藥學者要知此意四物加葵花湯治經水澀少此方全在血分葵花須用紅者乃潤燥之藥牛膝散治月水不利臍腹痛或小腹引腰氣攻胸膈牛膝酒洗桂心赤芍桃仁延胡炒當歸酒浸木香丹皮各七錢五上為細末每服三錢空心溫酒調下歸漆丸治月水不利臍下憋逆氣腹痛當歸四錢乾漆三錢炒令煙盡上為細末煉蜜丸桐子大每服十五丸溫酒下簡當妙在等分止經湯治婦人多睡少食經水淋瀝或成片或下赤白黃水頭眩肢痠此症急宜調理免致崩漏四物各一錢加白朮黃芩阿膠炒蒲黃炒柏葉鹽水炒各七分香附一錢砂仁甘草各五分加姜三片水煎空心服據此證俱屬脾胃元氣不足當用人參養榮歸脾補中十全之類而此亦穩當如加參耆更佳固經丸治經水過多陰虛挾熱所致當補陰清熱黃柏白芍各三兩黃芩二兩龜板炙四兩樗根皮香附童便制各一兩五錢上為細末酒糊丸桐子大每服五六十丸白湯下此丹溪先生法也以肝腎之陰為主四物中只用一物豈尋常所知芩心丸或治婦人年逾七七天癸每月卻行或過多不止條芩心二兩米泔浸七日炙乾又浸又炙如此七次上為末醋糊丸桐子大每服七十丸空心溫酒下日二服用米泔浸入陽明胃經也茸附湯補衝任調血氣治血海虛寒而不禁者鹿茸酒炙三兩當歸三兩乾薑四兩肉桂附子龍骨生各一兩牡蠣煅二兩防風一兩每服五錢水二鍾煎八分酒服止流之藥不難於澀而難於辨虛實寒熱此方妙在於補血中之氣舉下陷之陽防風妙須酒炒越痛散治血氣虛寒身體作痛虎骨五錢當歸白芍白朮茯苓甘草續斷防風白芷藁本附子各三錢每服五錢水二鍾生薑五片棗三枚煎至一盞不拘時服此治身痛之劑故立法如此要知身痛與腹痛自是不同八物湯海藏治經水將行臍腹絞痛血澀故也四物各一錢加延胡苦楝碎炒各一錢木香檳榔五分食前服前四味是血後四味是氣而川芎血中有氣延胡氣中有血不可不知澹寮煮附丸治經不調血氣刺痛腹脅膨脹頭暈噁心香附去毛不拘多少米醋浸一日瓦罐煮令醋盡上為末醋糊丸桐子大曬乾每服五十丸淡醋湯下妙在用醋乃行氣之劑琥珀散治婦人月經壅滯每發心腹臍痛不可忍及治產後惡露不快血上搶心迷悶不省氣絕欲死者三稜莪朮赤芍劉寄奴丹皮官桂延胡烏藥當歸熟地各一兩上前五味用黑豆一升生薑半斤米醋四升同煮至豆爛為度焙乾入後五味同為細末每服二錢溫酒調下空心食前服本事云此予家秘方也若是尋常血氣痛只一服產後敗血衝心二服便下此神品藥也別方琥珀散有琥珀此卻無之亦贊其功而借名耳經驗方治婦人臍腹疼痛不省人事認為心氣痛誤矣木通芍藥炒五靈脂炒各等分醋水各半煎溫服功在五靈然必佐之以醋若木通芍藥一通一斂皆有妙用交加散治婦人經水不調腹中攝痛氣多血少結聚為瘕及產後中風生地黃生薑各五兩研取汁上交互取汁浸滓一夕汁盡為度各炒黃末之尋常腹痛酒調下三錢產後尤不可缺交加地黃丸治婦人經不調血塊脹痞腹痛生地生薑各一斤搗汁存滓延胡當歸川芎白芍各二兩乳香木香各一兩桃仁人參各五錢香附半斤上為末先以生薑汁浸地黃滓以地黃汁浸生薑滓曬乾皆以汁盡為度其十一味合一處曬乾研末醋糊丸空心薑湯下五七十丸瓦龍丸治瘀血作痛醋煮香附四兩當歸丹皮桃仁大黃蒸各二兩川芎紅花各五錢瓦龍子煅醋煮一晝夜二兩上為末炊餅丸空心溫酒下三四丸丹溪治血塊多用瓦龍子古方均用薑桂此用大黃宜熱宜寒智者別之桂枝桃仁湯治經候前偶感風寒腹痛不可忍桂枝芍藥生地各二錢桃仁七錢甘草炙各一錢上生薑三片棗一枚水煎溫服即桂枝湯法也芍藥用赤者妙一婦人冬月經行值途中傷冷遂經止不行腹痛不可忍予用此一劑而痛止經復行其效如神逍遙散治血虛煩熱口燥咽乾減食嗜臥月水不調當歸酒洗白芍炒白朮茯苓柴胡各一錢炙草五分上加姜三片麥冬二十粒去心水煎服不拘時一方加丹皮梔子名加味逍遙散一方加知母地骨皮有嗽加桑白皮貝母知母桔梗麥冬咳血加生地山梔丹皮嘔吐加陳皮半夏旋覆花嘈雜加姜炒川連或芩連二陳湯此方重在脾胃及行肝膽之滯故不用生地加味四物湯治衝任虛損月水不調肌膚髮熱四物各一兩加柴胡五錢黃芩二錢半如骨蒸四物加地骨皮粉丹皮一方四物加胡黃連極效六神湯治血氣不足肌體煩熱四肢倦怠不進飲食四物加黃耆地骨皮各一錢水煎空心服眉批按逍遙柴芩六神三方皆除熱而用意不同要皆不離乎血藥此婦科之旨也前方治陽勝則熱如肝陰不足而肝火獨甚者宜之脾胃壯者可加胡連此方治血虛而氣分有虛熱者二方氣血不同學者自當分別柴胡散治婦人寒熱肢節疼痛口乾心煩不欲飲食北柴胡赤茯苓黃耆白朮各一錢麥冬三錢鱉甲醋炙二錢人參地骨皮枳殼生地黃桑白皮赤芍桔梗甘草姜三片煎服參耆白朮益肺脾三焦元氣而治不欲食麥冬生地清心與包絡中火而生血並治口乾心煩柴胡鱉甲解骨節中熱而外散赤苓赤芍導心火散血熱而下行枳殼地骨皮桑皮瀉肺火散結氣於胸中亦補中有瀉之方也要知不用芎歸之旨乃妙柴胡四物湯治婦人日久虛勞微有寒熱四物合小柴胡湯姜三片水煎此是正治柴胡抑肝散治寡居獨陰無陽欲心不遂惡寒發熱如瘧柴胡二錢半川芎七分蒼朮一錢神麯八分香附一錢山梔一錢連翹五分青皮二錢丹皮一錢半地骨皮一錢生地五分赤芍一錢半甘草二分水煎空心臨臥服此方疏肝散郁乃丹溪越鞠丸之套方也生地黃丸治師尼寡婦寒熱如瘧欲男子不得者生地一兩赤芍一兩柴胡黃芩秦艽各五錢上為末煉蜜丸桐子大每服三十丸烏梅湯下日三服此方減當歸為厥陰肝經鬱火結血之劑小柴胡加地黃湯治婦人中風發熱惡寒經水適來晝則明爽夜則譫語如見鬼狀此名熱入血室亦治產後惡露方來忽然斷絕柴胡三錢半夏黃芩各二錢人參一錢五分甘草五分生地一錢五分上作一服姜三片棗二枚不拘時服眉批按此乃是治太陽傳經病蓋經來則血室虛邪乘虛入而為越經症血室與胃腑有氣血之分故譫語有晝夜之別如見鬼者肝家熱而魂不安也用小柴胡解表裡之邪生地涼血中之熱不愈針期門穴其加桃仁紅花及承氣抵當湯者各因其症而瀉之也又有不用涼而用熱如柴桂薑湯之類此治法也當發汗愈乾薑柴胡湯治婦人傷寒經脈方來熱入血室寒熱如瘧或狂言見鬼柴胡一錢桂枝三分瓜蔞根五分牡蠣煅乾薑炮炙草各三分上水煎服汗出而愈此以熱治熱法投之得當應如桴鼓投之不當殺人反掌牛黃膏治熱入血室發狂不認人者生牛黃二錢五分硃砂鬱金丹皮各三錢腦子甘草各一錢上為細末煉蜜丸桐子大每服一丸新水化下此真是心經藥要知子母相傳之理海蛤散治婦人傷寒血結胸膈宜服此藥及針期門穴海蛤滑石煅水飛甘草各五錢芒硝一兩上為末每服二錢用雞子清調下小腸通利其結血自散更用桂枝紅花湯發其汗則愈此非熱入血室證乃是血結胸膈針法俱妙發汗尤妙經閉當與調經門參看眉批總歌二陽之病發心脾血海無餘土已虧氣結痰凝良有說肝勞心損亦須知東垣指出三焦病學者宜將五臟推血滯血枯當有別通經不可浪施為類方實熱三和湯玉燭散二氣丸風冷千金桃仁丸晞露丸痰阻瓦龍丸血結血極膏氣滯琥珀散當歸散心虛茯苓補心湯柏子仁丸肝勞內經烏鰂方經閉成癆澤蘭湯柏子仁丸又生地黃丸灸四花穴又腰俞投北斗符傳口疰秦艽鱉甲散獺肝丸取勞蟲方符灸同上經云二陽之病發心脾有不得隱曲女子不月其傳為風消為息賁死不治二陽陽明也胃與大腸二經也發心脾言發於心脾也隱曲指陽道也本經云腎風之狀隱曲不利不月女子經閉也言在男子則隱曲不利在女子則月經不行也風消者脾病土虛風不乘克也息賁者心病火旺肺金受刑也二陽馬玄臺專主胃說以胃為化源故重胃而不重大腸也張景岳曰胃與心子母也人之情欲本於傷心母傷則害及其子胃與脾表裡也人之勞倦本於傷脾臟病連及於其腑此二陽之病所以發於心脾也不得隱曲陽道病也胃為水穀血氣之海主化榮衛而潤宗筋陰陽總宗筋之會會於氣街而陽明為之長然則精血下行生化之本惟陽明為最令化源既病則陽道外衰故不得隱曲在女子當為不月也隱曲馬玄臺指女子隱曲之事叔武叔卿曰人有隱情曲意則氣鬱心氣不開脾氣不化水穀日少不能變見氣血以入二陽之血海矣血海無餘所以不月也亦通經曰月事不來胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也胞脈者胞中之脈也衝任皆起於胞中故曰胞脈屬心者心主血脈也氣有餘便是火今心氣上迫肺不得下通衝任而為血故月事不來張景岳曰經閉一症血枯與血隔血隔即血滯也有如冰炭枯者竭也血虛極矣隔者阻也血本不虛而或氣或寒或積有所逆也隔者病發於漸其證或痛或實通之則行而愈若枯者其來也漸衝任內竭其證無形夫血既枯矣宜補養陰氣使血自充如與血隔同治則枯者益枯斃可立待也李東垣曰婦人脾胃久虛形體羸弱氣血俱衰致經水斷絕武叔卿謂當補脾胃蓋水入於經其血乃生谷入於胃脈道乃行水去榮散谷消胃亡況脾統諸經之血而以脾胃久虛致氣血俱衰者可不補益乎此言血枯當補脾胃王子亨曰婦人月水不通病本於胃胃氣虛不能消化水穀使津液不生血氣故也又醉以入房則內氣竭絕傷肝使月水衰少所以爾者肝藏血勞傷過度血氣枯竭於內也又先吐血或下血謂之脫血名曰血枯亦月水不來所以爾者津液耗減故也但益津液其經自下此言血枯當益津液虞天民曰婦人百病皆自心生經閉不通先因心事不足心血虧耗故乏血以歸肝而出納之用已竭經云母能令子虛是以脾不磨而食少所謂二陽之病發心脾者此也因食少故肺氣亦失所養而氣滯不行則無以滋腎陰況月水全賴腎水施化腎水既乏則經水日以乾涸而血枯之證形矣此言血枯當養心不治其血而治其心探源之論徐春甫曰心屬陽而主血脾裹血以行氣若月經不通未必不由心事不足思慮傷脾有所勞倦穀氣不輸肺金失養腎水無滋經血枯涸以致三五不調漸致閉絕惟養心則血生脾健則氣布二者和則氣暢血行而調經之要至矣此言血枯當調心脾蕭慎齋曰婦人經閉或因房勞過度內傷肝腎夫肝藏血內涵木火必賴天一之水以為滋榮若精竭於下則水不涵木而木火上騰或胸脅脹滿妨於飲食胃不能納脾失所輸日漸煎熬津液乾涸以致血枯經閉當從趙養葵滋水補肝之法此言血枯當補肝腎醫錄補遺云婦人血海滿則行然婦人性情執著比之男子十倍雖有虛症宜補亦當以執著為慮況月閉一症大半屬血虛氣結李東垣曰經閉不行有三或因勞心心火上行氣上迫肺心氣不得下通宜安心補血瀉火則經自行此上焦心肺有熱而經不行也或病中消胃熱善飢漸瘦津液不生夫經者血脈津液所化津液既絕為熱所爍肌肉漸瘦時見燥渴血源乾涸名曰血枯經絕宜瀉胃之燥熱補益氣血則經自行此中焦胃有熱結而經不行也或心包絡脈洪數躁作時見大便閉小便難而經水閉絕此血海乾枯宜調血脈除胞脈中火邪則經自行此下焦胞脈熱結而經不行也張潔古曰女子月事不來先瀉心火血自下也齊仲甫曰婦人月事不來因風冷客於胞門以血得溫則宣通得寒則凝泣也陳良甫曰血滯經閉宜破者原飲食毒熱或暴怒凝瘀積痰直須大黃乾漆之類推陳致新俾舊血消而新血生也若氣旺血枯起於勞役憂思自宜溫和滋補或兼痰火濕熱尤宜清之涼之每以肉桂為佐者熱則血行也但不可純用峻藥以虧陰道調和飲食自然血氣流通苟不務充養氣血惟以毒藥攻之是求千金於乞丐必死而後已婁全善曰婦人經閉有汙血凝滯胞門少腹㽲痛有熱有寒如熱而經閉者羅謙甫血極膏大黃為末醋熬成膏治婦人乾血氣大便利一二行經自下是婦人之仙藥也仲景抵當湯大黃桃仁虻蟲水蛭千金桃仁煎大黃桃仁朴硝虻蟲治血積月水不行若寒結汙血而不行云歧紅花當歸散紅花歸尾牛膝蘇木甘草赤芍劉寄奴桂心白芷紫葳即凌霄花治婦人室女經閉或積瘀血腰腹疼痛張子和曰一婦人經閉寒熱口乾頰赤食少旦暮間咳一二聲諸醫用虻蟲等峻藥以攻之余曰不然乃命止藥經云二陽之病發心脾心受之則血不流故女子不月既心受積熱宜抑火升水流濕潤燥開胃誘食湧出痰一二升泄水五六行濕水皆去經自來矣如用峻藥攻之月經縱來小溲反閉他症生矣凡精血不足宜補之以食大忌有毒之藥損傷胃氣而致天閼又月水不利用茶調散瓜蒂不拘多少奶茶中停末服二錢薤汁下吐之次用玉燭四物合調胃氣承氣三和四物合涼膈芎歸湯桂苓白朮散之類降心火益腎水開胃進食分陰陽利水道之藥也朱丹溪曰有婦人病瘧飲食少經脈不行診其脈兩手並無時寒月以虛寒治之並無倦怠驚曰前藥誤矣夫經不行者非無血也為痰所礙也無脈者非血衰少而脈絕也結痰生熱結伏而脈不見爾當作實熱治之用三花神祐丸六脈俱出神祐甘遂大戟芫花黑醜大黃又有積痰下流於胞門閉塞不行用厚朴二陳湯又有痰多佔住血海而不下者痰多血虛南星二朮黃連川芎末丸有肥人脂滿者加味導痰湯半夏陳皮茯苓甘草枳實黃連川芎生薑不用地黃泥膈故也如用薑汁拌炒導痰即二陳加枳實川連李氏曰經行與產後一般若其時余血一點未淨或外感六淫或內傷生冷七情鬱結為痰為瘀凝積於中曰血滯或經止後用力太過入房太甚及服食燥熱以致火動則邪氣盛而津液衰曰血枯陳良甫曰經行被驚則血氣錯亂逆於上則從口鼻出逆於身則血水相搏變為水腫恚怒則氣血逆於腰腿心腹背脅手足之間重痛經行則發過期則止怒極傷肝則有眩暈嘔血瘰癧血風瘡瘍等病加之經血滲漏遂成竅血生瘡淋漓不斷濕熱相搏為崩帶凝結於內變癥瘕凡此變證百出不過血滯與血枯而已重則經閉不通輕則經水不調不止虛與熱二者也葉以濟曰血滯不宜過於宣通通後又須補養血枯亦不可峻行補益補中又須參詳蓋血滯恐元氣有虧血枯恐變症百出也高明者當臨症應變戴復庵曰少女經脈已行一二次復至一二年又不行或四季一行或三五復至此本血脈柔弱未充故經脈斷續宜順氣養血氣血旺自通勿攻之寇宗奭曰人生以血氣為本人病必先傷血氣若室女童男積想在心思慮過度多致勞損男子則神色消散女子則月水先閉蓋憂愁思慮則傷心而血逆竭故月水先閉且心病則不能養脾故不嗜食脾虛則金虧故發嗽腎水絕則木氣不榮而四支幹痿多怒發焦骨痿若五臟傳偏則死自能改易心志用藥扶持庶可保生切不可用青蒿虻蟲等涼血行血宜用柏子仁丸澤蘭湯益陰血制虛火薛立齋曰經水者陰血也其為患有因脾虛而不能生血者有因脾郁傷而血耗損者有因胃火而血消爍者有因脾胃損而血少者有因勞傷心而血少者有因怒傷肝而血少者有因腎水不能生肝而血少者有因肺氣虛不能行血而閉者治療之法若脾虛而不行者調而補之脾鬱而不行者解而補之胃火而不行者清而補之脾胃損而不行者調而補之勞傷心血而不行者靜而補之怒傷肝而不行者和而補之肺氣虛而不行者補脾胃腎陰虛而不行者補脾肺經云損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精審而治之庶無誤矣眉批弦也沉也斷續也皆主痛而不利沉緊為寒在血分脈經云尺脈滑血氣實婦人經脈不利尺脈來而斷絕者月水不利寸關如故尺脈絕不至者月水不利當患小腹痛肝脈沉月水不利主腰腹痛腎脈微澀為不月脈弦苦少腹痛主月水不利尺脈來而續斷者月水不利當患小腹引腰痛氣滯上攻胸臆也經不通繞臍寒疝痛其脈沉緊此由寒氣客於血室血凝不利結血為氣所沖新血與故血相搏故痛經病血厥血厥者婦人平居無病忽如死人口噤目閉重者不救輕者移時乃寤此名血厥由汗多血少陽氣獨上氣塞不行故身如死氣過血還陰陽通復故移時方寤婦人多患此症與癇症迥別此條混見大方全書內今特表出之經曰諸乘寒者則為結鬱冒不仁其脈微弱初或嘔吐便爾昏沉陰陽乖隔榮衛不和比之中風身不發熱喉無痰聲手不搐握為異耳急宜握住頂心發令人扶起用通關散吹鼻起嚏有嚏則吉無則凶或以鐵錘燒紅以醋沃之薰鼻下令醋氣入內透膈立蘇口噤不能灌藥者針少商及三陽五會等穴或以竹筒吹其兩耳切不可灌熱湯蓋血得熱則泛溢犯胃衝心多致不救心為君主義不受邪一絲血入心即死矣治宜花蕊石散童便調服或蘇合香丸醋後白薇湯八珍散歸脾湯調理可也家秘曰經隧乖戾血上衝心所以神昏緩則不救治宜八寶丹眉批此症在產後謂之血暈在經病謂之血厥治法亦大同小異治血枯經閉玉燭散治胃熱消渴減食漸瘦津液為熱燥竭以致血海乾枯此即四物與謂胃承氣合方也四物合用生地大黃芒硝甘草各等分上銼每服八錢水煎食前服三和湯治勞心心火上行致胞脈閉經不來四物合涼膈四物用生地合大黃朴硝甘草黃芩梔子連翹薄荷各等分上銼每服八錢水煎此治勞心之實熱也如心虛而熱收於內與心虛而土衰者不宜妄用二黃散大黃燒存性二錢生地三錢上末空心好酒下二氣丸治月水不調斷絕不產面黃憔悴不思食有燥熱以柴胡引子相參服之大黃四兩另末醋一升慢火熬為膏當歸白芍各二兩上為末以膏子和丸桐子大每服二十丸淡醋湯下食前日三服以醋熬大黃作膏引之入肝行血也四方俱用大黃而配合不離四物自有輕重緩急不同宜加詳之五補丸補諸虛安五臟堅骨髓養精神凡胞脈閉先服降心火之劑後服此丸及衛生湯以治脾養血也熟地人參牛膝酒浸去蘆焙乾白茯苓地骨皮各等分上為細末煉蜜丸桐子大每服三五十丸空心溫酒下熟地以補天一之水人參以生天一之氣所謂水生於氣也然氣不降則水不生故用白茯苓以降天氣地骨皮以清氣中之火牛膝引之下行此立方大意眉批心胞是多血之經此胞絡當指心胞言衛生湯當歸白芍各二兩黃耆三兩甘草一兩上為末每服半兩水二盞煎至一盞空心溫服五補丸補水之源衛生湯行已生之血蓋地黃茯苓血人參俱補裡氣之不足而黃耆甘草又益表氣之不足當歸芍藥行肝血之不足有先後天之意焉潔古先服降心火之劑蓋亦芩連三和玉燭之類後服五補衛生者亦補氣之劑也柏子仁丸治血虛有火耗損經閉日漸羸瘦而生潮熱柏子仁炒另研牛膝酒洗卷柏各半兩澤蘭葉續斷各一兩熟地三兩酒浸半日搗成膏上為細末煉蜜丸桐子大空心米飲下三十丸夫血生於心心火旺則津枯而血不化故用柏子仁以潤心而生津火位之下水氣承之故用地黃以滋水其四種皆通血脈而續絕者也澤蘭湯澤蘭葉三兩當歸酒洗白芍炒各一兩甘草五錢上為粗末每服五錢水二盞煎一盞溫服治證同前十全大補湯治墮胎及多產育傷血或誤服汗下克伐之藥以致血衰氣乏而經不行者八珍合耆桂各二錢上作一服水煎溫服此方溫補氣血為主所謂勞者溫之損者溫之是也已上十方重在血枯一字治血澀經閉溫經湯治經不行繞臍寒疝痛脈沉緊此由寒氣客於血室血凝不行為氣所沖新血與故血相搏所以作痛宜此湯與桂枝桃仁湯當歸川芎白芍官桂牡丹皮蓬朮各一錢人參牛膝各一錢炙草五分上水二鍾煎一鍾服無時此溫行之劑也以四物去地黃恐凝滯耳人參得官桂能溫行故加之然諸痛忌參術亦有不必用者在人取之有法焉桂枝桃仁湯治證同前方見調經門疼痛條紅花當歸散治婦人經閉積瘀腹痛及室女經閉紅花歸尾紫葳即凌霄花牛膝蘇木細銼甘草各二兩赤芍九兩劉寄奴五兩桂心白芷各一兩半上為細末空心熱酒調下三錢食前臨臥再服若血久不行濃煎紅花酒下此皆破血之藥然不用川芎以行血海之血而用白芷以行陽明之經者以血海隸於陽明故也行經紅花湯治婦人室女經不行時作脹痛歸尾赤芍紫葳劉寄奴牛膝延胡紅花蘇木桃仁炒各一錢青皮香附各八分桂心五分此與前方不相遠而有青皮桃仁乃厥陰肝經藥要分別此義空心服土牛膝散治婦人室女血閉不通五心煩熱土牛膝歸尾各一兩桃仁炒紅花各半兩上為細末每服二錢空心溫酒下專主血閉曾藉此治婦人血塊作痛有效當歸散治血脈不通當歸穿山甲微炒蒲黃炒各半兩辰砂另研一錢麝香少許上為細末研勻每服二錢食前熱酒調下專主在脈絡桃奴飲子治婦人室女月經不通漸成脹滿及男子墜馬跌僕損傷致瘀血停積欲成血蠱悉皆治之眉批此脹滿根血瘀來桃奴桃樹上嫩桃干朽不落者冬月及正月收猳鼠糞即雄鼠糞也兩頭尖是也延胡五靈脂肉桂香附砂仁桃仁另研各等分上為細末每服三錢空心溫酒調下類聚濁陰之物以破汙積之血佐溫熱之味以行停滯之血氣蓋為血氣流也萬病丸治經事不來繞臍寒疝痛乾漆杵砂炒煙盡須青白如此一時牛膝去苗酒浸一宿焙乾各一兩上為末以生地汁一升入二藥末銀器內慢火熬可丸即丸桐子大每服二丸空心米飲或酒下妙在以生地汁熬破血藥大有見解以上諸方俱輕劑隨寒熱選用通經丸治經閉不通及血塊疼痛歸尾桃仁大黃煨丹皮乾漆炒煙盡肉桂牛膝莪朮各一兩三稜醋炒五錢麝香八分上為末皂角五錢芫花二錢水煎糊為丸桐子大每服五十丸米湯下不用虻蟲水蛭斑蝥之類是重劑中之輕劑最穩產寶方治月經不通腹中痛牛膝六分大黃桃仁炒細辛各五分川芎當歸各四分水蛭三分糯米炒黃上細末煉蜜丸桐子大每服二十丸空心溫酒下眉批水蛭須炒十分熱蓋生則害人也千金桃仁煎治血積癥瘕月水不行大黃濕紙裹煨桃仁炒朴硝各一兩虻蟲一兩去足翅炒黑上為細末醋二升半銀石器中漫水熬膏即入大黃虻蟲桃仁末不住攪可丸即入朴硝再攪良久出之丸如桐子大五更初溫酒下五丸至日午取下如赤豆汁雞肝蝦蠶衣樣候鮮紅住仍以調氣藥補之此涼行之劑血因熱結者宜之眉批虻蛭皆食血故用之以破血苟非血塊不宜用斑蝥道經丸治經候閉塞亦治乾血氣斑蝥二十個糯米炒桃仁四十九個炒大黃錦文者五錢上為細末酒糊丸桐子大空心酒下五丸甚者十丸一方加虻蟲半錢水蛭一錢大黃膏一名將軍丸治婦人乾血氣川大黃四兩為末釅醋成膏丸如雞豆大每服一丸酒化開臨臥溫服大便利一二行經脈自下是調經之仙藥也一方加當歸頭一方加香附二兩童便浸炒為末入膏丸桐子大熱酒下四十丸乾血氣者也故用大黃一味解熱通經其加當歸頭香附者一榮血一調氣也在人自擇之治痰結經閉加味導痰湯治軀脂經閉半夏陳皮茯苓甘草枳實黃連川芎加生薑水煎服經云氣上迫肺則心氣不得下通故月事不來今用連枳之類導痰降火使不上迫於肺故心氣下通而月事來也此治胃實痰盛之藥非為降心火也其通經止取四物中一味之最當者思之思之礬石丸治婦人經水閉臟堅癖中有乾血下白物礬石三錢燒杏仁一分上末煉蜜丸棗核大納陰中劇再納之眉批即蜜導之意通經下取方曾經試驗神效海蛤粉五錢苦葶藶牙皂各二錢半巴豆略去油天花粉五錢苦丁香紅娘子各一錢半麝香少許上為細末每一錢蔥汁同搗丸薄綿裹以五寸竹管納陰中候熱時先通黃水次則經行
