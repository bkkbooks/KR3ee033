body:
  text: 卷二血崩經云陰虛陽搏謂之崩陰虛者尺脈虛浮陽搏者寸脈弦急也是陰血不足陽邪有餘也痿論云悲哀太甚則胞絡絶胞絡絶則陽氣內動發為心下崩經云悲哀太過則心系急肺布葉舉而上焦不通熱氣在中故血走而崩也靈樞曰用力過度則絡脈傷陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於外運氣云少陽司天初之氣風勝乃搖候乃大溫民病血崩方氏曰血陰也靜則循經榮內動則錯經妄行蓋人之七情過極則動五志之火五志之火亢盛則經血暴下失期而來如風動木搖火燃水沸趙養葵曰氣血人身之陰陽也陽主升陰主降陽根陰陰根陽一升一降循經而行無崩漏也若陽有餘則升者勝血出上竅陽不足則降者勝血出下竅凡氣虛不能攝血而崩者其人必面白尺脈虛大久病者有之王海藏曰婦人血崩來如潮湧明是熱勢妄行豈可作寒論治法宜清補兼升提不可驟止丹溪云衝任為經脈之海外循經絡內榮臟腑若勞傷過極致臟腑氣虛而衝任之氣亦虛不能約制其經血故忽然暴下或陰陽相搏為熱所乘攻傷衝任血得熱則流故崩下治法氣虛者當益氣以攝血血熱者宜清榮以養血眉批脈見小者順洪大者逆馬玄臺曰婦人血崩從胞絡宮來血久下行已為熟徑則本宮血乏十二經之血從此滲漏然胞絡下繫於腎上通於心故此證實關心腎二經東垣用十二經引經之藥使血歸十二經然後用黑藥止之若徒用黑藥不先服領血歸經藥病亦難愈也張潔古曰崩者倏然暴下也漏者淋瀝不斷也將息失宜勞役過度喜怒不常大傷於肝肝為血府傷則不藏而為崩中漏下悲憂太甚陽氣內動真陰虛不能鎮守包絡相火致血走而崩宜養血安神為主脾胃氣虛下陷腎與相火相合濕熱下迫而致宜調脾養血為主丹溪曰有涎郁胸中清氣不升致經脈壅遏而降下非開涎不足以行氣非氣升則血不能歸隧道其證或腹滿如孕或臍腹㽲痛或血結成片或血出則快上則悶或臍上動治宜開結痰行滯氣消汙血王海藏曰或因胎産或因酒色澤液惡穢前行太過滓糞燥後後滯不通此胎腸俱病治宜推去敗血膿積益血致新也戴原禮曰血大至曰崩或清或濁或純下瘀血熱不可止有崩甚腹痛人多疑惡血未盡又見血色瘀黑愈信惡血之說不敢止截大凡血之為患欲出未出之際停在腹中即成瘀血以瘀為惡又焉知瘀之不為虛冷乎故瘀而腹痛血行則痛止崩而腹痛血住則痛止芎歸湯加姜附止其血而痛自止東垣曰人身中陽氣升浮穀氣上行則陽生陰長春夏是也既崩則周身氣血皆不生長穀氣不升前雖屬熱下焦久脫已化為寒久沉久降寒濕大勝當急救之瀉寒以熱降濕以燥大升大舉以助生長補養氣血不致偏枯經云風勝濕以所勝平之也薛立齊曰有婦人患崩過服寒藥脾胃久虛中病未已寒病復起煩渴引飲粒米不進昏憒時作脈洪大按之微弱此無根之火內虛寒而外假熱也十全大補加附子崩減日服八味丸愈齊仲甫曰受熱而色赤者謂之陽崩膠艾湯受冷而色白者謂之陰崩固經丸五臟虛冷五色隨崩俱下五臟俱虛五色相雜謂之五崩陳良甫曰婦人血崩心痛名殺血心痛由心脾血虛也若小産去血過多而心痛者亦虛也烏賊骨炒末醋湯下失笑散薛立齊曰血崩兼心痛者心主血去血過多心無所養以致作痛十全湯倍參術多服如瘀血不行者失笑散陰血耗散者烏賊丸收斂之李太素曰崩為急證漏為緩病崩是大怒傷肝衝動血海或火盛之極血熱沸騰而然漏則房勞過度傷損衝任二脈氣虛不能約制經血或其人平素多火血不能安故不時漏泄崩宜理氣降火升提漏宜滋陰養氣養血或兼制火薛立齊曰人以脾胃為本納五穀化精微清者入榮濁者入衛陰陽得此是謂橐籥人得土以養百骸失土則枯四支東垣以飲食自傷醫多妄下清氣下陷濁氣不降乃生䐜脹所以胃脘之陽不能升舉其氣陷入中焦當用補中湯使濁氣得降不治自安若因飽食後致崩漏是傷脾氣下陷於腎與相火合濕熱下迫所致宜甘溫之劑調補脾胃則血自歸經若誤用寒涼損傷胃氣不能攝血歸經東垣曰凡下血證須用四君子收功斯言厥有旨哉金匱云寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏脈則為革婦人則半産漏下尺脈急而弦大風邪入少陰之經女子陰白下赤漏血下赤白不止脈小虛滑者生大緊實數則死漏下赤白日下血數升脈急疾者死遲者生又脈見小者順洪大者逆血崩集方四君子湯四物湯補中益氣湯八味丸歸脾湯逍遙散治血熱崩漏荊芥四物湯治崩漏初起不問虛實服之立止四物加荊芥穗炒條芩炒香附各一錢如不止加防風升麻白朮蒲黃一方加地榆尤妙一方四物加芩連梔子黃柏一方並加膠艾武叔卿曰血藏於肝肝氣不升則熱迫於下故血不能藏而崩也況厥陰之經環陰器廷孔前陰皆屬之荊芥升肝氣香附理肝氣條芩除內熱四物中生地白芍養血涼血故能收功也膠艾四物湯治崩漏不止及損動胎氣漏血四物加膠艾各一錢炙草五分水酒各半煎空心服眉批此方入勞傷類不宜血熱崩漏奇效四物湯治肝經虛熱血沸騰久不止膠艾四物湯去甘草加黃芩炒一錢水煎服眉批此方用熟地以補肝之母以阿膠黃芩益肝之氣艾葉溫下元以助真氣之升所謂陰從陽起也河間生地黃散治經漏下血脈虛洪色紫黑生地熟地白芍黃耆枸杞子天冬地骨皮柴胡水煎服便血者加地榆武叔卿曰脈虛洪者氣不足也色紫黑者熱之甚也黃耆所以補氣氣盛則生火天冬地骨以清氣中之火熟地所以生血血生而不涼尤慮妄行故以生地黃連涼心芍藥甘草緩肝益脾柴胡升舉枸杞地黃又肝腎同歸者也涼血地黃湯治血崩腎水汙不能鎮守胞絡相火生地歸尾各五分黃連黃柏知母藁本川芎升麻各二分柴胡防風羌活黃芩細辛荊芥蔓荊炙草各一錢紅花少許水煎空心稍熱服眉批慎齊曰血崩不止則血去過多矣方中風藥大半不敵生地一味獨不慮風藥燥血乎雖云升舉而血之耗者已多用者酌之武叔卿曰經云陰者從陽而亟起也血屬陰陰不自升故諸經之血必隨諸經之氣而後升若氣有所陷則熱迫血而內崩矣故用黃柏以清下焦胞絡之火心者火之主也故以生地黃連治火之原知母黃芩滋水之母歸尾破瘀紅花生血所以去故生新也川芎行血海之餘蔓荊涼諸經之血升柴羌防藁本細辛諸風藥皆所以升諸經之氣也諸經氣行則陰血不得不隨之而起矣故曰從陽亟起也簡易黃芩湯治崩中下血陽乘陰所謂天暑地熱經水沸溢者黃芩研細末每服三錢霹靂酒下即燒稱錘酒一方荊芥湯下治勞傷崩漏當歸芍藥湯治勞傷脾胃經漏氣短其色鮮紅自汗身熱惡食支倦便泄黃耆一錢半白朮蒼朮泔浸當歸白芍各一錢熟地五分生地三分陳皮五分柴胡二分炙草三分眉批據見證悉屬脾胃氣虛當用補中益氣為主此方不用人參升麻何也蒼朮氣悍燥散其色鮮紅又何用之況與生地同用豈不為時人所笑要之古人皆因症立方俱求至理所在而不必拘方以試病也東垣為一婦制此方諸證悉去蓋血虛須兼補氣血猶水也氣猶堤也堤堅則水不橫決氣固則血不妄行此方黃耆最多白朮次之所以神效俗醫不達此理專用涼藥不知涼藥傷胃正氣愈弱血安得固補中益氣湯歸脾湯氣猶夫也血猶妻也血隨氣升夫倡婦隨之道耳夫營出中焦脾胃氣虛則中氣下陷是營血失其主矣此方益營助脾而以氣藥為君者正此意柏子仁湯治婦人憂思過度勞傷心經不能藏血遂致崩中下血不止柏子仁炒香附炒芎藭鹿茸擦去毛酒蒸焙茯神當歸各一錢半川斷二錢阿膠炒遠志去心各一錢炙草五分上生薑五片水煎空心服心脾氣虛氣結者宜之鹿茸乃陰中至陽陰體而陽用也非血脫氣衰者不用此濟生方也而立齊加柴梔以清厥陰之火以升肝脾之氣養血平肝散治大怒經血暴下當歸酒浸白芍炒香附炒各二錢青皮柴胡川芎生地各八分甘草五分水煎食前服以大怒而用是故曰平肝香附青皮柴胡白芍甘草川芎緩肝疏肝升提肝氣當歸生地養血榮肝然所重在大怒故立方如此治崩漏氣陷益胃升陽湯黃耆二錢人參有嗽去之神麯炒各一錢半白朮三錢當歸酒浸陳皮炙甘草各一錢升麻柴胡各五分生黃芩二錢瀉盛暑之伏熱刑金秋涼不用上為粗末每服三錢或五錢如食添再加之如食減已定三錢內更減之不可多服每服二錢水煎去滓熱服如腹痛每服加白芍二分中桂少許口乾渴加乾葛二分如嗽去人參如服此不止卻服後方柴胡調經湯大舉大升之也眉批以食增減為藥增減可見古人用藥有法眉批川芎酒治崩中晝夜不止川芎一兩生地汁一盞上酒五盞煮川芎一盞去滓下地黃汁再煎二三沸分三服此方以酒煎川芎配生地汁自有妙用甚奇甚奇用酒之意便是升法崩漏丸肉桂人參黃耆白朮甘草羌活獨活柴胡防風藁本細辛川芎歸身熟地白芍桃仁紅花論曰氣血人身之陰陽也陽主升陰主降陽根乎陰陰根乎陽一動一靜互為其根則一升一降循經而行無崩漏之患若陽有餘則升者勝血從上竅出陽不足則降者勝血從下竅出是丸也參桂耆朮草壯陽益氣之品也二活柴防藁細芎升陽舉經之品也歸地芍桃仁紅花滋陰入血之品也壯陽則氣不虛舉經則血不陷滋陰則血不燥如是因血為氣守氣為血衛升降上下一循乎經何自而崩和劑震靈丹治崩中下血脈虛細手足或冷川芎歸湯加木香煎送或陳皮香附煎湯下三元或靈砂丹亦可兼治暴驚凡九竅出血獨參湯下赤石脂禹餘糧紫石英代赭石四味打碎入鹽泥固罐內封口煅通紅埋地內七日出火毒五靈脂去砂二兩硃砂一兩研飛乳香沒藥各二兩上為末糯米糊丸芡實大每服一丸空心酒下婦人醋湯下桂枝茯苓丸治婦人有癥在臍上動下血不止桂枝茯苓丹皮桃仁白芍上為末煉蜜丸兔屎大食前服一丸不知加至三丸旋覆花湯治半産漏下脈弦而大旋覆花三兩蔥十四莖新絳少許上水三升煮一升頓服本草云旋覆主留飲結氣半夏丸直指治崩中帶下痰喘氣急虛腫亦消宿瘀圓白半夏刮淨槌扁薑汁調飛過白麵作餅包炙黃色去面取半夏作末米糊丸緑豆大每服十丸溫熱水下芎歸湯沉香降氣湯各半煎送止血要藥東垣曰血脫益氣古法也先補胃氣以助生長故曰陽生陰長諸甘藥為之先務舉世皆以為補氣殊不知甘能生血此陽生陰長之理也故先理胃氣人之一身內谷為寶補中益氣方加神麯黃芩名益胃升陽湯以起婦人血崩之屬氣下陷者柴胡調經湯治經水不止鮮血頃崩急腦痛脊骨強痛不思飲食羌活獨活藁本升麻各五分蒼朮柴胡七分葛根當歸炙草各三分紅花少許水煎稍熱空心服微汗立止要知鮮血不用清涼而用升舉當在不思飲食上揣摩外症屬太陽者多而藥又兼少陽陽明太陰厥陰且君以蒼朮少加當歸紅花引入血分以升陽氣乃為之大舉大升此從陰引陽之義也升陽除濕湯黃耆蒼朮羌活各一錢半藁本升麻柴胡炙草各一錢當歸酒浸獨活各五分蔓荊子七分上水五大盞煎一大盞稍熱空心服少時以早膳壓之可一服已如灸足太陰脾經中血海穴二七壯或三七壯立已此藥乃從權衡之法用風勝濕為胃氣下降陷而氣迫於下以救其血之暴亡也若病愈經血惡物已盡主病雖去後必須以黃耆甘草人參當歸之類數服以補之於補氣升陽湯中加和血藥是也若經血惡物下之不絶尤宜救其根源治其本經只益脾胃退心火之亢乃治其根蒂也若遇夏月白帶下脫漏不止宜用此湯一服立瘥武叔卿曰升陽除濕湯治女子漏下惡血或暴崩不止夫土陷則濕故怠惰嗜臥木鬱則熱故氣上衝緩為濕之徵弦為木之象鬱而不伸則熱此心火乘脾也脈之洪大者火在下也胞絡為相火寄於命門為多血之經病從火心火以藏德為神相火聽命於心三焦主氣胞絡主血故血分之火專主胞絡氣分之火專主三焦鬱則火不得遂炎上之性迫於血分故陰絡傷也方以蒼朮升麻發太陽陽明之濕柴胡防風達厥陰少陽之術羌活藁本以升舉少陰太陽下部之郁所謂下者舉之也但升散之物過則耗氣而傷金故又以黃耆保肺當歸引血使各有所歸甘草和氣蔓荊涼血此四種又制亢害之法也治崩漏血瘀昏暈疼痛五靈脂散治血崩不止及昏不省並治産後惡血心腹脅痛不可忍五靈脂不拘多少炒令煙盡研末每服三錢水酒童便各半盞煎八分頓服名抽刀散五靈行汙濁之血如神童便降火亦行血分酒同煎尤妙煮附丸方見調經疼痛條備金散治婦人血崩不止香附炒四兩歸尾一兩二錢五靈脂炒一兩上為細末每服五錢醋湯調下空心服立效眉批崩而內有瘀者宜之治崩漏虛寒丁香膠艾湯治崩漏不止蓋心氣不足勞役及飲食不節所得經隔少時其脈兩尺俱弦緊而洪按之無力其證自覺臍下如冰求厚衣被以御其寒眉批東垣所論脈證必悉宜宗之白帶白滑之物雖多間下如屋漏水下時有鮮血不多右尺脈時微洪屋漏水暴下者是弦急脈為寒多脈洪時見乃熱少合而言之急弦者北方寒水多也脈洪時出者命門胞絡之火也黑物多赤物少合成屋漏水之狀也眉批以寒多故用藥必溫當歸一錢二分白芍熟地各二分川芎丁香各四分阿膠炒六分後入艾葉一錢後入上為細末作一服水二盞煎五沸去滓入膠艾再煎至一大盞空心宿食消盡帶熱服三服效斷下湯治衝任氣虛崩中漏下臍腹痛漸減飲食四肢乏力及帶下三十六疾悉能療之人參熟地艾葉醋炒各一兩烏鰂骨燒灰當歸酒洗各二兩阿膠蛤粉炒川芎各七錢炮姜半兩叔卿曰此即膠艾四物之變局也彼有芍藥此有人參烏賊乾薑大概血虛而不斂者宜芍藥酸寒以收之氣脫而不溫者宜參薑烏之類溫補而澀之阿膠者益金水以成收藏之用也陽虛則寒陰虛則熱故以此主之而腹痛一證人皆以為瘀血者多此以為痛不止者服熟附丸正元禮所謂崩而腹痛者崩止而痛除也熟附丸熟附子木賊去節龍骨煅赤石脂煅各五錢川芎當歸各一兩上末醋丸桐子大每服五六十丸食前米飲下鹿茸丸治經水過多色瘀黑甚者崩下呼吸少氣臍腹冷極汗出如雨尺脈微小由衝任虛衰風冷客於胞中氣不能固可灸關元百壯在臍下正中二寸鹿茸燎去毛酥炙赤石脂制禹餘糧制各一兩當歸熟地續斷各二兩附子炮艾葉一方無柏葉各半兩上末酒糊丸桐子大每服三十丸空心溫酒下蜜丸亦可武叔卿曰丹溪以紫黑為熱此言瘀黑者乃下焦氣寒血凝而黑各有治法然女子氣海在上血海在下故下焦溫而後氣升血行如鹿茸以血成形由氣而長血隨氣上而成角故入血分以主升又以附子艾葉佐而溫之石脂餘糧鎮而固之柏葉清之歸地續斷補之誠下元虛寒之全方也不加人參豈無意焉而灸關元之意可想矣治崩漏虛脫伏龍肝散治氣血勞傷衝任脈虛經云非時忽然崩下或如豆汁或成血片或五色相雜或赤下相兼臍腹疼痛經久不止令人黃瘦食減無力虛煩口乾驚悸伏龍肝赤石脂各一兩川芎三兩熟地艾葉微炒各二兩麥門冬去心一兩五當歸乾薑各七錢半肉桂甘草各五錢上粗末每服四錢棗一枚水煎服武叔卿曰五色者五臟之色也崩久則五臟氣陷血不能化故五色見焉蓋血生氣而化於中焦氣生於下元而培於脾胃如臍腹疼痛者下元氣寒也以艾葉溫之黃瘦食減無力者中焦氣寒也以乾薑暖之優龍肝有火土相生之妙君以川芎有扶肝行濁之能肉桂甘草和榮衛而通血脈麥冬熟地益金水而治虛煩口乾口脂當歸補血以固脫通之澀之溫之濡之誠治久脫臟寒之良方也柏黃散療經血不止側柏葉一兩黃芩一兩二錢蒲黃一兩伏龍肝二兩水煎分二服丹溪云柏性多燥蒲黃散治崩中不止炒蒲黃炒破故紙千金古石灰炒各等分上為細末每服二三錢淡酒或醋湯下此燥澀之劫劑也又可治白帶霹靂散治經脈妄行香附三兩川芎古石灰油炒各一兩上為細末燒稱錘淬酒調服二錢匕武叔卿曰前方溫下元以止血此方調血氣以燥澀石灰油炒慮其燥也霹靂之名乃燒稱錘投酒中之聲亦取其聲應之速也鹿茸散治崩中漏下不止虛損羸瘦鹿茸一兩去毛塗酥炙微黃白龍骨熟地白芍鱉甲塗酥炙令黃白石脂川斷烏鰂骨炙各一兩肉蓯蓉一兩半酒浸去皮炙乾上為細末每服二錢食前粥飲調下鱉甲是下部陰藥而通腎脈之陽自春齊節節而下以至於陰內蓯蓉是下部陽藥有益坎中之陽而補真火故曰黑司令若其餘可類推矣補宮丸治諸虛不足久不娠妊骨熱形羸崩中帶下錦片木賊棕櫚柏葉艾葉乾漆鯽鱗鯉鱗血餘當歸各等分燒存性研末麝香少許研上研勻每服二錢空心溫酒調服十灰丸治崩中下血不止綿黃絹艾葉藕節蓮房棕櫚發馬尾蒲黃赤松皮各等分燒灰存性研細末上醋煮糯米糊丸桐子大每服七十丸如至百丸空心米飲下五灰十灰皆取其黑如百草霜京墨之意如前方中所未備而此復出之以成方若令人知有所取也蓮房及藕節通血脈而散血其節與房皆斂虛就實而味澀房成於升類木之象有收陽歸陰之理故用之以澀血黃絹綿綿皆蠶絲所成蠶食桑而吐絲扶桑之木受青陽之氣稟少陽升生之性能和肝膽之陽以養厥陰之血故神仙一切服食藥不得桑柴煎不食以其火不文不武而具溫生之氣也蠶砂治崩止血豈漫言哉百草霜乃百草之煙墨亦鬆煙所造草得乙木之陰味多苦松有清貞之操味多澀取之以煙則上升取之以黑則制火松皮灰亦此意諸魚屬火而生居水中是水中之火惟鯽魚生於四季故得土者多其臭腥腥先入肝以助肝氣之升鱗甲者金之用也火主上升金主收澀又得土之性故其用如此馬者乾之陽尾者血之尾血潤下而生尾尾生於陽體盡處是陽中之陰也以陰血之餘生於純陽之體又有陰中陽之義凡血脫於下乃陰無陽以升此借陽中之陰以鼓陽升陰又借其灰以為止澀之用皆良法也如聖散棕櫚烏梅肉乾薑一兩五錢並燒存性白薇牡蠣白芍鹿角霜山藥白朮茯苓白芷烏鰂骨各等分上為末麵糊丸桐子大每五十丸空心米飲下一方治婦人血崩蠶砂炒一兩伏龍肝五錢阿膠一兩上為末空心溫酒調服二三錢大全名無此散無阿膠蠶食桑而糞砂有清香涼燥之能單服之亦驗以頭二蠶者佳為有生生之妙也血見黑則止醫學綱目曰氣陷者用升氣藥灰止之夏枯草荊芥之類是也血熱者涼血藥灰止之槐花黃芩之類是也氣滯者行氣藥灰止之醋炒香附之類是也血瘀者炒熟失笑散之類血寒者用熱炮薑桂之類血脫者用澀白礬百草霜棕灰之類五灰散治下血不止成血崩蓮蓬殼黃絹血餘百草霜棕皮以上共燒灰山梔炒黑蒲黃炒京墨血竭上為末水調服十灰散治下血不止上細末每服二錢烏梅酒下空心服久患不過三服一方當歸白芍乾薑棕櫚各等分上各煅存性研細末醋調以有節朱筋左攪四十九轉食前服治血崩屢效眉批此方以血藥入乾薑有從治之妙而左攪四十九轉寓少陽生數之義亦咒由法烏紗帽散又名琥珀散治血崩不止赤芍當歸香附乾荷葉男子發皂莢水洗棕櫚烏紗帽是漆紗頭巾取陽氣上衝故也上各等分於新瓦上煅黑存性三分為細末每服五錢空心童便調下如人行十里久再進一服即止若産血去多加米醋京墨麝香少許荷葉清芬可以升肝膽之氣而涼血烏紗染五倍故能止血又有生漆可以破瘀取常用者升陽之意立效散當歸蓮花心白綿子紅花茅花各一兩上銼豆大白紙裹泥固煅存性為末每三錢溫酒調服蓮花心性澀而香可以通心氣之和烏金散棕櫚毛燒存性一兩龍骨煅過一錢上為細末研勻每三錢空心好酒調服二服立止香礬散香附醋浸一宿炒焦存性為末一兩白礬末二錢上研勻米飲調空心服神效一方用荷葉調尤妙一方荊芥穗燈火燒焦為末每服三錢童便調下眉批荊芥入肝清而升舉乃血中要藥一方黃牛角尖燒黑灰微存性研末調服一方鹿角燒灰細研食前溫酒調下二錢一方夏枯草燒存性為末米飲調下眉批夏枯草是厥陰經養陰之藥一方百草霜二錢狗膽汁拌分二服當歸酒調下眉批用狗膽汁甚奇然亦陽中陰藥也同百草霜如妙一方京墨為末二錢匕同燒露蜂房為末三指撮酒調服一方新綿一口燒研末空心酒調下立止名一笑散一方棉子花銅器炒煙盡為末空心溫酒調下二錢眉批棉子暖下元而止血一方衣中白魚殭蠶為末井花水調下日三服瘥帶下素問曰任脈為病男子內結七疝女子帶下瘕聚王太僕注任脈起胞中上過帶脈貫於臍上起於季脅章門似束帶狀名曰帶又脾傳之腎名曰疝瘕小腸冤結而痛出白名曰血蠱出白溲又少腹冤熱溲出白液又思想無窮所願不得意淫於外入房太甚發為白淫慎齊曰經文三條序帶下為任脈小腸經之病而其因或得之思想入房所致也經文白蠱白液白淫即男子白濁之類然思想無窮入房太甚乃夢遺症也與帶下有別仲景曰婦人年五十病下利數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥何也曰此病屬帶下何以故曾經半産瘀血在少腹不去何以知之其證唇口乾燥故知之當以溫經湯主之方見調經門王叔和曰婦人帶下腸中有膿為榮衛相干血為敗濁有可下不可下之異按準繩云帶下敗膿腥穢殊甚遂至臍腹冷痛用白芷一兩單葉紅蜀葵根二兩白芍白礬燒枯各半兩為末蠟丸桐子大空心米飲下十丸或十五丸候膿血盡以補藥佐之嚴用和曰聖惠元方皆云婦人帶下由勞傷衝任風冷據於胞絡蓋婦人平居血欲常多氣欲常少百疾不生或氣倍於血氣倍生寒血不化赤遂成白帶若氣平血少血少生熱血不化紅遂成赤帶寒熱交併則赤白俱下其脈右尺浮浮為陽陽絶者無子若足冷帶下輕則漏下其則崩中皆心不榮血肝不藏血所致楊仁齊曰由於風冷宿停官桂乾薑細辛白芷先散其寒然後為封固用二術人參以補氣眉批倍字作滯字看李氏曰平時陰陽過度及産後亡血下虛凡邪乘虛入於胞絡宜暖寶丸加姜附吳茱萸或黃耆建中湯去桂加當歸良方曰婦人帶下其名有五因經行産後風邪入於胞門傳於臟腑而致之若傷足厥陰經色如青泥傷手少陰經色如紅津傷手太陰經形如白涕傷足太陰經黃如爛瓜傷足少陰經黑如衃血戴氏曰赤白帶下皆因七情內傷或下元虛冷感然一端並宜順氣散吞震靈丹仍佐艾附力或米飲調沙參末帶下不止或成尪羸者四物湯加煅牡蠣粉半兩吞固腸丸多服取效有帶疾愈後再發或一二月或半年先血而後帶來不可遏停蓄未幾又復傾瀉此名漏帶最為難治張子和曰帶下主乎風冷皆非也夫治病當先識經絡人身大經有十二奇經有八脈十二經與八脈通身往來上下流走晝夜不息惟帶脈起少腹季脅之端乃章門穴也環周一身絡腰而過如束帶之於身難經云帶之為病溶溶如坐水中衝任者經脈之海也循腹脅夾傍傳流於氣衝屬於帶脈絡於督脈督脈者起於關元穴任脈者女子養胎孕之所督脈乃是婦人督領婦人經脈之海也衝任督三脈同起而異行一源而三歧皆絡於帶脈統於篡戶循陰器行廷孔以帶脈束之因余經上下往來遺熱於帶脈之間客熱抑鬱熱者血也血積多日不流從金之化而為白乘少腹冤熱白物滿溢隨溲而下綿綿不絶是為白帶多不痛或有痛者因壅礙而成也經曰少腹冤熱溲出白液冤者屈滯也病非本經為他經冤鬱而成此疾皆從濕熱治之遺熱於小腸從金化而為白與治痢同法赤白痢乃邪熱傳於大腸赤白帶邪熱傳於小腸故治二證不可驟用峻熱藥燥之燥之則內水涸內水涸則必煩渴煩渴則小便不利則足腫面浮漸至不起治法先以導水禹功瀉之次以淡劑降心火益腎水下小溲利水道則愈矣眉批叔卿曰元禮為丹溪弟子而相背如此自是一種翻案漏下之名始此亦或升補可愈也潔古曰此濕熱冤結不散為病也先以十棗湯下之後服苦楝丸大延胡索散此先攻後補法也汪石山曰帶證色有赤白之分病有氣血之異與痢相似盡由中氣虧敗運動失常致濕熱鬱結於下焦帶脈之分滲流而下故名帶下治先清濕為主必須卻厚味以防濕熱之氣故丹溪論赤白帶下由七情內傷使下元虛憊致濕熱痰積乘虛下流叔和謂崩中日久為白帶崩中日久者下元虛憊之意治法羅太無謂十棗湯神祐丸玉燭散皆可用但虛弱者不可峻攻丹溪用升提法真妙諦也丹溪曰赤屬血白屬氣屬痰俱是胃中痰積流下滲入膀胱宜用升舉無人知此肥人多屬濕痰瘦人帶病少如有屬熱痰用半夏南星蒼朮海石炒黃柏青黛川芎椿樹皮之屬治結痰白帶先於半飢時津下小胃丹十餘粒至鬱結行用白朮四物諸藥補之此先攻後補法也血虛加減四物氣虛以參朮陳皮間用之主治以燥濕為先甚者固腸丸若有相火動者諸藥中加炒黃柏滑脫加龍骨赤石脂方約之曰帶脈總束諸脈使不妄行如人束帶而前垂也婦人多鬱怒傷肝肝屬木脾屬土肝邪乘脾則土受傷而有濕濕生熱熱則流通故滑濁之物滲入膀胱從小便出古人作濕寒治以辛溫丹溪作濕熱治以苦寒不知苦寒正治也辛溫從治也如濕熱拂鬱於內腹痛帶下非辛溫從治能開散之乎若少腹不痛止下赤白帶雖有濕熱而氣不鬱結用苦寒治之為當也眉批木鬱不伸便能生濕闌門既能泌別清濁則滑濁之物未必皆能滲入膀胱而從溺道出也如交腸病豈由膀胱來即東垣云診得心包尺脈微白物下流是本經血海將枯津液復亡不能滋養筋骨用以潤燥而滋精液補陽以生血脈瀉肺而救上熱名補經固真湯繆仲淳曰婦人憂思鬱怒多患帶下蓋肝氣鬱則脾受傷脾傷則濕土之氣下降是脾精不守不能輸為榮血而下白滑之物皆由肝木鬱於地中使然法當開提肝氣補助脾氣蓋以白帶多屬氣虛故健脾補氣要法也若帶下如米泔水腥穢臭者濕熱勝也亦有脾胃氣虛不能約制其水而濕痰下墜者宜二朮茯苓芩柏車前主之佐以升提若帶下如雞子清者脾腎虛極也面色必不華足脛必浮腰腿必痠宜五味子八味丸間用開脾養心之劑如歸脾湯之類陰虛有火宜六味丸加菟絲子五味車前黃柏叔和云崩中日久為白帶漏下時多骨水枯言崩久氣血虛耗白滑之物下不止耳此證雖有氣血寒熱之分總屬氣虛下陷若赤帶多因心肝火熾久而陰血漸虛中氣漸損遂下赤帶治宜養心為主兼和肝緩中涼血清氣赤帶久不止則血虛宜膠艾四物湯加童便煅牡蠣粉棗仁麥冬趙養葵曰帶者奇經八脈之一也八脈俱屬腎人身帶脈統攝一身無形之水下焦腎氣虛損帶脈漏下白為氣虛赤為有火治法俱以補腎為主有脾虛者六君加升麻有氣虛者補中湯肝虛者逍遙散兼六味丸李氏曰凡崩中帶下或用升提如升陽調經湯或用收澀如伏龍肝散然暫止而終不止者何哉蓋衛司開闔而為榮血之主脾胃為血海水液之會衛氣與胃氣俱虛則血與水無所約制是以古方有用桂枝湯加附子以固衛氣者四君子湯加草果丁香木香以燥水健脾者或用理中湯加陳皮半夏或半夏丸用芎歸湯煎下或補中益氣湯平胃散皆補衛厚脾使氣血自循故轍而不專於收澀以劫奪之也眉批收澀劫奪皆是奇兵用之合宜便是正法又白滑如涕下流腥臭者黃耆建中湯去桂加當歸水煎吞苦楝丸久不止臍腹引陰冷痛者東垣固真丸虛中有火者補經固真湯大烏雞丸常用氣虛四君子湯血虛四物湯有火加黃柏有寒加桂附寒始因亡血復亡其陽陽氣虛極帶下腥臭多悲不樂桂附湯腹痛陰冷者四物湯加桂附常用酒煮當歸丸小烏雞丸琥珀調經丸準繩云帶不下久而枯涸者濡之凡大補氣血皆所以之如以四物湯為末煉蜜丸梧子大空心米飲下三四十丸以療年高婦人白帶良驗皆潤劑也吳梅坡曰婦人下赤白而不甚稠者曰白淫與男子白濁同系於相火如龍雷之擾而不澄清也屬足少陰足太陰治當清補為主如有滑白稠黏者謂之帶下屬心包手厥陰少陽即如男子自遺之精甚如砂石之淋原乎心包系乎脊絡於帶脈通於任脈下抵湧泉上至泥丸治宜血肉之劑以培之此窮源探本之論時人泥於常套作流痰治以牡蠣龍骨地榆膠艾之類澀之和以四物加以升提殊不知根本損傷以致腐敗而來彼寒滯不清之物則益加其滯升提不正之氣則愈增其鬱惟以六龍固本丸十六味保元湯主之薛氏曰徐用誠云帶下白屬氣赤屬血東垣云血崩久則亡血故白滑之物下流未必全拘於帶脈亦有濕痰流注下焦或肝腎陰淫之濕勝或因驚恐而木乘土位濁液下流或思慕為筋痿戴人以六脈滑大有力用宣導之法此瀉其實也東垣以脈微細沉緊或洪大而虛用補陽調經乃兼其虛也丹溪所用海石南星椿根皮之類乃治其濕痰也竊謂前症皆當壯脾胃升陽氣為主佐以各經見證之藥色青屬肝小柴胡加山梔防風濕熱壅滯小便赤澀用龍膽瀉肝湯肝血不足或燥熱風熱用六味丸色赤屬心小柴胡加黃連山梔當歸思慮過度用妙香散等藥色白屬肺補中益氣加山梔色黃屬脾六君子加山梔柴胡不應用歸脾湯色黑屬腎六味丸氣血俱虛八珍湯陽氣下陷補中益氣湯濕痰下注前湯加茯苓半夏蒼朮黃柏氣虛痰飲下注四七湯送六味丸不可拘肥人多痰瘦人多火而以燥濕瀉火之藥輕治之也慎齊曰經論三條原其始也仲景叔和以瘀血敗膿為內傷症用和子和以風冷濕熱為外邪症皆指實症而言若東垣以血海將枯津液復亡是原其病在血虛也仲景淳以脾精不守元氣下陷是原其病在氣虛也養葵更推原帶脈為病下焦腎氣虛損所致尤為探本之要至於治法子和太無潔古用攻下之法也丹溪約之諸人用攻補兼施之法也至李氏薛氏以厚脾壯胃立論與東垣仲淳之旨共貫矣吳梅坡以補腎固本為治與養葵之旨有先得矣針灸穴三陰交在內踝上三寸天樞在臍旁二寸氣海在臍下一寸半血海在膝臏上內廉中極在臍下四寸豐隆在外踝上八寸水道在大巨下三寸脈法脈經云婦人帶下六極之病脈浮則為腸鳴腹滿緊則為腹中痛數則為陰中癢痛則生瘡弦則陰中制痛婦人帶下脈浮惡寒者不治白濁白淫大全曰婦人白濁白淫皆由心腎不交養水火不升降或因勞傷於腎腎氣虛冷故也腎主水而開竅在陰陰為溲便之道胞冷腎損故有白濁白淫李氏曰白淫蓋緣思想無窮所願不得意淫於外入房太甚發為筋痿久為白淫謂白物淫如白精之狀不可誤作白帶過服熱服又有日夜流津如清米泔或如黏膠者謂之白崩與白淫同多憂思過度所致誠難治療用平補鎮心丹因思傷脾胃者四七湯下白丸子或歸脾湯痞悶少食者沉香降氣湯因勞傷腎氣心腎不交者金鎖正元丹小菟絲子丸威喜丸薛氏曰前證若元氣下陷補中益氣湯脾胃虛損六君加升柴脾經鬱結歸脾加黃柏山梔肝經怒火龍膽瀉肝湯虛則加味逍遙散宜與帶下參看主治帶下集方濕熱帶下解帶散治血氣不調濕熱白帶肢倦心煩痰鬱嘈雜眉批此大家法歸身酒洗香附醋炒各一錢五分白芍酒炒白朮土炒各一錢二分蒼朮茯苓陳皮去白丹皮各一錢川芎延胡各八分炙草四分生薑水煎空心服樗皮丸治赤白帶有濕熱者白芍五錢良薑三錢燒灰黃柏二錢俱燒灰椿根皮一兩半上為末粥丸桐子大每服四五十丸空心米飲下以下四方皆丹溪獨造均以清濕熱為主故用椿皮黃柏然白芍收肝火良薑為從治而燒灰之法獨造於諸方奇哉勝濕丸治赤白帶因濕熱勝而下者蒼朮鹽炒白芍滑石炒各一兩椿根皮炒一兩乾薑煨二兩地榆五錢枳殼炒甘草各三錢上為末粥丸桐子大空心米飲下一百丸此方加蒼朮以燥中宮地榆以澀下部枳殼寬氣於上滑石利濕於下乾薑從而燥濕也用二兩者非側柏樗皮丸治白帶因七情所傷而脈數者椿根皮炒二兩香附醋炒白芍白朮炒各一兩側柏葉酒蒸川連炒黃柏炒各五錢白芷燒存性三錢上粥丸桐子大米飲下七十丸按椿根皮性涼而燥濕熱盛者宜之以脈數故用連柏不用蒼朮為其燥性多也燒白芷入陽明而有澀止之能白朮補中氣見培土之妙其他不言喻矣萬安散治女人赤白帶下或出白物如脂或有臭濁汙水並神效小茴香炒香木香各二錢半黑牽牛一兩另取頭末上為細末以生薑自然汁調二錢臨臥服取盡惡物為效未盡間日再服二錢後以白粥補之忌熱毒物眉批此利氣濕行之劑與寒虛相宜宣明導水丸治濕熱鬱於下焦之分赤白帶下燥熱煩渴大黃黃芩各二兩牽牛頭末滑石各四兩上為末水丸桐子大每服四五十丸滾水下隨證加減治濕痰帶下眉批清熱滲濕導滯妙在氣血兩分治濕痰帶下蒼柏樗皮丸治肥人白帶是濕痰蒼朮黃柏樗根皮南星半夏海石川芎香附炮姜各等分暑月去乾薑加滑石上為末醋丸桐子大每服五六下丸白湯下此去中焦之濕清下部之熱亦丹溪方也小胃丹上可取膈胸之痰下可利腸胃之痰及濕熱熱痰並治婦人結痰白帶惟胃虛少食者忌用眉批是導水之猛劑古人能用之今則不能也甘遂濕麵裹煨熱一方面裹長流水煮曬乾芫花好醋拌經宿瓦盎內燒黑不可焦大戟長流水煮一時再用水洗淨曬乾各半兩黃柏炒一兩大黃濕紙裹煨勿令焦切焙乾再以酒潤炒熱焙乾一兩半上為末以白朮膏丸如蘿蔔子大臨臥津液咽下五七丸或白湯送下取膈上濕痰熱積以意消息之欲利空心服一方加木香檳榔各半兩眉批白朮膏為丸乃今人所制有獨創之妙可法補藥方治痰結白帶先以小胃丹半飢半飽津液咽下數丸候郁開卻服此藥補之白朮二兩黃芩五錢紅白葵花二兩五錢白芍七錢半上為末蒸餅丸桐子大每服三五十丸煎四物湯下一方有蒼朮無黃芩此亦丹溪方乃扶肝胃養肝陰清熱而葵花之用取其傾心向日之意蓋花性陰而用陽一入氣分一入血分皆便其從陽而生帶自止也治風邪帶下小柴胡湯治風邪帶下五色柴胡二錢黃芩半夏人參甘草各一錢上銼加生薑三片棗二枚水煎服色青屬肝加山梔防風色赤屬心加黃連山梔當歸色白屬肺補中益氣湯加山梔色黃屬脾六君子加山梔柴胡不應用歸脾湯色黑屬腎用六味地黃丸眉批小柴胡少陽藥其曰治風邪豈肝膽熱而生風邪蒼柏參芎散治婦人上有頭風鼻涕下有白帶辛夷川芎蒼朮黃柏南星半夏滑石牡蠣黃芩酒炒上水煎食後服此又丹溪方也以芩荑川芎而治頭風以蒼柏星半滑牡而治帶平正無奇令人可法地榆散治漏下五色一十二帶兼治嘔吐下血地榆三兩銼醋水各半升煮十餘沸食前溫服一合本草注云地榆主帶下十二病一曰多赤二曰多白三曰月水不通四曰陰蝕五曰子臟堅六曰子門澼七曰合陰陽患痛八曰少腹寒痛九曰子門閉十曰子宮冷十一曰夢與鬼交十二曰五臟五定治虛損帶下衛生湯治帶下不止脈微弱腹痛黃耆三兩當歸白芍炒各二兩炙草一兩上為粗末每服半兩水煎空心服一方下苦楝丸三十粒虛者加人參一兩以下皆以正氣為本此亦建中法以腹痛故兼苦楝丸補中益氣湯治勞役過度飲食不節損傷脾胃以致陽氣下陷白帶下久不止黃耆人參白朮炙草各一錢當歸陳皮各七分升麻柴胡各三分讀東垣先生書方知立方之旨讀立齊先生書又知善用東垣之方六君子湯治胃虛生痰飲食減少中氣不和時時帶下人參白朮茯苓炙草陳皮去白半夏湯炮七次各一錢上銼一服加生薑二片水煎服補中湯有升柴升下陷之氣此方有苓燥中宮之痰歸脾湯方見血崩門勞傷本方補心血以榮脾補其母也調肝氣以和下去其賊也母補賊去則脾氣健矣故曰歸脾孫真人云補脾不愈當先補心此方其近之加味八珍湯治婦人氣血兩虛赤白帶下當歸川芎白芍酒炒生地人參白朮茯苓各一錢炙草五分山藥炒杜仲酒炒香附炒各一錢上加烏梅一個生薑三片棗一枚水煎食前溫服肥人加半夏瘦人加黃柏飽悶去人參加砂仁腹痛去人參加小茴香延胡冬月加煨姜日久元氣下陷加升麻柴胡以升提之八珍氣血兩補其總司者也山藥杜仲烏梅又補帶脈之不足而加減法亦皆得理宜法之當歸澤蘭丸治婦人經脈不調赤白帶下久無子香附杵去毛一斤分四分童便浸四兩酒浸四兩醋浸四兩米泔浸四兩各浸一宿取出曬乾用當歸白芍川芎熟地酒洗生地各二兩艾葉澤蘭白朮各兩半黃芩二兩上為末醋丸赤小豆大每服六十丸空心白湯或酒下平而當理亦可為調經聖藥宗之止帶丸當歸酒洗川芎白朮人參山藥杜仲酒炒香附破故紙酒炒牡蠣煅川斷椿根皮酒炒各等分青黛減半上細末煉蜜丸桐子大每服五十丸空心米湯下腹痛加延胡小茴肥人加製半夏瘦人加酒炒黃柏冬月加炮姜少許夏月加黃柏嚴氏當歸煎治赤白帶下腹痛不欲飲食日漸羸瘦當歸酒浸赤芍炒熟地酒炒阿膠炒白芍炒續斷酒浸牡蠣煅各一兩地榆半兩上為末醋糊丸桐子大每服五十丸空心米飲下眉批要思何以四物中不用川芎又以何物而治腸痛又不欲飲食而何以不理脾胃豈立方者漫然歟須知用藥當看病原所以為之主治蓯蓉菟絲丸治赤白帶下肉蓯蓉酒浸菟絲子酒蒸覆盆子蛇床子各一兩二錢當歸酒洗白芍炒川芎各一兩牡蠣煅烏鰂骨各八錢五味子防風各六錢黃芩五錢艾葉三錢上為末煉蜜丸桐子大每三四十丸鹽湯下早晚各一服蓯蓉艾葉四子是溫補下元藥牡蠣烏鰂燥濕治帶防風升肝氣以勝濕黃芩清內熱以除濕歸芍川芎調血脈以滋榮惟下虛者宜之要知古人立方言有獨解不然何以男子藥補婦人耶補宮丸治婦人諸虛久不妊娠骨熱形瘦崩中帶下鹿角霜白芍白朮山藥香白芷白茯苓白薇牡蠣煅烏鰂骨各等分上為末面和丸桐子大每服五十丸空心米飲下此方以鹿霜白芍補血以山藥茯苓補氣以芷薇而治崩中淋露以牡賊而燥濕治帶又是一種意見然不用芎歸地黃者慮血藥溫潤也變局如此妙甚丹溪方治白帶屬真陰虛者龜板炙杞子各二兩黃柏炒一兩香附山萸肉苦參樗皮貝母各五錢白芍七錢半乾薑炒二錢半上為末酒糊丸桐子大每服五十丸空心米飲下丹溪治帶主於熱生濕其意以腎主閉藏而下焦者肝腎主之然濕從中焦生故立方如此千金方治帶下脈數者陰虛有熱也枸杞根一斤生地五兩一方五斤上水一斗煮五升分三服此方有超見非真人不能具此非見道者不能解此上二方補腎水真陰虛者宜之補真固經湯治婦人漏久心胞尺脈極微白帶流不止人參乾薑各一錢生芩另銼郁李仁去皮尖研柴胡炙草各一錢橘皮五分白葵花十六朵去萼上除黃芩外以水三大盞煎至一盞七分再入黃芩同煎至一盞去滓空心熱服候少時以早膳壓之東垣立方必原脈原證然後處方故治病多效此方參姜益陽李仁葵花潤燥柴胡升清氣於下陳皮和胃氣於中生芩後煎妙取清涼不滯也名曰補真蓋以真氣為主且服法亦妙助陽湯治白帶下陰戶中控心而急痛身黃皮緩身重如山陰中如水一名升陽燥濕湯柴胡一錢二分良薑二錢防風郁李仁乾薑甘草各一錢白葵花七朵新會皮生黃芩各五分上銼水二盞煎一盞食前熱服此治重在陰中如水痛控於心故用良薑為君乾薑為佐不用參朮者痛無補也柴防足以勝濕升陽葵李可以潤枯滋燥甘陳和中生芩涼氣分之熱與前方參之自有見解上二方用葵花李仁之滑以潤燥蓋枯涸滯著者宜之治虛寒帶下元戎四物湯治婦人赤白帶下脈沉微腹痛或陰中痛四物湯兩錢桂附子炮各五分一方四物加蘹香桂前方多以氣分藥內加溫燥之味此又以血藥中加桂附要知制方之異全在脈證上探討延胡苦楝湯治臍下冷撮痛陰冷大寒白帶下延胡苦楝子各二分黃柏一分附子肉桂各三分炙草五分熟地一錢上水煎食前溫服延胡苦楝以治痛肉桂附子以溫寒熟地治臍下之虛黃柏從其性之所喜桂附湯治白帶腥臭多悲不樂大寒肉桂三錢附子三錢川柏知母各五分上作一服水煎食遠熱服如煩惱面上麻木如蟲行乃胃中元氣極虛加黃耆一錢人參七分甘草二分升麻五分此補陽氣極虛用黃柏等為引用又升降陰陽藥也多悲不樂者陰晦之象也故宜桂附以助陽陽和則不悲而樂矣少以知柏為從治者恐附桂上僭也亦用熱遠熱之意當歸附子湯治臍下冷痛赤白帶下當歸二錢良薑乾薑附子各一錢柴胡七分升麻蠍梢各五分炙草六分炒黃鹽三分黃柏少許上為粗末每服五錢水煎溫服為丸亦得東垣回陽丹注云必用炒黃鹽無則不效姜寒疝之要藥也良薑乾薑大治臍下冷痛鹽柏引之就下蠍梢直主痛所升柴引左右清氣上升鹽柏引濁陰下降酒煮當歸丸治㿗疝白帶下注腳氣腰以下如在冰雪中居火坑以厚衣重蓋猶冷小便不止與白帶長流而不禁固肌肉消瘦面白目青䀮䀮無所見身重如山行步欹側腿膝枯細大便閉結心下痞悶懊憹飲食不下面垢背寒小便遺而不知此上中下三陽真氣俱竭故嘔噦不止胃寒之極也其脈沉緊而澀按之空虛若脈洪大而澀按之無力猶為中寒之證況按之空虛者乎按之不鼓是為陰寒之極也其空虛乃氣血俱虛之極也當歸一兩蘹香五錢黑附子炮去皮臍良薑各七錢上四味銼麻豆大好酒一升半同煎酒盡為度炭火焙乾同為細末入後藥炒黃鹽丁香各五錢全蠍三錢柴胡二錢升麻根木香各一錢苦楝子炙草各五分延胡四錢上為細末酒煮麵糊丸桐子大每服二十丸空心宿食消盡淡醋湯下忌油膩冷物酒面帶脈為病男子七疝女子瘕聚此以㿗疝在女子豈與男子同歟當聞女子㿗形如茄突出陰戶是亦疝也故云然諸症皆寒獨便閉心下痞懊憹似熱凡緊脈不拘浮沉均以為寒按之不鼓無問大小皆以為虛診者當須知此既曰血氣俱虛而本方中曾無一味氣藥而血藥又止當歸一味豈真陽已竭即甘溫之味亦未易為力也芍地能滯陽氣故亦不用妙在前四味用酒煮又以酒糊丸者峻補其下使真陽之氣生於九淵上於九天也其欲九種或引之使降或佐之使升有闢結透開之妙非精討病源究心藥石者不能到也然其力量博大非善用者不效暖宮妙應丸治婦人赤白帶下及子宮虛冷無子者四物加艾葉茯苓龍骨丹皮赤石脂牡蠣各等分上末麵糊丸桐子大每服五十丸空心艾醋湯下此方以四物合成劑以艾葉暖其下茯苓滲其濕牡丹清其瘀宜乎子宮溫而懷妊矣白蘞丸治女室衝任虛寒帶下純白鹿茸酒蒸焙二兩白蘞狗脊燎去毛制各一兩上為末艾煎醋汁打糊丸桐子大每服五十丸空心溫酒下女子二七而天癸至正當氣旺之年豈可輕用溫熱之劑獨以純白二字推之便得虛寒之真故用鹿茸外治法茱萸浴湯治下焦虛冷臍腹疼痛帶下五色月水不斷吳茱萸炮杜仲炒蛇床子五味子丁皮各一兩木香丁香各五錢上銼麻豆大每半兩生絹袋盛水三大碗煎數沸乘熱薰下部通手淋浴早晚二次凡風寒由外而襲內以至下焦生寒證者以此方薰而散之所謂摩之浴之開之發之也坐藥龍鹽膏治帶下延胡五錢厚朴二錢當歸茴香炒黃鹽漢防己肉桂紅豆龍骨各二錢川烏頭炮丁香木香各錢半良薑木通各一錢全蠍三枚枯礬五分上為末煉蜜丸彈子大綿裹留系在外納陰戶中勝陰丹為上藥力小再加三錢內加行性熱藥羌活柴胡各二錢大蒜一錢破故紙與蒜同焙一錢三奈子川烏頭大椒各一分甘松三分升麻枯白礬各二分全蠍二枚麝香少許上為細末同前法制用丹陽丹此東垣先生所制全蠍升麻甘松各二分草烏羌活各三分大椒三奈子蓽茇枯礬各五分大蒜破故紙各二錢水蛭三條炒焦二錢川烏柴胡各七分虻蟲三個炒去翅足炒黃鹽一錢必用之藥去之不效上細末依前制如指尖大用綿裹納陰中覺臍下暖為效如聖丹治婦人經不調赤白帶下枯礬四兩蛇床子二兩上為末醋糊丸彈子大用胭脂為衣綿裹納陰戶中定坐半日熱極再換大抵月水不通赤白帶下多因子宮不潔服藥難效此取易痊且不傷臟氣也一方用枯礬川烏各等分煉蜜丸彈子大綿裹納陰中治帶下絶産上五方皆外治法於上熱下寒難服溫補之藥者宜用此治帶下滑脫側柏地榆湯治赤白帶下以致不能成孕黃耆側柏葉地榆烏鰂骨白殭蠶牡蠣鹽泥固濟火煨透去泥研各一錢白芷肉蓯蓉酒浸蛇床子各一錢二分上銼加生薑三片水煎半飢時服主閉藏者腎若滑脫者腎氣不固也牡蠣鹽鹼而益腎蛇床子辛溫而壯氣其清而燥澀者側柏地榆烏其溫而補氣者黃耆蓯蓉若白芷行陽明於血海殭蠶散結氣以消痰馬蹄丸治白帶不絶白馬蹄禹餘糧各四兩龍骨三兩烏鰂骨白殭蠶赤石脂各二兩上為細末煉蜜丸桐子大每服十丸空心酒下不止加至三十丸馬蹄得乾金之健體而入肝殭蠶得燥金之剛氣而制木餘糧石脂固血之脫龍骨烏鰂固氣之脫蓋肝主疏泄而藏血疏泄則氣脫氣脫則血不藏以金平之而犍其戶以血澀之而固其氣宜為治漏要藥也固真丸治白帶大下不止臍腹疼痛其寒捫之如冰陰中亦然目中溜火上壅視物䀮䀮無所見齒皆惡熱飲痛須得黃連末擦之其痛乃止惟喜干食大惡湯飲此病皆寒濕乘其胞內故喜干而惡濕肝經陰火上溢走於標故上壅而目中溜火腎水侵肝而上益故目中䀮䀮無所見齒惡熱飲者是少陽陽明經中伏火也當大瀉寒濕以丸藥治之故曰寒在下焦治主宜緩大忌湯散以酒製白石脂白龍骨以枯其濕以炮乾薑大辛熱瀉寒水以黃柏之大寒為因用又為嚮導故云古者雖有重罪不絶人之後又為之伏其所主先其所因之意又瀉齒中惡熱飲也以柴胡為本經之使以芍藥半錢導之恐辛熱之藥太甚損其肝經故微瀉之以當歸身之辛溫大和其血脈用藥之法備矣白石脂燒赤水飛研細焙乾柴胡各一錢白龍骨二錢酒煮曬乾水飛為末當歸酒洗三錢乾薑炮四錢黃柏酒洗白芍各五分上為細末水煮稀糊丸雞頭大每服三十丸空心宿食消盡白沸湯溫送下無令胃中停滯待少時以早膳壓之是不令熱藥犯胃忌生冷硬物與酒濕面眉批服藥有法亦有期讀此又得一種治法治白淫白濁固精丸治下虛胞寒小便白濁如泔或如凝脂或小便無度腰重等證牡蠣煅粉桑螵蛸酒炙龍骨白石脂白茯苓五味子菟絲子酒蒸焙韭子炒各等分上為末酒糊丸桐子大每服七十丸空心鹽湯下夫坎者水也腎主之而坎中之一陽乃腎中之真氣氣固則水旺水旺則氣溫氣溫則下元暖而先天不虛若白濁久而如泔如脂或小便無度皆氣脫也氣脫則下焦無火而水不溫矣安得水升而火降此方能固脫溫氣斂藏真火誠治虛寒要藥雖男子亦宜內金鹿茸丸治婦人勞傷血脈胞絡受寒小便白濁日夜無度臍腹疼痛腰膝無力鹿茸黃耆雞內金肉蓯蓉五味子龍骨牡蠣遠志肉桑螵蛸附子各等分上末煉蜜丸桐子大每服五十丸食前溫酒或米飲任下按鹿茸蓯蓉黃耆附子有益精益氣溫腎之功內金牡蠣螵蛸龍骨有固澀禁便之用五味遠志生津液而入腎以補正氣其為補下無疑男子俱可服金鎖正元丹治真氣不足吸吸短氣四肢倦怠腳膝瘦軟目睹耳鳴遺精盜汗及婦人白濁白淫等症肉蓯蓉酒焙紫巴戟去心葫蘆巴炒各一斤補骨脂酒浸炒十兩五味子半斤茯苓去皮六兩硃砂三兩另研龍骨二兩上為末入藥研令勻和酒丸桐子大每服二十丸空心溫酒或鹽湯下肉蓯蓉男得之而助陽女得之而孕育也巴戟補髓添精葫蘆巴治虛冷補骨脂起陽衰五味子燥陰濕茯苓陽中之陰硃砂鎮心之主宜降火升水之妙龍骨固脫故為下元真氣不足者所服也威喜丸治丈夫元陽虛憊精氣不固餘瀝常流小便濁夢寐頻泄及婦人血海久冷白帶白濁下部常濕小便如米泔或無子息黃蠟四兩白茯苓四兩用豬茯二錢半同磁器內煮二十餘沸出曬乾去豬苓上茯苓為末熔黃蠟搜為丸彈子大空心細嚼滿口生津徐徐咽服以小便清為度忌米醋尤忌使性氣味之淡者莫淡於蠟而淡之滲者莫過於茯苓蓋淡者天之陰天氣降則水生水生則火有制而又以豬苓煮茯苓者欲其滲之速以蠟為丸者欲其降之深也亦忌使性句戒助肝氣也諸積痃癖疝瘕癥痞積聚腸覃石瘕詩痃癖疝瘕痞兼癥血凝痰氣食兼成難經五積由於臟六聚相傳腑所生腸覃經行氣分病石瘕不月血相併青黃燥血狐脂鱉蝨發蛇魚亦瘕名大全云痃者在腹內近臍左右各有一條筋脈急痛大者如臂次者如指因氣而成如弦之狀故名曰痃癖者僻也側在兩筋之間有時而痛故名曰癖皆由陰陽不和經絡痞膈飲食停滯不得宣流邪冷之氣搏結不散得冷則發作疼痛甚則欲死皆血之所為也薛立齊曰前證因飲食起居七情失宜虧損臟腑氣血乖違陰絡受傷循行失度所致羅謙甫云養正邪自除必先調養榮衛充實若不消散方可議下但除不以漸必有傾覆之害若不守禁忌未有能愈者也大全云疝者痛也瘕者假也其結聚浮假而痛推移乃動也由飲食不節寒溫不調氣血勞傷臟腑虛弱風冷入腹與血相結而生或因産後血虛受寒或因經水往來取冷過度非獨因飲食失節多挾血氣所成也其脈弦急者生虛弱小者死尺脈澀而浮牢為血實氣虛其發腹痛逆氣上行此為胞中有惡血久則積成血瘕子和曰血涸月事不行行後小腹有塊或時動移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕羅謙甫曰經云石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下夫膀胱為津液之府氣化則能出今寒客子門則氣塞不通血壅不流衃以留止結硬如石是謂石瘕此先氣病而後血病故月事不來可宣導而下非大辛熱之劑不能已可服見晛丸和血通經湯眉批婦人經行風濕入於陰中則生黃瘕今人四肢寒熱身重倦臥左脅下結氣腰背相引痛小腹急下引陰中如刺不得小便或下赤黃汁經閉無子新産未滿十日當風臥居濕席灑灑入腹惡血不除結熱不散則生青瘕聚於左右脅下藏於背膂腹肩攣急腹下有氣起喜唾手足腫大小便難月水下惡血未盡夏月熱行卒以恚怒致經脈攣急內結不舒月水與氣俱阻及以飲清快心月水橫流溢入他藏氣鬱化熱則生燥瘕大如半杯腹痛連脅引心而煩欲嘔吐盜汗經閉大便難小便失時忽然自出經行未滿日數而中止因飢寒勞動血下未定走腸胃間留絡不去內有寒熱與月水會合為血瘕令腰痛不可俯仰橫骨下有積氣牢如石小腹急苦痛腰背痛攣陰里若生風冷子門僻月水乍來乍止月水新來以合陰陽百脈四解外不見其形子精與血氣相遇子精化不足成子則為脂瘕令人肢滿裡急痹引少腹重腰背如刺腹中切痛月水乍來乍去大小便血不止月水來逢暴風雷雨驚恐衣被沉濕邪入陰中則生狐瘕食人子臟令人經閉瘀滯陰中腫小便難欲嘔喜唾多所思如有身狀其瘕手足成形者殺人月水新止當風坐濕地或飲汗井水食不潔物吞蛇風之精留絡不去因生蛇瘕上食心肝長大其形如漆在臍上下還㽲左右脅不得吐氣少腹熱小便赤膀胱引陰中攣急腰目俱痛難以動作喜發寒熱月水或多或少手足成形殺人月水新至當風睡足踐濕地復見所好心為之開魂魄感動邪乘虛入留絡不去因生鱉瘕令人小腹切痛若存若亡持之躍乎而下引陰里腰背痛不可以息月水不通面黃少氣其瘕手足成形者殺人良方曰婦人臟腑調和經脈循環月水以時故能生子若乘外邪而合陰陽則小腹胸脅腰背相引而痛月事不調陰中腫脹小便淋漓面色黃黑則瘕生矣八瘕者皆血脈精氣不調所生黃青燥血脂狐蛇鱉是也千金外臺言之詳矣薛立齊曰經云氣主煦之血主濡之若血不流則凝而為瘕瘕者中雖硬而忽聚忽散多因六淫七情飲食起居傷動臟腑而成當與痃癖諸症同治慎不可復傷元氣王宇泰曰七癥八瘕婦人居多七者火數屬心血生於心八者木數屬肝血歸於肝雖曰強分理似不混夫瘕者假也假物成形古人將婦人病為痼疾以蛟龍等為生瘕然亦不必如此執泥婦人癥瘕並屬血龍蛇魚鱉肉發蝨瘕等事皆出偶然但飲食間誤中之留聚臟腑假血而成自有活性亦猶永徽中僧病噎者腹中有一物其狀如魚即生瘕也與夫宿血停凝結為痞塊雖內之所感不同治法當以類相從所謂醫者意也如以敗梳治蝨瘕銅屑治龍瘕麥糵治米瘕石灰治酒瘕茶泥治蛭瘕如此等類學者可以理解也慎齊按巢氏病源婦人八瘕不外新産月水之後感寒濕風冷凝泣血脈留滯經絡閉塞隧道而成也乃強分黃青燥血之名以惑冊誣名宜其為張戴人所斥也夫瘕者假也不過假人身之氣血加以食積痰飲膠結成形內經止有石瘕生於胞中一證何嘗有為黃為青之名色耶即有八瘕之名醫者亦難辨其是狐是蛇是鱉也良方但存其名而不載條目最有見王宇泰曰不必執泥事出偶然可謂善會古人之書者也然事之或有者毋盡信亦不可不信如慈溪王節齊先生尊信丹溪之書日服補陰丸無間數十年內有龜甲制之不善大下小赤色龜數十而死此即八瘕之類有感有而生者也豈獨在婦人耶大全曰婦人癥痞由飲食失節脾胃虧損邪正相搏積於腹中牢固不動有可徵徵驗故名曰癥氣道壅塞故名曰痞得冷則發冷入子臟則不孕入胞絡則月水不通薛立齊曰此症若脾胃虛弱六君子加芎歸肝脾虛弱補中及歸脾若肝火鬱滯佐以蘆薈地黃二丸外貼阿魏膏患者須慎七情六淫飲食起居治者不時審察病機而藥之庶幾有效大全曰婦人食症由臟腑虛弱經行不忌生冷之物不能消化與臟氣相持結聚成塊日漸生長牢固不移或因勞傷元氣所致陳無擇云經不行者宜先導之然後固元氣為主薛立齊曰若形氣虛弱須先調補脾胃為主佐以消導若形氣充實當先疏導為主佐以補脾胃若氣壅血滯而不行者宜烏藥散散而行之若脾氣虛而血不行者四君子芎歸補而行之若脾氣鬱而血不行者歸脾湯解而行之若肝脾血燥而不行者加味逍遙散清而行之大抵食積痞塊證為有形邪氣勝則實真氣奪則虛當養正辟邪而積自除雖云堅者削之客者除之胃氣未虛或可少用虛者豈宜輕用大全曰婦人寒熱失節臟腑氣虛風冷在內飲食不消與血氣相結經絡痞塞惡血不除漸生塊不移動外證瞀悶煩躁驚狂痰嘔汗多骨蒸肢冷其蓄在下焦者必臍結急外熱內痛尺脈洪而數桃仁靈脂生地牛膝大黃甘草去之薛立齊曰此證多兼七情虧損五臟氣血乖違而致氣主煦之血主濡之故鬱結傷脾恚怒傷肝者多患之腹脅作痛正肝脾二經症潔古云養正積自除東垣云人以胃氣為本治法當主固元氣佐以攻伐之劑必需之歲月若期速效投以峻劑反致有誤也武叔卿曰痞一癥二曰血曰食而不及痰飲何也蓋痞氣之中未嘗無飲而血癥食癥之內未嘗無痰則痰食血未有不因氣病而後形病故消積之中兼行氣消痰消瘀之藥為是眉批婦人小腹痞脹小便時下白帶小水淋漓此肝經濕熱下注用龍膽瀉肝湯而愈婦人小腹痞悶小便不利內熱體倦用八珍湯加柴胡山梔龍膽草治之而安李氏曰善治癥瘕者調其氣而破其血消其食而豁其痰衰其大半而止不可猛攻以傷元氣寧扶脾胃正氣待其自化凡攻擊之藥病重病受之病輕則胃氣受傷矣或云待塊消盡而後補養則胃氣之存也幾希古方有五積六聚五臟之氣積名曰積故積有五六腑之氣聚名曰聚故聚有六五積者心曰伏梁肝曰肥氣脾曰痞氣肺曰息賁腎曰奔豚六聚未著其名凡聚之屬於六府者皆是也此不獨婦人有之男子皆然戴人過譙遇一卒妻心下有冷積如履杯按之如水聲以熱手尉之如冰十五年絶孕謀棄之戴人曰公勿黜也診其脈沉而遲尺脈洪大而有力非無子之候也先以三聖散吐涎一斗心下平軟次服白朮調中湯五苓散後以四物湯和之不再月氣血合度數月而妊二子戴人嘗曰用吾此法無不子之誣婦此言不誣武叔卿曰癥瘕積聚並起於氣故有氣積氣聚之說然謂瘕屬血病者氣聚而後血凝也其挾食挾痰又各隨所積而變見矣夫血與痰食皆賴氣以行也故氣行物生氣病物病此百病皆生於氣破血消痰消食之劑必用氣藥者以此也羅謙甫曰女子月事不下腹如懷子醫者不知內經有腸覃石瘕之病而疑為孕經云腸覃者寒氣客於腸外與衛氣相搏氣不得榮因有所繫瘕而內著惡氣乃起瘜肉乃生其始大如雞卵稍以益大至其成如懷子狀按之則堅推之則移月事以時下此氣病而血不病也木香通氣散主之石瘕詳疝瘕條眉批覃延也腸大腸也通治諸積開鬱正元散治痰飲血氣鬱結食積白朮陳皮茯苓甘草香附延胡青皮神麯楂肉麥芽海粉桔梗砂仁等分生薑每一兩水煎服按此方治氣血痰食和平之劑海粉不入煮若作丸更佳勝紅丸簡易治脾積氣滯胸膈滿悶嘔吐清水丈夫酒積女人脾血積小兒食積京三稜莪朮二味同醋煮青皮陳皮炮姜良薑炒各一兩香附炒二兩亦當醋炒上為末醋丸桐子大每服三十丸生薑湯下虛者以補藥下之一方加神麯麥芽按此方胃寒氣實可用若氣虛有熱者服之是抱薪救火也下法虛者以補是用藥巧處醋丸亦妙香稜丸濟生治一切積聚破痰癖消癥塊木香丁香各半兩三稜酒浸一宿莪朮細銼每一兩巴豆三十粒去殼同炒待巴豆黃色去巴豆不用枳殼麩炒青皮川楝子肉茴香炒各等分上為末醋煮麵糊丸桐子大硃砂為衣每服三十丸姜鹽湯或溫酒下無時大硝石丸治七癥八瘕聚結痞塊硝石三兩大黃四兩人參甘草各一兩上為末以三年苦酒三升置銅石器中先用大黃微火熬微沸常攪不息至七分內余藥復熬成膏至可丸即丸如桐子大每服三十丸米飲下三日一服服後下如雞肝或如米汁赤黑等物後忌風冷凡丸方消塊俱用熱藥行氣削堅之劑而此方又以補中帶消真千金方也用者試之阿魏膏治一切痞塊羌活獨活玄參天麻白芷官桂赤芍生地穿山甲兩頭尖大黃各五錢紅花四錢木鱉子十四粒去殼槐柳桃枝各三錢亂髮雞子大上用香油二斤四兩煎黑去渣入發煎發化仍去渣徐下黃丹煎軟硬得中入芒硝阿魏蘇合油乳香沒藥各五錢麝香三錢調勻即成膏矣先用朴硝隨患處鋪平半指厚以紙蓋用熱尉斗尉良久如硝耗再加尉之二時許方貼膏藥治癥瘕穿山甲散治婦人癥痞及惡血氣攻心腹疼痛穿山甲灰炒燥鱉甲醋炙大黃炒乾漆炒令煙盡桂心赤芍藥各一兩川芎當歸芫花醋炒麝香二錢半另研上為細末入麝和勻每服一錢熱酒下無時此方散結破血行氣消飲溫行損塊要藥也然性多獷悍用者慎之治食症化精丸治婦人死血食積痰飲成塊在兩脅動作雷鳴嘈雜眩暈身熱時作時止黃連一兩五錢同吳萸益智各炒一半去萸智蘿蔔子香附楂肉各一兩川芎山梔炒三稜煨切神麯炒桃仁去皮尖各五錢上為末蒸餅丸服此丹溪先生法也緣古方率多香燥溫熱僅能助火損氣此方以茱萸制連而治佐以益智制連而治上以山梔治塊中之火其餘破氣消食散血誠穩當方也眉批條目脫下治血癥三字增味四物湯治婦人血積四物加三稜廣茂肉桂乾漆炒煙盡各等分上為粗末每服五錢水煎服余妻曾患小腹積塊每遇塞觸劇痛不可忍諸醫治莫效用此一服立瘥此方治血積甚平穩血竭散治婦人血瘕作痛臍下脹滿經閉發熱體倦當歸八分芍藥炒桂心血竭蒲黃炒各六分延胡炒四分大紅花丸治婦人血積癥瘕經絡澀滯川大黃紅花各二兩虻蟲十個去翅足上取大黃七錢醋熬膏和藥丸桐子大每服五七丸食後溫酒下日三服治瘀血桃奴散治血蠱及瘀血經閉男子跌僕損傷皆效桃奴炒猳鼠糞炒延胡肉桂五靈脂香附炒砂仁桃仁各等分上為末每服三錢酒調服琥珀散治婦人經絡痞閉腹內瘀血痛不可忍琥珀乳香沒藥各另研細末五錢上每服二錢水酒各半盞煎七分入地黃自然汁二合再煎數沸去滓入溫酒服不拘時此方三物固妙而入地黃汁丸尤佳地榆散治敗血地榆肉桂何首烏香白芷每服二錢米泔盞半砂糖一小塊煎八分去滓空心食前服此方首烏白芷有奇處地榆與肉桂同用亦奇治痃癖蔥白丸治一切冷氣不和及膀胱氣攻衝疼痛及婦人血海宿冷或血刺痛一切疾病最宜服此與後烏雞煎丸兼服當歸川芎白芍熟地桂心乾薑茴香三稜莪朮枳殼厚朴青皮木香苦楝子麥芽神麯茯苓人參上為細末每服三錢水一煎連須蔥白二寸拍破鹽半錢煎七分內大黃訶子宜相度病情如大便不利入大黃同煎不入鹽如大便自利入訶子煎人身以氣血流行為無病此方以四物補血人參助氣枳朴行上焦之氣茴香苦楝行下焦之氣木香青皮行肝氣乾薑溫行血中之氣其餘消之削之皆所以溫而行之也氣一行則痛自止矣以鹽引入血分使氣下行而主內以蔥引氣外通而開表如是則內外和而痛愈也烏雞煎丸和劑治婦人胎前産後諸般疾患並皆治之烏雄雞一隻人參黃耆白朮各一兩熟地五錢白芍紅花各二兩蒼朮泔浸一兩半陳皮二兩烏藥一兩木香五錢延胡五錢丹皮一兩琥珀五錢川烏頭炮附子炮肉桂各二兩肉豆蔻草果各五錢蛇床一兩海桐皮莪朮各二兩上細銼烏雞去毛腸將藥置中好酒一斗新磁器煮乾去骨焙燥為末煉蜜丸梧子大每服三十丸子宮久冷溫酒或棗湯空心日一服赤白帶下生薑地黃酒下小腹㽲痛炒茴香鹽酒下血氣攻刺心腹疼痛當歸酒下血散四支遍身浮黃腫赤小豆酒下血悶煎烏梅湯研硃砂下血風勞人參酒下血邪研硃砂麝香酒下産後敗血注心童便黑姜酒下産後血塊填築心腹疼痛玄胡酒下眉批痃癖癥瘕血氣塊硬發渴刺痛甚則欲死究而言之皆血之所為僕嘗治一婦血氣刺痛不可忍甚而死一二日方蘇治數年不效以蔥白散烏雞丸遂安又治一婦血氣作楚如一小盤漾走注刺痛不可忍亦用此二藥而愈尋常小小血氣用此二藥亦有奇效朱先生云此藥大治心氣脾疼用之見效僕嘗以此治浮腫立效陳宜人病血氣作楚不可忍諸藥無效診其脈兩關脈沉差緊此血氣漸成痃癖也只以此二藥治之愈室女經閉四支疼痛紅花酒下女人體陰而用陽其經行以厥陰為主雞屬巽木性通於肝肝氣壯則血得其養而有生生之功若烏雄雞者具體陰用陽之象有水生木木生火之義蓋女子以陰為體而性多熱滯故用此以鼓動肝氣而助其用耳本方用參耆白朮以益三焦之氣地芍紅花以益心包肝腎之血氣滯而不行者有蒼陳烏藥木香以調之血滯而不行者有延胡丹皮琥珀以行之因寒而凝者有烏附肉桂以溫之其諸品或溫中以醒脾或消穀以化積或於血中行氣或於氣中行血或行表或行里皆所以相贊成功總之以氣血為主溫行為用而又以脾胃穀氣為先此其所以為諸病可服也其曰治胎前諸疾則有所未信神效方治痃瘕及血氣等獖豬肝一具可及十兩者巴豆五十枚去大皮扎在肝內釅醋三碗煮肝極爛去巴豆不用入京三稜末和調得所丸如桐子大每服五丸食前溫酒下昔有女人患腹中痞塊攻心作痛服此而愈治疝瘕眉批蓋女人只有㿗疝一證耳大抵疝字之義取其如山之高而突起也不然何彼皆連稱焉當歸散治婦人疝瘕血氣攻刺心腹疼痛不可忍當歸炒一兩川芎五錢赤芍桃仁湯浸去皮尖麩炒各七錢半大黃微炒一兩鱉甲醋炙二兩桂心一兩吳萸泡七次木香青皮各五錢莪朮七錢半檳榔一兩上為散每服三錢姜一錢三分水煎熱服不拘時此方治肝經居多黑神丸神麯四兩檳榔四枚茴香木香丁香各五錢椒炒去汗漆六兩半生半用重湯煮半日令香上除椒漆外五物皆半生半炒為細末用前生熟漆和丸如彈子大又用茴香末十二兩鋪陰地候乾並香末收器中至極干去茴香治腎氣膀胱痃癖及疝墜五膈産後諸血並一丸分四服死胎一丸皆綿灰酒下諸痰不過三服痃氣十服膈氣癥瘕五服血瘕三丸當瘥晞露丸治腸覃廣茂酒浸三稜酒浸各一兩乾漆炒煙盡川烏各五錢硇砂四錢青皮雄黃另研茴香鹽炒穿山甲炙各三錢輕粉一錢另研麝香五分另研巴豆三十個去皮切開上除研藥外將巴豆炒三稜廣茂二味黃色去巴豆不用共研末入前研藥勻生薑汁打糊丸桐子大每服二十丸至三十丸空心食前薑湯或酒下見晛丸治石瘕附子炮四錢鬼羽箭紫石英各三錢澤瀉肉桂延胡木香各二錢血竭一錢半另研水蛭檳榔二錢半桃仁三十個另研三稜五錢大黃上為細末酒糊丸桐子大每服三十丸醋湯或溫酒下食前此方寒者溫之留者行之以病在下焦故多血分藥
