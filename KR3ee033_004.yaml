body:
  text: 卷四胎前門下子喑素問曰人有重身九月而喑此何為也曰胞之絡脈絶也曰何以言之曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言曰治之奈何曰無治也當十月復大全曰搏陵醫之神者曰郝翁士有婦女妊喑默不能言郝曰兒胎大徑壅兒生經行則言矣不可毒以藥薛立齋曰內經窮理之言患此當調攝以需之張子和曰內經雖有無治之論可煎玉燭散二兩放冷入蜜少許時呷之則心火下降而肺金自清能作聲也馬玄臺曰巢氏論九月腎經養胎似合經旨然以理推之手足十二經之脈晝夜流行無間無日無時而不共養胎氣也必無分經養胎之理經云九月而喑因兒體已長胞脈阻絶分娩能言故云不必治治之當補心腎為宜張嶟璜曰喑謂有言無聲故經曰不能言此不能二字非寂然不語之謂凡人之音生於喉嚨發於舌本因胎氣肥大阻腎上行之經以腎之脈入肺中循喉嚨系舌本喉者肺之部肺主聲音其人切切私語心生有言而人不能聽故曰喑肺腎子母之臟故云不必治若大全解作不語則為心病以心主發聲為言也與子喑了不相干若子和有降心火之説玄臺有補心腎之言如果腎之脈絡絶而上干心則其病不治豈有産後自復之理乎故經云胞之絡脈絶此絶字當作阻字解慎齋曰妊娠不語遵內經之旨固無治法故大全而下後人不敢強立方論獨子和以降心火為治玄臺以補心腎立法則以胞之絡脈屬手足少陰二經故也但産後不語屬敗血之入心中風舌喑屬痰涎之滯絡則胎前子喑亦必有所感更當詳證參治以補張馬二公之未盡若子喑用玉燭散似屬無理中風子癇瘛瘲大全云風不從其鄉來者名為虛邪賊害萬物人體虛則中之若客於皮膚入於經絡即頑痹不仁若入於筋脈挾寒則攣急喎僻挾濕則弛縱痿軟若入臟腑則恍惚驚悸凡諸臟腑俞皆在背虛則邪從俞入隨所傷臟腑經絡而為諸病妊娠中風若不早治則會墮胎也眉批風者百病之長中之則隨所挾而現病此語簡明詳盡妙之薛立齋曰機要云風本為熱熱勝則風動宜靜勝其燥是養血也治法宜少汗亦宜少下多汗則虛衛多下則損榮雖有汗下之戒而有中腑中臟之分中腑者多著四肢則脈浮惡寒拘急不仁中臟者多著九竅則唇緩失音耳聾鼻塞目瞀便祕中腑者宜汗中臟者宜下表裡已和宜治在經當以大藥養之妊娠患茲亦當以此施治佐以安胎之藥為主勿過用治中風藥陳良甫曰妊娠體虛受風傷足太陽經絡復遇風寒相搏則口噤背強甚則腰反張名曰痙又曰痓其候冒悶不識人須臾自醒良久復作謂之風痙一名子癇又名子冒薛立齋曰前證若心肝風熱鉤藤湯肝脾血虛加味逍遙散肝脾鬱怒加味歸脾湯氣逆痰滯紫蘇飲肝火風熱鉤藤湯脾郁痰滯二陳加竹瀝薑汁薛立齋曰瘛者筋脈急而縮瘲者筋脈緩而伸一伸一縮手足相引搐搦此證多屬風蓋風主搖動駱龍吉云心主脈肝主筋心屬火肝屬木火主熱木主風風火相熾則為瘛瘲治法若因風熱鉤藤湯加柴梔苓術以平肝木降心火養氣血若風痰上湧加半夏南星竹瀝若風邪急搐加全蠍天蟲若氣血虧損八珍湯加鉤藤山梔若肝火血燥痰湧支搐八珍湯加炒黃芩為主佐以鉤藤湯而安若無力抽搐戴眼反折汗出如油者肺絶也不治眉批此風皆本內熱故立方亦皆從內慎齋曰以上序胎前有中風證而子癇瘛瘲其類及也中風證多因治法亦不一立齋以潔古一論為妊娠中風治法惟靜勝其燥養血為主斯為療胎前中風之要夫胎之賴以養者血也血虛則易於感邪血行風自滅丹溪於胎前惟清熱養血為主立齋宗之引機要一條為證誠有本矣再按胎前中風此正河間所謂將息失宜腎水衰而心火旺肝無所養是非外中風邪急當滋其化源瀉南補北壯水制火則肝木自平胎氣可安恐養血猶屬第二義也傷寒吳蒙齋曰妊娠傷寒六經治例皆同但要安胎為主凡藥中有犯胎者不可用也醫壘元戎曰胎前病惟當安胎順氣傷寒六經傳變婦人與男子無殊惟娠妊患此其用藥汗下溫之中當以保胎為主一切犯胎之藥切須詳審當以四物湯加減六合湯萬密齋曰妊娠傷寒專以清熱安胎為主或汗或下各隨五臟表裡所見脈證主治勿犯胎氣故在表發汗以香蘇散為主半表半裡則和解之以黃龍湯為主在裡則下之以三黃解毒湯為主此吾家傳之祕活人甚多如古方六合湯雖分治詳明猶不及此切當眉批汗下和三法成法也而主以香蘇黃龍三黃解毒則發前人所未發妙甚瘧疾夏時伏陰在內陽浮於外汗出煩渴或過食生冷或陰地取涼致腠理閉密邪留於胃聚而成痰至秋陽氣收肅陰氣下移中洲之痰氣愈加壅滯胃氣行至其所與之相遇而寒熱作焉陰陽之氣更相勝負故衛氣行過與邪暫離故有時汗解及邪衛復集病必再作此陰陽之升降邪正之離合也受病輕者邪氣外舍於陽分陽為腑其邪淺客於腠理與衛氣並行故一日一發發有晝夜之殊因衛氣晝行於陽夜行於陰也一日一發及午前發者邪在陽分易已間日發及午後夜間發者邪在陰分難已所以正氣勝而外出則移早為輕邪氣勝而內入則移晚為重大全曰妊娠病瘧乃夏傷於暑客於募原至秋而發陽盛則熱陰盛則寒陰陽相勝寒熱交作産寶曰妊娠瘧疾因虛氣血虛損風寒乘之風為陽邪化氣而為熱寒為陰邪化氣而為寒陰陽並挾寒熱互見經云陽微惡寒陰弱發熱此皆虛之所致不因暑氣所作久不已必傷胎人參羌活湯主之何松庵曰氣為陽陽虛則惡寒血為陰陰虛則發熱妊娠病瘧股慓頜戰百節振搖墮胎最易故用藥必以安胎為務趙養葵曰有患胎瘧者一遇有胎瘧病即發此人素有肝火遇有孕則水養胎元肝虛血燥寒熱往來似瘧非瘧也以逍遙散清肝火養肝血兼六味丸以滋化源慎齋曰妊娠瘧疾古人以安胎為急但邪不去則胎亦不安故安胎莫先於去邪而犯胎之品又未可浪投惟於發表之中兼補氣清氣之中兼養血為當耳痢疾內經謂滯下又曰腸澼醫通云妊娠痢疾有三禁五審三禁者一禁蕩滌腸胃二禁滲利膀胱三禁兜澀氣滯蓋蕩滌則陽氣下陷胎氣愈墜滲利則陰精脫亡胎失榮養兜澀氣滯而後重轉加故善治妊娠痢者宜調氣為先調氣如爐冶分金已敗之精血隨氣而下未傷之津液統之而安五審者一審飲食進與不進夫下痢乃腸胃受傷飲食如常者易治故痢以噤口為重若初時能食漸至惡食脈息不振此必蕩滌太過胃氣受傷甚至厄逆嘔噦者此胃氣大敗最危之候惟峻與溫補庶可挽回二審溲之通與不通下痢清濁不分痢頻而小便通者胎必無虞若月數將滿氣虛下墜溲溺不通名曰轉胞切忌利水通津急與升提自通宜補中湯少加車前澤瀉升清降濁投無不效三審腹之痛與不痛蓋下痢痛者為實不痛者為虛亦有濁濕下趨而腹不痛此證多見於肥人白痢宜調氣運積若痛有止歇至圊不及者火也痛自下攻擊於上者火也痛而脹滿拒按飲熱湯愈甚者火也實也痛無止歇而綿綿不絶者寒也痛自上攻注於下者寒也痛而不滿喜熱手按者寒也虛也大約初痢脹滿為實熱久痢㽱痛為虛寒即或初因火起久痢氣傷變為虛寒急須溫補切勿利氣四審後之重與不重下痢後重由濁氣壅滯必以調氣為主氣調則後重自除而胎息自安但初痢後重宜開其壅滯久痢後重又當升舉其陽陽氣升則胃氣運胃氣運則周身之氣皆運而無壅滯之患故雖血痢亦用陽藥不用滋膩血藥蓋氣有統血之功血無妄行之慮矣五審身之熱與不熱下痢初起人迎脈浮數可先用和營透表之藥分解其勢若初痢不發熱後反發熱脈來虛大無力此真陰內亡陽氣發越平人急當桂附溫補而孕婦唯借參朮薑萸膠艾之屬大補濃煎以固其脫又有久痢胃虛感冒風寒發熱者左手脈必浮緩當合表裡治之佐參術以助中氣則客邪解散矣又當察其積色傷氣則白傷血則赤氣血紊亂赤白兼併蓋氣屬陽陽傷則受寒居多即有火迫下注皆陽氣鬱遏本寒標熱之證當驗其積之稠黏如糊色白如脂方可暫與清熱治標若汁沫如水色晦如塵急須溫理其氣血屬陰陰傷則受熱居多然多有氣傷陽不統陰之血又不得不從事於辛溫也故治血痢尤當以色顯晦驗其虛實寒熱此義前人所未發也故凡積之瘀晦不鮮清稀不黏者皆虛寒之故急以人參薑艾阿膠倘誤用黃連速其斃也惟積色稠黏光澤合用苦燥以堅腸胃滑脫又必佐以調氣之藥則陰邪得以解釋此治痢之要妙也體會此篇治胎前痢定能得心應手祕録云妊娠下痢腹痛重墜乃元氣下陷也宜服補中湯而胎自安切忌破氣降氣益增墜下之患況今之似痢非痢者居多中氣虛而不能上升脾氣虛而不能滲濕腎氣虛而不能閉藏慎勿泥有形之假滯傷無形之元氣也元氣一傷變證百出胎能保乎丹溪曰胎前痢先托住正氣以固其胎而後順氣和血佐以消積導滯此治孕婦痢之要法也準繩云孕婦患痢用導滯理氣藥腹中愈重墜者乃下元虛也胎動不安內熱盛也用補中湯仍不安用六君子加條芩而安眉批重墜起於久病故為下元氣虛而以補中六君治之若非久病猶可安胎為主也壺仙翁曰有娠妊病痢不止診其脈虛而滑兩關若澀此由胎氣不和相火上炎而有熱似痢實非痢也用黃芩白朮以安胎四物生地以調血數劑而安薛立齋曰妊娠痢疾以當歸黃芩為主佐以白朮茯苓白芍陳皮甘草之屬如瀉加蒼朮為主佐以赤苓神麯陳皮之類二證俱用砂仁煎服痢愈後又當大補陰血可免臨産枯澀之患鄭文康曰餘外祖薛氏家傳胎前痢疾不拘赤白悉用養胃湯始終只此一方便可祛病否則胃苓湯若傷生冷而下白痢五積散赤白痢香連白朮散白多香倍於連赤多連倍於香有外邪者紫蘇飲加神麯身無熱加木香蓋治孕婦痢無異於常惟以固胎為主此藥最穩脈小者生脈大者死霍亂大全曰飲食過度觸冒風冷陰陽不和清濁相干謂之霍亂其間或先吐或腹痛吐利是因於熱也若頭痛體疼發熱是挾風邪也若風入腸胃泄利嘔吐甚則手足逆冷此陽氣暴竭謂之四逆妊娠患之多致損胎萬密齋曰霍亂者陽明胃經病名也平日五味肥釀腐積成痰七情鬱結氣盛為火停蓄胃中乍因寒熱之感邪正交爭陰陽相混故令心腹絞痛吐利並作揮霍撩亂如邪在上胃脘則當心而痛其吐多邪在下胃脘則當臍而痛其利多邪在中脘其腹中痛吐痢俱多吐多則傷氣利多則傷血血氣受傷不能護養胎元邪氣乘勢鼓擊子母難保此危證不可不亟治香蘇散加藿香葉薛立齋曰前證因內傷飲食外感風寒藿香正氣散飲食停滯平胃散若果脾胃頓傷陽氣虛寒手足逆冷須用溫補之劑治當詳審毋使動胎也此證因飲食失節憂思過度傷於中臟加以暑濕不正之邪黏膩腐腸之物停滯胃脘壅遏陽氣脾土受困肝木乘侮致陰陽反戾升降失宜甚至暴吐暴瀉津液頓亡宗筋失養拘攣收縮輕者僅在手足重者必及遍體當隨其邪之所湊治之而以保胎為主也泄瀉薛立齋曰妊娠泄瀉屬脾虛不運六君子為主若米食傷加穀芽麥食加麥芽肉食加山楂若兼寒熱作嘔乃肝木侮脾也六君加柴胡生薑兼嘔吐腹痛手足逆冷乃寒水侮土六君加薑桂不應錢氏益黃散若元氣下陷發熱作渴補中湯若泄瀉色黃乃土之真色六君加木香肉果若作嘔不食腹痛惡寒乃脾血虛寒六君加木香薑桂若瀉在五更乃脾腎虛弱五更服四神丸日間服白朮散如不應或復作用八味丸補命門火以生脾土為善大全曰若因風冷水穀不化下如豆汁胃風湯寒冷臍下陰冷洞泄理中湯治中湯伏暑煩渴瀉水四苓散傷濕泄瀉小便自利不換金正氣散胃苓湯慎齋曰妊娠泄瀉必原其由大抵不外脾腎二臟虛者居多夫血統於脾血壅胎元則脾陰虛而食不運化水穀難消而作瀉胎繫於腎腎氣弱命門火衰胎竊其氣以擁護而腎間之陽不能上蒸脾土則為瀉此妊娠泄瀉之由也雖其間不無風寒暑濕之外感飲食生冷之內傷而屬於脾腎有虧者其本也大全因外感立方薛氏主內虛立法分配某證用某藥此膠柱鼓瑟即定後人耳目不能無議也中惡俗名絞腸痧即此大全云妊娠忽然心腹刺痛悶絶欲死者謂之中惡蓋邪惡之氣中於胎而傷人也所以然者血氣不和精神衰弱邪毒之氣得以中之妊娠病此多致胎損薛氏曰當調補正氣為善一味金銀藤煎湯飲之傷食大全曰經云飲食自倍腸胃乃傷若妊娠飲食不節致傷脾胃最難用藥惟木香丸白朮散最穩薛立齋曰東垣云脾胃之氣壯則過時而不飢多食而不傷胃主司納脾主消化五臟之本也食倍而傷者脾氣虛而不化也若投以峻劑則脾胃復傷而胎亦損當審所因調治若飲食停滯或腹痛平胃散嘔吐噁心加枳殼砂仁吞酸噯腐加黃連吳萸腹滿泄瀉六君子湯停肉食加山楂麵食加麥芽糯食加白酒麴米食加穀芽魚腥傷倍陳皮傷辛熱之物加黃連傷生冷之物加砂仁木香大凡脾胃虛弱飲食難化以白朮陳皮為末神麯丸最穩枳殼丸可暫用枳實耗真氣用者審之慎齋曰胎以脾胃為主脾胃強則胎系如懸鐘而不墜若傷食不化則脾困而胎不能固故凡消食導滯先以補脾健胃為主則飲食自化觀立齋一條得其本矣附薛案一妊婦因傷食服枳朮丸胸腹不利飲食益少更服消導寬胸之劑其胎下墜余謂此脾氣而不能承載也用補中益氣及六君子中氣漸健其胎漸安又用八珍湯加升柴而痊咳嗽大全曰肺內主氣外主皮毛皮毛不密寒邪乘之則咳嗽久不已則傷胎也眉批丹溪曰胎前咳嗽由津血聚養胎元肺乏濡潤又兼鬱火上炎所致法當潤肺為主天冬湯主之薛立齋曰前證若秋間風邪傷肺金沸草散夏間火邪剋金人參平肺散冬間寒邪傷肺人參敗毒散春間風邪傷肺參蘇飲若脾肺氣虛六君子加芎歸桔梗若血虛四物加桑皮杏仁桔梗腎火上炎六味丸加五味子脾胃氣虛為風寒所傷補中湯加桑皮桔梗杏仁蓋肺屬辛金生於己土嗽久不已多因脾虛不能生肺氣腠理不密致外邪復感或因肺虛不能生水致陰火上炎治法當壯土金生腎水以安胎為要慎齋曰咳嗽屬肺病大全主以外感寒邪丹溪主於內傷肺燥若立齋則分四時所感五臟均受有風寒火之不同外感內傷之各別雖不專屬胎前咳嗽論而治法無殊總兼安胎為主也喘産寶曰胎前喘息皆由營衛之氣流行失度氣經於臟臟不能受諸氣上並於肺肺溢而氣爭故令喘朱丹溪曰妊婦因火動胎逆上作急者用條芩香附為末水調服呂滄洲曰有婦胎死於腹病喘不得臥醫以風邪傷肺治之診其脈氣口盛人迎一倍左關絃動而疾兩尺俱短而離經因曰病得之毒藥動血致胎死不下奔迫上衝非風寒作喘也大劑芎歸湯加催生藥服之夜半果下死胎而喘止慎齋曰內經論喘屬於肺經為病若妊娠氣喘有乍感風寒而不得臥者客邪勝也發散自愈參蘇飲主之三拗湯在所斟酌若脾虛四肢無力肺虛不任風寒腎虛腰痠短氣不能步猝然氣喘不息此脾肺素虧母虛子亦虛腎氣不歸元而上乘於肺也生脈散補中湯去升柴加沉香補骨主之産寶一條泛論喘證非胎前病也丹溪大動作喘此胎前最多至於毒藥傷胎病喘時俗往往有之病機不可不審也吐血大全曰妊娠吐血皆由臟腑有傷凡憂思驚怒皆傷臟腑氣逆於上血隨而溢心煩滿悶久不已多致墮胎薛立齋曰妊娠吐血若肝經怒火先用小柴胡山梔生地次用四物加逍遙散若肝經風熱防風子芩丸心經有熱硃砂安神丸心氣不足補心湯思慮傷心妙香散胃經有火犀角地黃湯膏粱積熱加味清胃散肺經有火黃芩清肺飲氣不攝血補中湯腎經虛火加味六味丸慎齋曰吐血證或七情內傷或六淫外感皆足致失血之患而妊娠吐血一主火熱者正以氣血壅養胎元或有所感則氣逆而火上乘此立齋分證獨主火論也但火有虛實之分實火當清熱以養血虛火當滋陰以補水則胎安而可固若執尋常治血之法用行血消血之劑胎必墮而禍不旋踵矣臟躁悲傷仲景曰婦人臟躁悲傷欲哭象如神靈所作數欠伸甘麥大棗湯主之許學士曰一婦無故悲泣或謂有祟祈禱不應用仲景方盡劑而愈陳良甫曰管先生治妊婦四五月臟躁悲傷遇書則慘戚淚下茫然忽如有所憑亦與此方而愈古人方種種妙如此眉批臟躁者肺金燥也肺之志為悲胎熱則火炙肺不能自持故無故悲哭茲治以甘緩佐以涼瀉無不愈矣薛立齋曰一妊婦悲哀煩躁其夫詢之云我無故但欲自悲耳用仲景方又用淡竹茹湯佐八珍湯但前證或因寒水攻心或肺有風邪者宜審察治之慎齋曰臟躁者肺臟燥也妊娠氣血擁養胎元津液不能充潤而肺為之燥肺燥當補母故仲聖用甘草大棗以補脾若立齋用八珍補養氣血佐前人未盡腹內鐘鳴大全云孕婦腹內鐘鳴用鼠窟前後土為細末研麝香酒調下立愈産寶曰腹中臍帶上疙瘩兒含口中因妊婦登高舉臂脫出兒口以此作聲令妊婦曲腰就地如拾物狀仍入兒口即止又云治法用鼠穴土同黃連濃煎飲即止慎齋曰鐘鳴即是兒哭故大全治法亦無異立齋云黃連性寒麝香開竅當酌用究竟此作何證凡病有靈素不載而後人以意治之不可深解者此類是也胎動不安陳良甫曰胎動不安由衝任經虛受胎不實也或飲酒行房或忤觸傷僕或怒氣傷肝鬱結不舒或過食辛熱毒藥犯觸皆致胎動不安有因母病而胎動者但治母病其胎自安有因胎不固及母病者但安胎母自愈女科正宗云胎動與胎漏皆下血胎動則腹痛胎漏無腹痛故胎動宜行氣胎漏宜清熱皆緣子宮久虛致令胎墜危同風燭非正産可比急以杜仲丸預服胎動有其因必審其因而藥之不盡此也傷胎大全曰懷胎將滿胎神已具墜僕傷胎甚至下血不醒當驗母之形色若面赤舌青子死面青舌赤吐沫母死唇舌俱青兩邊沫出子母俱死良甫曰娠婦患熱病臟腑熏灼其胎致死身冷而胎不自出服黑神散暖其胎氣溫即自下用附子桂心乾薑當歸生地白芍黑豆大全曰妊五七月築磕著胎惡露已下疼痛口噤欲絶用神妙佛手散探之若不損則痛止子母俱安若損胎立便遂下又名芎藭湯此藥治傷胎去血神效捷經方曰妊婦牙關緊急手強拳握自汗身微熱與中風相似此由毒藥攻胎胎逆上衝其脈浮而軟十死一生若作中風治必死用白扁豆二兩生去皮為末新汲水調下即效又誤食毒物或草藥傷胎下血胎未損可安已死可下用桂桃仁丹皮赤芍茯苓名奪命丸淡醋湯下丹溪亦稱其妙以上數條均足致胎之傷此非脈之可憑必須醫者數問以悉其情而後可以審證施治也聖濟録子死之理有二用藥寒溫各從其宜有胎漏血儘子死者有頓僕內傷子死者有久病胎萎子死者附子湯進三服使胞宮溫暖凝血流動此用溫藥之意也有因傷寒熱病溫瘧之類胎受邪熱毒氣內外交攻因致胎死留於子宮漸至脹大故用朴硝水銀硇砂之藥不惟使胎不脹又能使胎化爛佐以行血順氣之藥死胎即下證治要訣曰胎漏不止欲因其勢下之惟佛手散可安即安不可安即下順其自然醫者檢方用牛膝一兩酒煎服又進桂香散血暴下如決煎獨參湯未及而卒或問牛膝補藥而能墜胎何也曰生則宣而熟則補豈獨牛膝哉鹿角墮胎破血煎為白膠則安胎止血因其熟而信其生此謂粗工著以為世戒慎齋曰胎傷用下恐有誤下之戒也必先驗舌青腹冷口穢的確方可用下亦必先固妊婦本元補氣養血而後下之若輕用攻伐禍不旋踵要決云順其自然四字最妙立齋云胎果不能安者方可議下慎之慎之前賢垂戒深矣墮胎巢元方曰妊娠受胎在腹七日一變婦人墮胎在三月五月七月者多三月屬心五月屬脾七月屬肺皆五臟之脈陰常易虧故多墜耳如三月墮後孕至三月亦墮以心脈受傷也先須調心五七月亦然惟一月墮胎人皆不知一月屬肝怒則多墮洗下體則竅開亦墮一次既墮肝脈受傷下次亦墮今之無子者大半一月墮胎非盡不受孕也故凡初交後最宜將息勿復交接以擾子宮勿令勞怒勿舉重勿洗浴多服養肝平氣藥則胎固矣齊仲甫曰妊婦血氣調和胎乃得安若子宮為風冷所乘血氣虧損不能蔭養其胎而墜若有腰痛須防墜胎腰為腎府女子系胞故也朱丹溪曰陽施陰化胎孕而成血氣虛損不足榮養其胎則墮闢如枝枯果落藤萎花墜或勞怒傷情內火便動亦能墮胎正如風撼其樹人折其枝也火能消物造化自然有孕婦至三四月必墮脈左大無力重取則澀知血少也止補中氣使血自榮以白朮濃煎下黃芩末數十服而安因思胎墮於內熱而虛者為多孕至三月上屬相火所以易墮相火太盛不能生氣化胎乃食氣傷精故也汪石山曰宜大補陰陽去桂加芩柏蜜丸服之王海藏曰墮胎皆由氣血虛損不能榮養胎元所致或七情太甚內火發動火能消物而墮或過傷勞役飢飽動胎而墮或過於房事觸動其胎而墮或勞力跌僕閃挫傷動其胎而墮或大怒悲哀傷動心肝之血墮而墮然小産重於大産由胎臟損傷胞系腐爛故也治宜補虛生肌肉養臟氣生新血去瘀血為主素患此者按證治之王節齋曰婦人墮胎致成滑胎之患於妊後須多服養氣血之劑以固胎元而補其虛如養胎全在脾胃故白朮為安胎要藥若因氣者多加砂仁少佐木香行氣慎齋曰妊娠墮胎前條已備病機之要而保胎之法節齋治論在養脾胃其本也莫若千金保胎丸用白朮黃芩熟地當歸杜仲續斷阿膠香附益母川芎陳皮砂仁艾葉棗肉丸一方為最妙趙養葵得其意以六味丸加杜仲續斷阿膠五味急滋腎水以固胎元正以胎繫於腎腎氣壯則胎固而可安此補脾不如補腎之要妙也齊仲齋曰血寒則凝血溫則散若墮胎損經其血不止或不出一則因熱而行一則氣虛不斂瀉血多者必煩悶而死或因風冷墮胎血冷相搏氣虛血逆上則血結不出搶上攻心則煩悶而死當溫經逐寒其血自行若血淋瀝不止最衝任氣虛不制約制故也宜膠艾湯加伏龍肝散陳良甫曰墮胎後復損經脈下血不止甚則煩悶至死皆以調補胃氣為主慎齋曰此序墮胎後有下血不止血凝不出二證也墮胎而血出過多不止者經脈損而衝任之氣虛而不攝是不足病也法當大補氣血以固其脫墮胎而血凝不行作痛者外邪乘而敗濁之血閉而不流是有餘病也法當導瘀消蓄以溫其經不特墮胎為然也即産後見是證亦宜以此治之半産武叔卿曰妊娠日月未足而産者謂之半産蓋由妊婦衝任氣虛不能滋養胎元或顛仆閃墜致氣血損動或因熱病溫瘧之類仲景謂虛寒相搏此名為草婦人則半産漏下是也産寶曰人之胎系胞中氣血養之靜則神藏欲火一動則精神走泄大擾於中則胎墮矣驢馬尚知護胎人其知所戒哉眉批欲動則精泄而子宮不閉多致半産此論可謂發前人之未發東垣曰婦人半産漏下昏冒不省瞑目無知蓋因陰血暴亡有形血去則心神無所養心與包絡者君火相火也得血則安亡血則危火上熾故令人昏冒火乘肺故瞑目不省人事是陰血暴亡不能鎮撫也血已虧損醫反用滑石甘草石膏辛甘大寒之藥瀉氣中之熱是血虧瀉氣二者俱傷反成不是虛勞病夫昏迷不省者上焦心肺之熱也為無形之熱而用寒涼之藥驅令下行豈不知內經云病氣不足宜補不宜瀉眉批所謂有兩死而無兩生也瞑目閣眼之病悉屬於陰陰血降亡孤陽欲脫當補而升舉之心得血則能養而神不昏方用補血養血生血益陽以補手足厥陰之不足名全生活血湯眉批先生之論甚妙但亡血家不可發汗方中風藥倍於血藥雖曰升舉其陽不能無疑焉薛氏曰小産重於大産大産如栗熟自脫小産如生破其皮殼傷其根蒂也人苟輕視致死者多治法宜補形氣生新血去瘀血若未足月痛而欲産芎歸補中湯倍加知母止之若産而血不足人參黃耆湯補之若産而心腹痛當歸川芎湯主之胎氣弱而小産者八珍湯固之若血出過多而發熱者聖愈湯汗不止急與獨參湯發熱煩躁肉瞤筋惕八珍湯口渴面赤脈洪而虛當歸補血湯身熱面赤脈沉而微四君加薑附東垣云晝發熱而夜安靜陽氣自旺於陽分也四物二連湯晝安靜而夜發熱陽氣下陷於陰分也補中益氣湯晝夜俱發熱者重陽無陰也當峻補其陰四物湯之類王太僕云大寒而甚熱之不熱是無火也八味丸大熱而甚寒之不寒是無水也六味丸慎齋曰妊娠半産非七情六淫勞役房室則無是患故用藥與正産無殊總不外丹溪大補氣血為主一論也然墮胎與半産有別如一二三四月胎未成形而下者名曰墮胎五六七八月胎已成形而下者名曰半産總屬妊婦氣血虛弱衝任經虛以致胎元不固故千金保胎丸一方最妙而養葵以六味飲加杜續五味阿膠為安胎聖藥此傳心之祕典也胎不長虞天民號花溪曰按月行經而胎日長者名曰盛胎其婦血氣充盛養胎之外血有餘也有胎數月而血大下謂之漏胎因事觸犯動其妊脈故血下而不傷子宮也然孕中失血胎雖下墮氣血亦虧多致逾月不産曾見有十二三月或十七八月或二十四五月生者俱是氣血不足胚胎難長故耳當服大補氣血藥以培養之婁全善曰先期欲産者涼血安胎過期不産者補血行滯聖濟録曰人受氣於有生十二經脈迭相滋養凡胎處胞中或有萎燥者由孕婦所稟怯弱陰陽氣血偏勝非冷即熱胎失滋養所以萎燥不長也所以然者由脾胃飲食減少不能行榮衛化精微養衝任故令胎內弱惟宜資母血氣調脾胃而化水穀則胎從而有養矣慎齋曰妊娠以十二經脈養胎全賴氣血以充養胎元而氣血之旺惟以脾胃水穀之氣化精微而生血氣雖有宿疾失調總以健脾扶胃為長養胎元之本聖濟一條為知要矣鬼胎大全曰人之臟腑調和則血氣充實風邪鬼魅不能幹之若榮衛虛損精神衰弱妖魅鬼精得入於臟狀如懷妊故曰鬼胎虞天民曰晝之所思為夜之所見凡人之性淫而虛者肝腎相火無時不起故勞怯人多夢與鬼交所謂鬼胎者偽胎也非實有鬼神交接成胎也古方有云思想無窮所願不遂為白淫流入子宮結為鬼胎本婦自己之血液淫精結聚成塊胸腹脹滿儼若胎孕非偽胎而何薛立齋曰鬼胎證因七情相干脾肺虧損氣血虛弱衝任乘違所致乃元氣不足病氣有餘也若見經候不調就行調補庶免此證治法以補元氣為主而佐以雄黃丸之類行散之一婦經閉入月腹漸大面色或青或黃作胎治不應診之脈澀寒熱往來體倦少食此鬱怒傷肝脾之證非胎也用加味歸脾逍遙而愈孤漿預下脈經云婦人懷軀六七月暴下鬥余水其胞必倚而墮此非時孤漿預下故也眉批孤漿預下必倚而墮此氣血兩虛也補胎疸巢氏曰其母臟氣熱熏蒸於胎兩胎一死一生巢氏曰陽施陰化精盛有餘則成兩胎其兩胎而一死者候其胎上冷是胎已死也附方子喑方玉燭散當歸川芎白芍熟地大黃芒硝甘草上二兩入蜜少許時呷之令心火下降眉批子喑用玉燭散似屬無理中風方防風散治妊娠中風卒倒悶亂口噤四肢急強防風葛根桑寄生各一兩羚羊角細辛當歸桂心秦艽漢防己甘菊花茯神甘草各五錢上㕮咀每服八錢水一盞半生薑五片煎至一大盞去滓入竹瀝半合攪勻溫服無時白殭蠶散治妊娠中風心膈痰涎壅滯口噤肢強白殭蠶炒天麻獨活各一兩麻黃一兩五烏犀角七錢半白附子炮半夏制南星炮藿香各五錢龍腦二錢半另研上為細末每服一錢生薑蒲荷湯調下日三服赤箭丸治妊娠中風手足不隨筋脈緩急言語蹇澀赤箭萆薢酒浸麻黃獨活鼠黏羚羊角熟地阿膠防風川芎當歸五加皮苡仁秦艽丹參棗仁漢防己柏子仁各七錢半上為末煉蜜丸桐子大每服三十丸食前豆淋酒下白朮酒治妊娠中風口噤語言不得白朮兩半獨活一兩黑豆一合炒上銼酒三斤煎取一斤半去滓溫分四服口噤者拘口灌之得汗即愈又方治妊娠中風不省人事熟艾三兩陳米醋炒令極熱綿裹尉臍下良久即省眉批此方中寒中風俱妙風痙方羚羊角散治妊娠冒悶角弓反張名曰子癇風痙羚羊角獨活棗仁炒苡仁防風當歸酒浸五加皮川芎茯神杏仁各五分木香甘草各二分上㕮咀加生薑五片水煎服羌活酒治妊娠風痙口噤四肢強直角弓反張羌活兩半防風一兩黑豆一合去皮上前二味好酒五斤浸一宿每服黑豆一合炒熱入藥酒一大盞候沸即住去滓分兩服灌之鉤藤湯治妊娠瘛瘲鉤藤當歸茯神人參各一錢桔梗一錢半桑寄生上銼水煎服煩熱加石膏二錢半傷寒方六合湯見準繩女科通治四物湯加減條下香蘇散凡妊娠傷寒勿論日數但見惡寒頭痛此主之香附炒黑紫蘇各二錢陳皮一錢甘草五分上銼加生薑三斤蔥五根煎服頭痛加川芎白芷假令得脈肝脈外證面青善怒脈浮而弦惡寒里和本方加羌防各一錢謂肝主風是膽受病也假令得心脈外證面赤口乾善笑脈浮而洪惡寒里和本方加黃芩石膏各一錢半謂心主熱是小腸受病也假令得脾脈面黃善噫脈浮而緩惡寒里和本方加白朮防己各一錢半謂之濕是陽明受病也假令得肺脈外證面白善嚏善悲脈浮而澀惡寒里和本方加黃耆防風各一錢謂肺主燥是大腸受病也假令得腎脈外證面黑善恐脈浮而澀惡寒里和本方加附子炮一錢謂腎主寒是膀胱經受病也附子犯胎禁用吳茱萸溫之可也眉批附子雖云犯胎然仲景附子湯亦治胎寒但須真寒方可酌用黃龍湯活人妊娠傷寒得之三五日後惡寒發熱內有煩渴引飲小便赤澀之證此邪在半表半裡也此主之柴胡二錢黃芩一錢半人參甘草各一錢上加薑棗煎如寒熱往來無汗口渴加葛根二錢去棗入蔥白三根頭疼加川芎白芷各一錢半去棗加蔥白三根發熱有汗口渴加白朮瓜蔞根各一錢半脈浮大有力大熱大渴合人參白虎湯去薑棗心煩不得臥加茯苓麥冬各一錢嘔噦加半夏茯苓各一錢去棗胸膈滿痛加枳殼香附川芎各一錢大便祕加大黃五分得利則止不利加至一錢以利為度眉批黃龍湯即小柴胡或半夏為少陽經藥而此自重在和解故主之其加減法更妙三黃解毒湯妊娠傷寒五六日後並無頭痛惡寒表證但煩躁發熱大渴小便赤大便祕或利下赤水六脈沉實此邪在裡也此方主之黃芩黃連黃柏山梔大黃各等分假令得肝脈內證煩滿消渴溲便難尺寸脈沉弦有力是肝經受病也本方加當歸一錢半甘草五分倍山梔假令得心脈內證煩躁心痛掌中熱而噦尺寸脈沉數有力是心經受病也本方加麥冬一錢竹茹一錢倍黃連假令得脾脈內證腹脹滿譫妄脈沉緩有力是脾經受病也本方加枳實厚朴各一錢半倍大黃假令得肺脈內證喘咳煩滿寸脈沉澀有力是肺經受病也本方加葶藶炒一錢桔梗五分倍黃芩假令得腎脈泄利下重足脛寒而逆尺寸脈沉而石是腎經受病也本方去芩連山梔加炮薑五分熟地炒一錢半倍黃柏加減當歸六黃湯治妊娠傷寒發汗後汗漏不止胎氣損者歸身炙耆生地黃芩白芷阿膠珠炙草各等分上浮小麥煎湯下藥五錢煎七分溫服加味黃芩湯治妊娠傷寒下後協熱利不止胎氣損者黃芩二錢白朮白芍茯苓炙草阿膠各一錢上水一盞半後入阿膠再煎至八分服加味竹葉湯妊娠汗下後熱不除者虛也此方主之人參麥冬生地阿膠炙草各一錢上加竹葉十二片粳米一合煎服眉批此竹葉石膏湯變法也以阿膠生地易知母石膏妙甚加減四物湯治妊婦傷寒熱極發斑狀如錦紋者當歸白芍生地黃芩各等分每服八錢水煎服梔子大青湯治妊婦傷寒發斑變為黑色升麻黃芩梔子各二兩大青杏仁各半兩上㕮咀每服五錢水一盞半細切蔥白三寸煎服眉批一方治孕婦熱病斑出赤黑色小便如血氣急欲絶落胎梔芩升麻各一錢青黛八分懷生地二錢豆豉四十九粒杏十粒石膏一錢半蔥白七寸護胎法本事治妊娠時氣身熱令子不落伏龍肝為末小調塗臍下二寸干則易瘥則止又井底泥調敷心下干則易又方白藥子為末雞蛋清涸攤紙上如碗大貼臍下胎存處干則以水潤之瘧疾方七寶散治男婦一切瘧疾常山制朴青皮陳皮甘草檳榔草果去殼各等分上㕮咀每服半兩於未發隔夜用水酒各一盞煎至一大盞去滓露一宿再用水酒煎滓亦露一宿當發之早溫藥面東先服頭藥少頃服二煎效眉批又方半夏七分草果青皮各三分烏梅二分人參黃芩各一錢白朮當歸各二錢紫蘇甘草各四分藿香五分薑水煎清脾湯治妊娠瘧疾寒少熱多或但熱不寒舌苦舌乾大便祕澀不進飲食脈弦數者青皮制朴白朮炒草果茯苓半夏黃芩柴胡炙草各五分上加生薑水煎服驅邪散治妊娠停食感冷發為瘧疾高良薑炒白朮草果橘紅藿香葉砂仁白茯苓各一錢半炙草五分上加生薑五片棗一枚水煎服外用護胎法見傷寒痢疾方白朮湯一名三物湯治孕婦下利膿血白朮黃芩當歸當歸芍藥湯治妊娠腹中㽱痛下痢赤白白芍茯苓當歸川芎澤瀉各五錢白朮七分半上為末溫酒或米飲任意調服黃連湯治妊娠下痢赤白膿血不止黃連八分制朴阿膠當歸乾薑各六分川柏艾葉各四分上為細末空心米飲調下日三服三黃熟艾湯治妊娠挾熱下痢黃連黃芩黃柏熟艾等分嘔加橘皮生薑眉批以三黃湯加熟艾治熱痢加橘皮生薑治嘔俱妙大寧散治妊娠下痢赤白灰色泄瀉疼痛垂死者黑豆二十粒甘草二錢生炙各半粟殼二個去頂半生半炒上為粗末加生薑三片水煎食前服神效鴨蛋湯治婦人胎前産後赤白痢生薑取自然汁鴨子一個打碎入薑汁內攪勻上二味煎八分入蒲黃二錢煎五七沸空心溫服立效二黃散治妊娠下赤白絞刺疼痛雞子一枚烏雞者佳傾出清留黃用黃丹一錢入雞子殼內同黃攪勻厚紙糊鹽泥固濟火內煨乾上研細末每服二錢米飲調下一服愈者是男二服愈者是女霍亂方香蘇散香附炒紫蘇各二錢陳皮一錢炙草藿香葉縮砂各五分上銼水煎服如轉筋加木瓜一錢胎動不安加白朮一錢半如夏月得之加黃芩錢半黃連一錢香薷二錢如冬月得之加人參白朮各一錢乾薑炮五分眉批此方平正可法回生散治中氣不和霍亂吐瀉但一點胃氣存者服之回生陳皮去白藿香各五分上為末水煎溫服眉批此方良七味白朮散治脾胃虛弱吐瀉作渴不食白朮人參茯苓炙草木香藿香各五錢乾葛一兩上為末沸湯調服二錢吐甚者加生薑汁頻服理中湯治妊娠霍亂腹痛四肢逆冷汗出脈虛弱者白朮人參乾薑炮甘草炙各一錢甚者加熟附子五錢木瓜煎治妊娠霍亂吐瀉轉筋悶絶淡吳萸生薑各七分半木瓜一兩半分三服眉批此方可常用竹茹湯嘔吐益元散桂苓甘露飲冬葵子湯並治霍亂武叔卿曰霍亂切忌溫藥犯者必死即不發熱煩渴者亦不可輕用慎之慎之泄瀉方胃芩湯治脾濕太過胃氣不和腹痛泄瀉水穀不化陰陽不分此平胃散與五苓散合方也蒼朮厚朴陳皮白朮茯苓豬苓澤瀉各一錢官桂炙草各五分上加生薑三片棗二枚水煎食遠服不換金正氣散治妊婦傷濕泄瀉蒼朮厚朴陳皮藿香半夏各一錢甘草五分上加薑棗煎胃風湯治風冷乘虛入客腸胃米穀不下泄瀉注下及腸胃濕每下如豆汁或下瘀血或下魚腦無度眉批此方治瀉久氣血兩虛誠妙然肉桂非久虛脈冷者斷不可用其曰胃風取其益胃而升陽也人參白朮茯苓當歸川芎白芍肉桂各等分每服八錢陳倉米一撮水煎服腹痛加木香加味理中湯治妊娠泄瀉人參白朮茯苓白芍乾薑黃連木香藿香訶子肉豆蔻甘草各一錢上銼水二鍾生薑三片大棗二枚煎一鍾飢時服錢氏益黃散治妊娠泄瀉嘔吐腹痛手足厥逆陳皮青皮訶子各五錢丁香二錢甘草炙三錢上為末每服三錢水煎服中惡方當歸散治妊娠中惡心腹疼痛當歸丁香川芎各三兩青皮吳萸五錢湯泡三次炒上為細末溫酒調下一錢補遺方治妊娠中惡心腹絞急切痛如鬼擊之狀不可按摩或吐衄血者熟艾如拳大煮汁頻服眉批此真中惡也煮艾方極妙一方灶心土為末每服二錢井水調服白湯亦可傷食方平胃散治妊娠飲食停滯或肚腹作痛蒼朮泔浸炒厚朴薑製陳皮各一錢甘草炙五分上銼加生薑三片棗一枚水煎服嘔吐噁心加枳殼砂仁酸噯腐加川連三分吳萸二分六君子湯治脾胃虛弱飲食難化或腹滿泄瀉人參白朮茯苓炙草半夏陳皮各一錢上銼加生薑三片棗一枚水煎服停滯肉食加山楂麵食加麥芽糯米食加白糖酒麴一味米食加穀芽魚腥所傷倍加陳皮辛熱之物加黃連傷生冷之物加砂仁木香如不應更加肉豆蔻補骨脂再不應加四神丸白朮散治妊娠脾胃虛弱氣不調和飲食易傷白朮炒紫蘇各一兩人參白芷炒各七錢半川芎訶子皮青皮各五錢甘草炒二錢半每服二錢加生薑三片煎咳嗽方馬兜鈴散治妊娠氣壅塞咳嗽氣喘馬兜鈴苦梗人參甘草桑白皮陳皮大腹皮黑豆水浸洗紫蘇各一錢加生薑一片水煎紫菀湯治妊娠咳嗽不止胎動不安紫菀天冬各一兩桔梗杏仁桑皮甘草各一方有防風五分上㕮咀每服三錢加竹茹一團水煎去滓入蜜半匙再煎一二沸溫服眉批加蜜法妙喘急方平胃散治妊娠上氣喘急大便不通嘔吐不食腹脅脹痛川芎木香各一錢半陳皮熟地乾薑炮生薑厚朴制炒甘草各一錢上火燒鹽一捻煎一鍾時服桔梗湯馬兜鈴並見前咳嗽條血證方河間生地散治吐血衄血咯血溺血下血諸見血無寒皆屬於熱但血家證皆宜服此生地熟地杞子地骨皮天門冬黃耆白芍黃芩甘草各等分上㕮咀每服一兩水煎服脈微身涼惡風每兩加桂半錢下血加地榆眉批黃耆益氣枸杞助陽似與血證當斟酌然與諸藥同用則又助氣益血耳局方必勝散治血妄流溢吐血衄血嘔血咯血熟地小薊並根用人參蒲黃微炒當歸川芎烏梅肉各一兩上為粗末每服五錢水煎溫服眉批此方有人參芎歸烏梅血證新起不可輕用臟躁方甘麥大棗湯治婦人臟躁悲傷不止甘草三兩小麥一升大棗十枚上水六升取三升溫分三服亦補脾氣眉批悲傷肺病此方補脾所謂補母也甘能生濕濕生何反燥焉淡竹茹湯治妊婦心虛驚悸臟躁悲傷又治虛煩甚效麥冬小麥半夏各一錢半人參茯苓甘草五分上加生薑五片棗一枚淡竹茹一團水煎服一方治臟燥悲哭及自笑自哭紅棗燒存性研末米飲調下腹內鐘鳴方一方鼠窟土一錢麝香三釐酒調下一方鼠穴土同黃連煎湯服胎動傷胎方安胎散妊娠常服安胎白朮當歸各一錢黃芩一錢半炙草五分上銼水煎服如腹脹加神麯麥芽二分半氣虛泄瀉加人參三分陳皮二分潮熱加柴胡一錢氣逆加枳殼三分眉批健脾養血清火則衝任自足胎孕自安芩術湯常服健脾清熱故胎不動子芩一兩白朮五錢上銼水煎服金匱當歸散此方養血清熱孕婦宜常服如瘦人血少有熱胎動不安曾半産者皆宜服以清其源而無後患也當歸川芎白芍黃芩各一兩白朮二兩上為末每服二錢砂仁湯調下日再服鉤藤湯治胎動腹痛氣欲絶者此由勞動傷胎宜急治之鉤藤當歸茯神人參各一錢桔梗一錢半桑寄生五分上銼水煎服煩熱加石膏二錢半十聖散治氣衰血少不能護胎致不安者宜此主之人參黃耆白朮地黃砂仁各五分炙草當歸川芎白芍炒各一錢續斷八分上銼水煎服黃耆湯治胎動不安腹痛下黃汁黃耆川芎各一兩糯米一合上水二大盞煎一盞三分溫服眉批糯米者穀味之陰所以補地氣之不足乘天行之健也佛手散治妊娠因事築磕胎動不安或子死腹中惡露不下疼痛不已用此探之不損則疼止損則立下當歸酒浸三錢川芎二錢上酒一鍾煎乾入水一鍾煎二三沸溫服膠艾湯治傷損動胎下血腹痛阿膠炒一兩艾葉二兩水煎服指迷方加秦艽一兩膠艾芎歸湯治妊娠跌僕胎動腰腹痛欲死已有所下阿膠川芎各三兩當歸地黃艾葉各二錢眉批阿膠益金固血艾葉助陽上升升則不墜固則不流故二方皆用之一方有甘草無地黃水七升煮三升半分三服阿膠散治妊娠或因頓作或因毒藥胎動不安阿膠炒艾葉炒當歸酒浸川芎白芍炒熟地黃耆炙草各一錢上加生薑五片棗三枚水煎空心服當歸湯治妊娠胎動心煩口乾橫生逆産上衝下築迷悶唇口青黑手足冷厥當歸人參各一兩半阿膠炒一兩甘草二兩一方有川芎厚朴無甘草上服八錢加連須蔥白一莖水煎溫服眉批二方平中之奇且奏效最捷一方治妊娠從高墜下腹痛下血煩悶生地益母草各一兩當歸黃耆各五錢上㕮咀每服四錢水一盞薑四片煎六分去滓服無時三物解毒湯治誤服毒藥動胎甘草黑豆淡竹葉各等分水煎濃服白扁豆散治妊娠誤服諸般毒藥毒物白扁豆生去皮為細末米飲調服方寸匕神效或濃煎亦可眉批解毒良方墮胎半産方千金保胎丸孕三月墮胎雖氣血不足乃中衝脈有傷中衝脈即陽明胃經供應胎孕至此時必須節飲食絶欲戒怒庶免小産之患服此可以保全土炒白朮薑汁炒熟地薑汁炒杜仲各四兩酒洗當歸酒洗川斷蛤粉炒阿膠四制香附益母草炒條芩各二兩陳皮川芎艾葉醋煮各一兩砂仁炒各五錢上為末煮棗肉丸桐子大每服百丸空心米飲下眉批三月雖手心主養胎而實十二經皆受氣於陽明陽明屬中衝故中衝傷胎亦墮也杜仲丸治妊娠二三月胎動不安防其欲墮宜預服之黃耆人參白朮甘草川芎地黃杜仲去粗皮薑汁炒去絲為末棗肉丸桐子大每服七十丸米飲下眉批胎繫於腎故用杜仲補腎若云胎動不安則有脾虛氣虛血虛有寒熱之不同又當因而病藥之不可熱也刪繁方治妊娠懷胎數落而不結實黃耆人參白朮甘草川芎地黃吳茱萸各等分一方有當歸乾薑上為末空心溫酒下二錢婁氏曰按丹溪論俱是虛熱而無寒者今姑存此一方以俟施之千百而一也眉批此方極穩當人參湯治半産後血下過多心驚體顫頭目運轉或寒或熱臍腹虛脹疼痛人參麥冬生地當歸白芍炒黃耆茯苓炙草各一兩上㕮咀每服三錢水一盞煎七分食前分服眉批別録謂人參能治心腹鼓痛此用之蓋虛痛也若實痛則不宜矣人參黃耆湯治小産氣血不止人參黃耆炙白朮炒當歸白芍艾葉各一錢阿膠炒二錢上作一劑水煎服眉批脾統血氣載血此方最妙全生活血湯治婦人分娩及半産漏下昏冒不省瞑目無所知覺此因血暴亡心神無所養也用此補血升陽升麻白芍各三錢當歸酒洗葛根柴胡去苗紅花三分羌活獨活防風甘草炙各二錢川芎一錢半藁本一錢半生地夏月加熟地各一錢蔓荊子細辛各五分上㕮咀每服五錢煎一盞去滓食前稍熱服以上治血下過多之劑眉批陰從陽升故用藥如此三陰三陽之氣俱升生地黃湯治妊娠胎氣損動氣血不調或顛仆閃墜以致胎墮墮後惡滯不盡腹中㽱痛生地黃一兩大黃煨白芍當歸茯苓細辛黃芩炙草桂去粗皮各半兩上每服五錢水一盞半入生薑大棗同煎至一盞不拘時溫服眉批妙在桂與大黃同用然須認證真切方可當歸酒治妊娠墮胎後血不出當歸炙令香白芍炒各二兩上每服三錢無灰酒一盞入生地汁一合銀器內慢火煎七分去滓溫服以惡血下為度眉批産後忌芍藥而此以血不出者用之要知與當歸同用以無灰酒生地汁同煮則不收斂而入肝行血矣烏金散治妊娠墮胎後血不下兼治諸病血病好墨二兩燒通赤好醋一升醮七遍再燒通赤放冷另研沒藥麒麟竭各二錢半麝香一錢上為細末每服溫酒調下一錢匕如血迷心用童便加酒調下二錢匕紅藍花散治墮胎後血不出奔心悶絶不識人紅藍花微炒男子發燒存性京墨燒紅血竭研蒲黃隔紙炒各等分上為末童便小半盞調二錢服之立效眉批二方俱宜合之以備緩急白蜜酒治墮胎後惡血不出白蜜二兩生地取汁一盞酒半盞上汁與酒共入銅器內煎五七沸入蜜攪勻分兩服二三劑百病可愈以上治惡血不出之劑眉批妙在緩肝行血以上諸方攻補不同所謂寒熱溫涼各從其事也用者審之當歸湯治妊娠墮胎胞衣不出當歸切炒牛膝酒浸各兩半木通滑石研各二兩冬葵子炒三合瞿麥穗一兩每服三錢未下再服以下為度眉批此方滑利催生下胞俱可用地黃湯治胞衣不出蒲黃炒生薑切炒各二錢半生地五錢切炒上無灰酒三盞銀器內同煎至二煎去滓分三服未下再作服眉批方法宜妙宜詳之蒲黃酒治胞衣不下蒲黃炒一合槐子十四枚為末上酒三盞煎二分溫三服未下更服以上治胎衣不下之劑眉批一方一變巧似化工當歸川芎湯治小産後瘀血心腹痛或發熱惡寒當歸川芎熟地白芍延胡炒紅花香附陳皮澤蘭丹皮桃仁各等分上水煎入童便酒各小半盞服若手按腹愈痛此瘀血為患宜此藥若按之不痛是血虛宜四物參芩白朮眉批平正之方可法可法尤妙當歸補血湯治肌熱躁熱目赤面紅煩渴引飲晝夜不息脈滑大而虛重按全無此血虛也誤服白虎必死當歸三錢黃耆一兩上作一服水煎眉批病似陽明症象白虎故云非此東垣神方也病真藥當一服如神胎不長方安胎白朮散治妊娠宿有冷胎萎不長或失於將理傷胎多墮此藥補榮衛養胎氣白朮川芎各一兩吳萸泡五錢炙草一兩半上為細末每服二錢食煎溫酒調下忌生冷果物眉批天地以大氣春生夏長人身以心肝應之若宿有冷者春氣不溫也以吳萸溫之胎痿不長者夏氣不大也以川芎大之白朮甘草乃培土以補其母也黃耆湯治妊娠胎不長安胎和氣思食利四支黃耆炒白朮炒茯苓前胡人參各七分半川芎甘草炒各五分上加生薑三片棗二枚水煎食前服眉批此方悉以補氣為主而前胡散結氣川芎行結血皆所以助其生長也觀其主治乃得其妙長胎白朮丸治孕婦宿有風冷胎痿不長或傷動胎氣多致損墮常服益血保胎調補衝任白朮川芎阿膠生地各六分當歸一兩牡蠣二分川椒三分上為末煉蜜丸桐子大每服三十丸米飲下眉批此以風冷而用川椒川芎以傷動而用白朮牡蠣阿膠生地涼血固胎不多用者畏其涼也當歸一兩其血中之主藥歟故以為尺分一兩奇人參丸治妊娠胎不長宜服養胎人參茯苓當歸柴胡刺蘇厚朴桑寄生各一兩枳殼七錢半甘草五錢上為細末煉蜜丸桐子大每服二十丸食溫水下眉批此方助生氣寬中育胎又是一法知母丸治妊未足月而痛如欲産者兼治産難及子煩知母為末煉蜜丸桐子大粥飲下二十丸眉批治子煩胎熱妙劑又方取蒲黃篩過如棗核大井花水調服加味四物湯治過月不産者用此補血行滯四物加香附桃仁枳殼縮砂紫蘇上用水煎服即生鬼胎方斬鬼丹治鬼胎如抱一甕吳萸川烏一方作川芎秦艽柴胡白殭蠶巴戟巴豆不去油芫花醋煮各二兩輕者去芫花巴豆巴戟上為末煉蜜丸桐子大每服七丸蜜酒下即出惡物而愈眉批此等方皆治諸蟲怪病之假借氣血而成形者又何獨論鬼胎之有雄黃丸雄黃細研鬼臼去毛莽草丹砂細研巴豆去油獺肝炙黃各五錢蜥蜴一枚炙蜈蚣一條炙黃上為末煉蜜丸桐子大每服二丸空心溫酒下日兩服如不利至三丸初下清水次下如馬尾狀甚者下蟲蛇蝦蟆或如白膏或如豆汁其病即除枳實檳榔丸治妊娠癥瘕癖塊枳實檳榔黃連黃柏黃芩當歸阿膠炒木香上為末水法丸小豆大每服三十丸溫米飲下不計時日三服眉批此方甚平何以能治癥瘕痞塊唯疑似者庶乎可
