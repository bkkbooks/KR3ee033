body:
  text: 卷六浮腫產後浮腫屬敗血停積不可作水氣治產寶百問曰產後四肢浮腫由敗血乘虛停積循經流入四肢留淫日深腐壞如水故令面黃四肢浮腫醫者不識便作水氣治之凡治水多用導水藥極虛人產後既虛又以藥虛之是謂重虛多致夭枉服小調經散血行腫消則愈產後浮腫屬血與氣搏留滯經絡陳無擇曰產後浮腫多端有自懷妊腫至產後不退亦有產後失於將理外感寒暑風濕內則喜怒憂驚血與氣搏留滯經絡氣分血分不可不辨當隨脈證治之宜得其情小調經散治血分固效但力淺難憑不若吳茱湯枳朮湯奪魂散大調經散皆要藥也產後浮腫屬風邪搏氣陳良甫曰產後勞傷血氣腠理虛為風邪所乘邪搏於氣不得宣越令虛腫輕浮是邪搏於氣氣腫也若皮膚如熱蒸狀則變水腫氣腫者發汗即愈水腫者利小便即差慎齋按產後虛腫多屬氣血虛而脾胃弱營衛不運所致若云發汗利小便是重竭津液而益虛其虛矣豈產後腫竟作外邪有餘證治乎產後浮腫屬體虛有濕熱朱丹溪曰產後浮腫小便少口渴惡寒無力脈沉此體虛而有濕熱之積必上焦滿悶宜補中導水行氣可也方用白朮陳皮川芎茯苓木通產後浮腫屬虛大補氣血朱丹溪曰產後腫必用大補氣血為主少佐蒼朮茯苓使水自利產後浮腫分證治法薛立齋曰前證屬寒水侮土宜養脾肺若氣虛浮腫宜益脾胃若水氣浮腫宜補中氣又曰產後浮腫或兼喘咳脈沉細無力此命門火衰脾土虛寒八味丸主之慎齋按已上六條序產後有浮腫之證也浮腫雖有風寒濕熱外感之邪若產後則屬氣血虛而脾土不運肺氣不輸者多故產寶以下四條主客邪有餘論而丹溪立齋惟以補氣血扶脾土為要也發熱產後外感風寒發熱不可作傷寒治李氏曰產後外感離床太早或摸衣襲風冷入下部令人寒熱似瘧頭疼不止血虛者芎歸湯加人參柴葛氣虛者補中湯加防風乾薑切不可以傷寒法治之產後頭痛發熱不可作外傷感冒治大全曰凡產後頭痛發熱不可便作外傷感冒治此等多是血虛或是敗血作禍宜以和平之劑必效如玉露散或四物加柴胡若便以小柴胡竹葉石膏之類不救者多矣產後諸發熱狀類傷寒不可發汗吳蒙齋曰新產後傷寒不可輕易發汗產時有傷力發熱有去血過多發熱有惡露不去發熱有三日蒸乳發熱有早起勞動飲食停滯發熱狀類傷寒要存仔細詳辨切不可便發汗大抵產後血已空虛汗之則變筋惕肉瞤或鬱冒昏迷或搐搦或便秘其害非輕凡有發熱宜與四物為君加柴胡人參炮姜最效蓋乾薑辛熱能引血藥入血分氣藥入氣分且能去惡生新有陽生陰長之道以熱治熱深合內經之旨慎齋按已上三條序產後有外感發熱之證也產後發熱狀類傷寒雖有外感禁用發表惟以養血為主佐以散風寒之劑如生化湯芎歸湯倍加川芎蔥白若吳氏論發熱數種又當分因治之如惡露未盡腹痛未除形壯脈實五七朝內不見虛證人參尚宜斟酌如有虛證必以桃仁與人參同用為當產後傷食發熱宜下金匱要略曰產後病解能食七八日更發熱此為胃實大承氣湯主之徐注曰此條言大虛之後有實證即當以實治故謂病鮮能食則經絡臟腑之氣俱平無產後本病可疑明是食復之象故曰胃實大承氣峻逐之恐因循致虛也產後傷食發熱類傷寒證治要訣曰彌月俗名滿肚多有恣意食物致傷食發熱有類傷寒食復證宜先用紅丸子一二服卻進小柴胡湯此論蓋有所本產後傷食發熱不可作血虛治王節齋曰產後脾胃大虛多有過服飲食傷滯發熱者誤作血虛則不效故凡遇產後發熱須問服何飲食有無傷積飽悶惡食泄瀉等證只作傷食治之若發熱而飲食調者方用補血正法產後傷食發熱分證用藥薛立齋曰前證若胸膈飽悶噯腐惡食或吞酸吐瀉發熱此為飲食停滯宜四君子加厚朴楂曲若胸膈悶滿食少發熱或食難化此為脾氣虛弱宜四君子加炮姜若用峻厲之劑復傷元氣則謬矣慎齋按已上四條序產後有傷食發熱之證也產後發熱有六證一曰血虛發熱二曰勞力發熱三曰瘀血發熱四曰風寒發熱五曰傷食發熱六曰蒸乳發熱須分有餘不足治法如血虛勞力為不足瘀血傷食風寒乳蒸為不足中之有餘不足者固宜大補氣血而不足中之有餘亦不可以務末而忘本也金匱胃實一證雖下亦當酌量產後發熱屬肝虛血燥趙養葵曰如胎前原有陰火證至產後去血過多必大發熱煩躁汗出等證若依前法大補氣血其證必甚當用逍遙散以清肝火養肝血因去血既多肝虛血燥之故不可泥於氣血虛之論也產後發熱屬陰虛生內熱朱丹溪曰產後發熱此熱非有餘之熱乃陰虛生內熱耳以補陰藥大劑服之必用乾薑者何也曰乾薑能入肺利氣入肝經引血藥生血然不可獨用與補陰藥同用此造化自然之妙婁全善曰產後發熱多屬虛寒惟乾薑入補陰藥中神效此丹溪之法也產後發熱屬陰虛陽浮於外王節齋曰婦人產後陰虛陽無所依浮散於外故發熱用四物湯補血以炙乾姜之苦溫從治收其浮散以歸於陰也產後發熱屬血脫陽無所附薛立齋曰新產婦人陰血暴亡陽無所附而外熱四物加炮姜補陰以配陽若誤服寒涼克伐之劑而外熱此為寒氣隔陽於外四君子加薑桂不應急加附子若肌膚髮熱面赤大渴引飲此血脫髮燥也當歸補血湯產後陰虛發熱宜補氣趙養葵曰產後大失血陰血暴亡必大發熱名陰虛發熱此陰字正謂氣血之陰若以涼藥正治必死斃正所謂證象白虎誤服白虎必死此時偏不用四物有形之物不能速化幾希之氣急用獨參湯或當歸補血湯使無形生出有形來陽生陰長之妙不可不知也產後發熱不可作火治誤用寒涼薛立齋曰產後虛煩發熱乃陽隨陰散氣血俱虛故惡寒發熱若誤作火證投以涼劑禍在反掌論丹溪治產後發熱用方之法武叔卿曰丹溪治產後發熱以芎歸四君子加黃耆不用芍地者以新產後用養血益氣之法不宜斂降涼血以伐生氣也熱甚者加乾薑若產後陰血弱發熱四物加茯苓熱甚加炮姜此方全不用氣藥是血虛氣不虛也加茯苓者使天氣降而陰自生陰生則熱自退熱甚加炒乾姜者不從陽引陰亦可從陰引陽微乎微乎慎齋按已上七條序產後有發熱之證也產後發熱有風寒有傷食有瘀血有蒸乳而外大抵屬陰血虛而陽浮外故當以辛溫從治戒用寒涼若肝虛血燥則宜補血逍遙散清火亦宜慎用陰血大脫又當益氣毋用補血此又用藥之權衡也產後乍寒乍熱屬敗血不散郭稽中曰產後乍寒乍熱者何答曰陰陽不和敗血不散能令乍寒乍熱也產後血氣虛損陰陽不和陰勝則乍寒陽勝則乍熱陰陽相乘則或寒或熱產因勞傷臟腑血弱不得宣越故令敗血不散入於肺則熱入於脾則寒醫者誤作瘧治則謬矣陰陽不和宜增損四物湯敗血不散宜奪命丹又問二者何以別之曰時有刺痛者敗血也但寒熱無他證者陰陽不和也產後敗血不散寒熱為閉陰閉陽陳無擇曰產後乍寒乍熱營衛不和難以輕議若敗血不散豈止肺脾二藏大抵一陰一陽相搏即作寒熱陰勝故寒陽勝故熱只可云敗血循經流入閉諸陰則寒閉諸陽則熱血氣與衛氣解則休遇再會則復作大調經散入醋煎佳產後敗血閉陰閉陽之辨武叔卿曰閉陰閉陽之說率難理解敗血閉陰則寒閉陽則熱而有休解會作之時則似瘧矣若瘀血為有形之物閉則壅矣安有解會之所愚謂血閉於陽經營衛行之不通則寒血閉於陰經營衛行之不通則熱故必瘀通而寒熱自已又云大調經散而言行瘀於內也五積散行瘀於外也又外經或為寒客則肺病肺病而營衛不通則熱內腑或為冷物所傷則脾病脾病而營衛不通則寒故所用之方一主裡一主表亦或內外俱瘀則寒熱並作二藥又均不可廢產後陰陽不足寒熱用藥不同薛立齋曰按良甫云此由氣血虛損陰陽不和宜四物加減若敗血不散腹內作痛宜奪命丹夫陽氣不足陰氣上入陽中而惡寒者補中湯若陰氣不足陽氣下陷陰中發熱者六味丸若氣血不足惡寒發熱者八珍湯慎齋按已上五條序產後有寒熱往來之證也寒熱往來為少陽經病產後見之明屬陰陽兩虛營衛不和之候當遵丹溪大補氣血為治非小柴可例也若云敗血不散為寒熱郭稽中有入肺入脾之論陳無擇有閉陰閉陽之議兩說均不能無疑也夫敗血瘀滯豈有或入肺或入脾之理況寒熱何獨專於脾肺其心腎肝獨不可為寒熱乎敗血閉陰為寒便不能閉陽為熱閉陽為熱便不能閉陰為寒豈有既閉陰復閉陽得謂之敗血不散乎立言之謬恐有惑於後人總之敗血為病乃生寒熱本於榮衛不通陰陽乖格之故武叔卿始得其旨虛汗頭汗產後虛汗不止屬陰虛大全曰產後虛汗不止者由陰氣盛而陽氣加之裡虛陽氣獨發於外故汗出血為陰產則傷血是為陰氣虛氣為陽其氣實者陽加於陰故令汗出陰氣虛弱不復者汗出不止因遇風則變痙縱不成痙亦虛乏短氣身體柴瘦唇口乾燥久則經水斷絕由津液竭故也產後虛汗有亡陽之患單養賢曰產後虛汗經曰陽氣者精則養神柔則養筋產後既亡血而又汗多乃為亡陽汗本血液屬陰陰亡陽亦隨之而走故曰亡陽產後亡血多汗陰陽兩虛極危證也故用藥與他證不同慎之方用參耆白朮麻黃根防風桂枝產婦頭汗屬血虛孤陽上出金匱要略曰產婦鬱冒其脈微弱但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以產婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復徐忠可曰產婦鬱冒虛多邪少故脈微弱中氣虛也內虛一身之陰陽不和故身無汗但頭汗出所以頭汗出者何血虛下厥則下之陰氣盡而陽為孤陽陽孤則上出而頭汗矣然既頭汗仍喜其汗出而解者何蓋陰不亡則血未大虛惟產婦血去過多而亡陰則陽為孤陽自陰較之陽為獨盛所以喜其汗損陽就陰則陰陽平故曰乃復產婦頭汗屬虛熱熏蒸王海藏曰產婦頭汗出至頸而還額上偏多蓋額為六陽之會由虛熱熏蒸而出也慎齋按已上四條序產後有汗出之證也經云奪血者無汗汗與血類產後去血過多則陰不離陽陰虛而陽無所附周身汗出不止此為陰陽兩虛有亡陽之患為危證若身無汗但頭有汗頭為諸陽之會陰血暴亡孤陽上越陰雖虛而陽氣尚為有餘此時陰不勝陽故頭汗額上偏多心火上浮逼陽於外急補其陰而入以斂陽之藥則病自復故產婦又喜其頭汗出也中風產後中風屬於虛金匱要略曰產後中風發熱面正赤喘而頭痛竹葉湯主之徐忠可曰中風發熱頭痛表邪也然面正赤所謂面若朱妝乃真陽上浮加之以喘氣高不下也明是產後大虛元陽不能自固又雜於表邪自宜攻補兼施故以桂甘防葛桔梗薑棗清在上之邪竹葉清膽腑之熱而以參附培元氣反其欲脫之陽也產後中風屬勞損臟腑氣虛邪入大全曰產後中風由產時傷動血氣勞損臟腑未曾平復起早勞動致氣虛而風邪乘之冷氣客於皮膚及經絡但疼痹羸乏不任少氣大凡筋脈挾寒則攣急喎僻挾濕則縱緩虛弱若入諸臟恍惚驚悸隨其所傷臟腑經絡而生病焉產後中風屬勞傷所致郭稽中曰產後中風者何答曰產後五七日內強力下床或一月之內傷於房室或懷憂怒擾蕩沖和或因食生硬傷動臟腑得病之初眼澀口噤肌肉瞤搐漸至腰脊筋急強直者不可治此乃勞傷非偶爾中風所得也產後中風屬下血過多虛極生風大全曰產後下血過多虛極生風者何答曰婦人以營血為主因產血下太多氣無所主唇青肉冷汗出目眩神昏命在須臾此虛極生風也若以風藥治之則誤矣產後中風宜大補不可作風治朱丹溪曰產後中風口眼喎斜必用大補氣血然後治痰當以左右手脈分氣血多少以治切不可作中風治用小續命湯發表治風之藥產後中風當補元氣為主薛立齋曰產後中風果外邪所屬形氣不足病氣有餘當補元氣為主稍佐治病之藥若強力不休月內入房形氣俱不足當純補元氣多有復甦者若誤投風藥是促其危也前證若心脾血氣俱虛十全湯不應加附子鉤藤若肝經血虛逍遙散加鉤藤經云脾之榮在唇心之液為汗若心脾二臟虛極急用參救之慎齋按已上六條序產後有中風之證也中風有真中類中有火有氣有痰中臟中腑中血脈之不同若產後中風總屬血虛而動傷臟腑所致即有外邪以大補為主遵丹溪立齋之法為不易也若舍此而以中風為治用愈風續命之類速之斃矣戒之產後血虛中風病痙金匱要略曰新產婦人有三病一者病痙何謂也曰新產血虛多汗出喜中風故令病痙產後血虛汗多過多遇風變痙郭稽中曰產後血虛腠理不密故多汗因遇風邪搏之則變痙痙者口噤閉背強而直如發癇狀搖頭馬鳴身反折氣息如絕汗出如雨兩手摸空者不治產後痙屬亡血過多筋無所養薛立齋曰產後發痙因去血過多元氣虧損或外邪相搏致牙關緊閉四肢痙強或腰背反張肢體抽搐若有汗不惡寒曰柔痙無汗惡寒曰剛痙然產後患之由亡血過多筋無所養而致大補氣血多保無虞若攻風邪死無疑矣產後病痙屬陰虛內熱生風繆仲淳曰產後血虛角弓反張病名曰痙痙者勁也去血過多陰氣暴虛陰虛生內熱熱極生風故外現風證其實陰血不足無以養筋所致足厥陰肝經大虛之候宜益陰補血清熱則愈產後成痙不可同傷寒例治薛立齋曰仲景云傷寒有汗為柔痙用桂枝湯無汗為剛痙用麻黃湯產後得此血氣俱虛敗證不可與傷寒例看丹溪云產後當大補氣血為主多服參耆附子中風乃虛極之象固其本元諸病自退產後變症不可輕用發表婁全善曰小續命大豆紫湯舉卿古拜散俱太陽厥陰藥也如邪實而脈來浮弦有力者固宜但產後氣血大虛人不宜輕發其表但用防風當歸散治之為妙用續命湯辨武叔卿曰寒主收引風寒在太陽經項背強直者太陽筋病也諸方皆主續命從仲景論也郭氏不問產後虛實邪之有無概宗之似乎一偏至薛氏又以產後亡血過多非十全大補不可又一見也及夷堅志按以大豆紫湯獨活湯而愈又主於風矣是續命亦不為妄也但本方有麻黃附子氣血兩虛人不可輕用而郭氏論又有速灌之說稍緩即汗出如雨反不以麻黃為忌何語工切也二說似不可廢臨證之際詳之慎齋按已上八條序產後有痙證也產後成痙大抵血虛所致故金匱以下四條均主於亡血過多當從立齋仲淳治例後二條辨不可用續命湯致有誤治之失以示戒也產後口噤屬血氣虛風乘三陽經大全曰產後中風口噤是血氣虛而風入頷頰口之筋也手三陽之筋結於頷產則勞損臟腑傷於筋脈風乘之則三陽之筋脈偏虛得風冷則急故令口噤產後角弓反張屬體虛受風大全曰產後角弓反張是體虛受風風入諸陽之經也人之陰陽經絡周環於身風邪乘虛入諸陽之經則腰背反折攣急似角弓狀產後角弓反張屬虛象宜固氣血薛立齋曰前證因氣血耗損腠理不密汗出過多患此乃虛象也宜固氣血為主此證乃氣血虛極宜大劑參耆歸朮肉桂培養之不應加附子倍人參名參附湯猶未應乃藥力未能及宜多用之產後瘛瘲屬陰虛火熾筋無所養薛立齋曰瘛者筋脈拘急也瘲者筋脈弛縱也經云肝主筋藏血肝氣為陽為火肝血為陰為水產後陰血去多陽火熾盛筋失其養而然治法以四物湯加丹皮鉤藤以生陰血則陽火退而諸證愈不應用四君子芎歸丹皮鉤藤補脾土蓋血在於至陰至陰者脾土也此證若肢體惡寒脈微細者此為真狀若脈浮大發熱煩渴此為假象惟當固本為善若無力抽搐戴眼反折汗出如珠者不治產後拘攣屬氣血不足大全曰產後中風筋脈四肢攣急者氣血不足臟腑俱虛月內未滿起早勞動動傷臟腑虛損未復為氣所乘風邪冷氣客於皮膚經絡令人頑痹不仁羸乏少氣風氣入於經脈挾寒則攣急也產後拘攣屬肝經風熱血燥薛立齋曰肝屬木主筋若肝經風熱血燥用加味逍遙散不應六味丸以補腎水經云風客淫氣精乃亡邪傷肝也慎齋按已上五條序產後有口噤角弓瘛瘲拘攣諸證也諸證為中風內見證雖有口噤角弓異名總以產後氣血大虛所致故一切風藥概不可用惟遵丹溪立齋之論治為產後中風病之要道也產後不語屬敗血入心郭稽中曰產後不語者何答曰人心有七孔三毛心者君主之官神明出焉外應於舌舌者聲之機產後虛弱多至敗血停蓄上下干心心竅閉塞神志不能明瞭又心氣通於舌心氣閉則舌強不語但服七珍散產後不語屬胃濕熱痰迷心武叔卿曰產後不語有臨產服藥與湯過多胃濕使然又有熱痰迷於心不語導痰湯產後不語屬熱血熱痰迷塞心竅方約之曰產後不語有熱血迷塞心竅者有熱痰迷塞心竅者前方七珍散治熱血孤鳳散治熱痰肥人多是熱痰瘦人多是熱血產後不語分證用藥薛立齋曰經云大腸之脈散舌下又云脾之脈是動病舌本強不能言又云腎之別脈上入於心系舌本虛則不能言前證屬心腎氣虛用七珍散腎虛風熱地黃飲大腸風熱加味逍遙散加防風白芷脾經風熱秦艽升麻湯肝經風熱柴胡清肝散加防風白芷脾氣鬱結加味歸脾湯加升麻肝木太過小柴胡加鉤藤脾受木侮加白芷升麻鉤藤肝脾血虛佛手散脾氣虛四君子湯氣血俱虛八珍湯不應獨參湯加附子補其氣而生血若竟用血藥則誤矣慎齋按已上四條序產後有不語之證也產後不語稽中主於敗血迷心濟陰主於胃濕熱痰此皆論病之屬有餘也產後去血過多陰火上乘鬱冒心神為不語此證之屬虛者為多而敗血熱痰亦間有之至論胃濕使然則迂矣若立齋又兼肝脾風熱用藥多以防芷升柴為發散似未切中病機也產後驚悸屬心氣虛風邪搏心大全曰產後臟虛心神驚悸者體虛心氣不足心經為風邪所乘或恐懼憂迫令心氣受於風邪邪搏於心則驚不自安驚不已則悸動不定其狀目睛不轉不能動診其脈動而弱者驚悸也產後驚悸屬於心血虛薛立齋曰人所主者心心所主者血心血一虛神氣不守驚悸所由來也當補血氣為主產後恍惚屬營衛不足風邪所乘大全曰產後中風恍惚者由心主血血氣通於營衛臟腑遍循經絡產則血氣俱傷五臟俱虛營衛不足即為風邪所乘令心神恍惚不定產後恍惚不可作風治薛立齋曰產後恍惚證當大補氣血為主佐後方為善蓋風為虛極之假象固其本元諸病自退若專治其風則速危矣慎齋按已上四條序產後有驚悸恍惚之證也濟陰綱目云不語至驚悸恍惚諸證有謂氣虛血虛有謂敗血入心有謂風邪所乘一皆名為心風然此風從何來當從何治前人亦未之悉但言治痰治風丹溪立齋則以大補氣血為主各有所見在臨證酌用之愚謂產後不語一證有敗血有濕有熱痰有風熱一主實邪外感為病而不及於虛此亦前人立論之失若驚悸恍惚自是血虛心氣不足所致大全必言風邪搏心致有斯證其言甚戾立齋以為但固本源毋專治風有功來學不小發狂產後發狂屬敗血衝心大全曰產後因驚敗血衝心昏悶發狂如見鬼祟宜局方大聖澤蘭散加辰砂棗仁湯下之立齋按此乃血虛神不守舍非補養元氣不可產後發狂屬肝虛火炎繆仲淳曰有產後六朝發狂持刀殺人此陰血暴崩肝虛火炎故也用澤蘭歸地牛膝茯神遠志棗仁加童便產後乍見鬼神屬敗血停心大全曰心主身之血脈因產傷耗血脈心氣虛則敗血停積上干於心心不受觸遂致心中煩躁臥起不安乍見鬼神言語錯亂醫人不識呼為風邪如此治必不愈但服調經散加龍腦得睡即安產後乍見鬼神屬血虛邪淫郭稽中曰產後乍見鬼神者何曰肝藏血心主血因產後耗其血勞動肝心敗血奔沖邪淫於心所以乍見鬼神言語顛倒非風邪也但服調經散黑龍丹產後乍見鬼神屬心脾血少薛立齋曰產後乍見鬼神若敗血停滯用調經散若心血虛損用柏子仁散此證皆心脾血少所致但調補脾胃之氣則痰清而神自安若果系鬼祟所附即灸鬼穴可愈其或不起多因豁痰降火攻伐之過也慎齋按已上五條序產後有發狂見鬼之證也夫心所主者血也心主血肝藏血產後陰血暴亡則心失所養肝火得以上炎肝藏魂心藏神血虛則神魂不守有發狂見鬼諸證此皆虛火上乘之病立齋但主補虛而未之論及繆仲淳一條乃發前人未發產後妄言見邪不可作痰火論單養賢曰產後失血心神失守妄言見邪宜服生化湯加茯神棗仁遠志慎不可作痰火論用消痰降火藥信師巫以驚產母產後狂言譫語分五證治大全曰產後語言顛倒或狂言譫語如見鬼神其源不一辨證治之一則因產後心虛敗血停積上干於心而狂言獨語者當在乍見鬼神條求之二則產後臟虛心神驚悸志意不安言語錯亂不自知覺神思不安者當在驚悸條求之三則有宿風毒因產心虛氣弱腰背強直或歌哭嗔笑言語亂道當作風痙治在心驚中風條求之四則產後多因敗血迷亂心經言語顛狂或暈悶當於血暈中求之五則產後感冒風寒惡露斬然不行憎寒發熱如瘧晝日明瞭暮則譫語如見鬼狀當作熱入血室治之宜琥珀地黃丸及四物湯以上諸證大抵產後首當逐敗血生新然後仔細詳審不可妄立名色自生新意加減方藥大宜對證依古法施治未有不安者也薛立齋按前證當固胃氣為主佐以見證之藥若一於攻痰則誤矣虛煩口鼻衄咳嗽產後虛煩屬余血奔心大全曰產後余血奔心以致虛煩蓋因分娩後不與童便並檊心下及臥太早兼食不相宜之物所致產後虛煩戒服竹葉石膏湯陳無擇曰尋常治諸虛煩熱以竹葉石膏湯溫膽湯不知產後與尋常不同如石膏等藥不宜輕用用之必死產後渴屬於血虛集驗方曰產後血渴血渴者血虛而渴也方用人參麥冬生地甘草瓜蔞又產後心煩發渴宜清心蓮子飲產後心煩血渴分證用藥薛立齋曰前證屬出血過多虛火上炎用童便入四物加白朮麥冬丹皮若胃氣虛有熱竹葉黃耆湯若血虛發熱八物加麥冬五味若血脫煩躁用當歸補血湯胃氣弱補中湯七味白朮散慎齋按已上四條序產後有虛煩血渴之證也血為周身津液產後去血過多陰虛火旺則有煩躁有發渴證宜大劑滋陰降火消瘀加童便為主濟陰綱目云產後血虛氣無所附逆而為火火上逆而瘀血隨之則心煩發躁童便濁陰也味苦寒而咸性就下降火消瘀所謂濁陰出下竅是也二證並用之為妙若仲景二物黃芩湯有黃芩苦參又有竹茹石膏治產婦中虛煩亂四肢苦煩熱之證未敢信也當以三因之論為是產後口鼻黑衄屬胃絕肺敗郭稽中曰產後口鼻黑氣起及鼻衄者何答曰陽明者經脈之海起於鼻交頞中還出頰口交人中左之右右之左產後氣血虛散營衛不和散亂入於諸經卻還不得故令口鼻黑氣起及變鼻衄此緣產後虛熱變生此證胃絕肺敗不可治病機云產後見衄者不可治產後鼻衄為氣脫血死證薛立齋曰胃脈挾口繞承漿鼻準屬脾土鼻孔屬肺金此胃虛肺損為氣脫血死之證急用二味參蘇飲加附子亦有得生者慎齋按已上二條序產後有鼻衄之證也鼻衄本非死證產後犯此或惡露不下虛火載血上行溢出鼻竅不循經度肺胃已受火熱故黑氣變見於鼻口此熱極反兼水化也故曰肺胃敗絕為不可治立齋參蘇飲加附子似未穩莫若大盞童便加牛膝丹皮澤蘭生熟地倍人參服之產後咳嗽屬肺金感邪大全曰肺主氣因產後血虛肺金一感微邪便成咳嗽或風熱或寒濕皆令人咳嗽若產後吃鹽太早咳嗽者難治產後咳嗽屬食麵壅納郭稽中曰產後血氣不通咳嗽者何答曰產後咳嗽多因食熱面壅納或熱病或有氣塊發時衝心痛氣急咳嗽四肢寒熱產後咳嗽屬惡露上攻瘀血入肺陳良甫曰產後傷風咳嗽是惡露上攻流入肺經或面赤發喘欲死急用二味參蘇飲又李氏曰產後咳嗽多是瘀血入肺知母飲治產後惡露流入肺經咳嗽濟飲按知母貝母涼藥也豈可治惡露上攻人參補氣藥也豈可治流入肺經之嗽即加桃仁杏仁以瀉肺導瘀亦不可妄用產後咳嗽屬胃氣不足薛立齋曰產後咳嗽悉胃氣不足胃為五臟之本胃經一虛五臟失所百病生焉患者多謂腠理不密所致不知肺屬辛金生於巳土亦因土虛不能生金腠理不密外邪所感其陰火上炎宜壯土金生腎水制火為善若徑治咳嗽則誤矣產後咳嗽分證用藥薛立齋曰產後咳嗽或因陰血耗損或因肺氣虧損或陰火上炎或風寒所感治法不一若陰血虛者芎歸熟地參術肺氣傷者四君子加芎歸桔梗陰火上炎者六味地黃加參術風寒感者補中湯加桔梗紫蘇慎齋按已上五條序產後有咳嗽之證也產後咳嗽有外邪有內傷有瘀血不外三因之感其本則以氣血虛而胃氣不足所致夫咳嗽為肺金病土虛不能生金致有咳嗽之患雖有外邪傷食惡露諸證必顧母為要此立齋之論為知本也瘧疾痢疾產後寒熱屬敗血不可作瘧治郭稽中曰產後乍寒乍熱多是敗血為患或陰陽不和若概作瘧治則誤矣婁全善曰產後瘧疾多由汙血挾寒熱而作大法宜柴胡四物湯調之熱多者草果飲子寒多者生熟飲子產後瘧疾屬陰陽兩虛不可用柴胡湯產寶新書曰產後類瘧分二證產後半月內外寒熱往來或午後日晡夜間發熱或一日二三度其發有期其證類瘧由氣血並竭陽虛寒作陰虛發熱也慎毋以瘧治雖小柴胡湯不可輕用惟調補氣血寒熱自除仲景云傷寒往來寒熱一日二三度發此陰陽俱虛不可更發汗更吐更下其意亦同產後瘧疾屬氣血虛宜補胃氣為主薛立齋曰產後瘧疾總以補胃氣為主佐草果飲之類若胃氣稍充以草果飲為主佐以補胃藥蓋氣虛則寒血虛則熱胃氣虛則惡寒胃氣下陷則寒熱交作當大補氣血其病自退若誤用清脾截瘧之類多致不起慎齋按已上三條序產後有瘧疾之證也瘧病在夏秋之交本風寒暑濕四氣之感而產後之瘧雖有外邪當從氣血兩虛為治陽虛外寒陰虛內熱陰陽兩虛則寒熱交作故宜大補氣血為主若郭氏以敗血為患固當消瘀亦必兼補氣血始善故一切治瘧之方如小柴清脾截瘧四獸之屬概不可施草果飲有川芎白芷紫蘇柴胡青皮良薑之發表耗氣立齋以補胃氣立論誠得治瘧之本若以草果飲為主失矣不能無辨產後痢疾屬內外諸傷大全曰產後痢疾由產勞傷臟腑不足日月未滿虛乏未復或勞動太早或誤食生冷行起太早外傷風冷乘虛入於腸胃誤食生冷難化之物傷於脾胃皆令泄瀉甚則變痢若血滲大腸則為血痢難治世謂之產子痢產後本虛又加久痢愈見羸弱謂之虛羸下痢又有產後氣不順下痢赤白謂之氣痢治法熱則涼之冷則溫之冷熱相搏則調之滑者澀之虛者補之若產婦不能寬解須當順氣未有不安者也產後下痢屬風冷乘虛郭稽中曰產後腹痛及瀉痢者何答曰產後腸胃虛怯寒邪易侵若未滿月飲冷當風乘虛襲於肓膜散於腹腸故腹痛作陣或如刀刺流入大腸水穀不化洞瀉腸鳴或下赤白胠脅䐜脹或痛走不定急服調中湯立愈若以為積滯取之禍不旋踵謹之產後痢疾作渴屬津液內竭產寶百問曰產後下痢作渴者水穀之精化為血氣津液以養臟腑臟腑虛燥故痢而渴若引飲則難止反溢水氣脾胃既虛不能剋水水自流溢浸漬皮膚則令人腫但止其渴痢自差薛立齋曰產後痢作渴渴而不喜冷飲屬胃氣虛不能生津液也七味白朮散如夜間發熱口渴者腎水弱而不能潤也六味丸佐益氣以滋化原產後痢分證用藥薛立齋曰產後痢或因飲食傷損脾土脾土虛不能消食當審消之若米食所傷六君子加穀芽麵食傷加麥芽萊菔子肉食傷加山楂神麯兼嘔吐加藿香若久不愈或非飲食所傷乃屬腎氣虧損必用四神六味八味丸補腎若用分利導水之劑是虛其虛也產後滯下不可用下藥繆仲淳曰凡產後痢積滯雖多腹痛雖極不可用大黃等藥行之致傷胃氣遂不可救但用人參歸芍紅曲醋炒升麻倍加甘草與益母草滑石足矣若惡露未盡兼用乳香沒藥砂仁阿膠自愈慎齋按已上五條序產後有痢疾之證也痢本於外感六淫內傷飲食所致若產後當兼氣血虛治故不可用治痢常法而以調補脾胃為要也又按產後痢屬氣血大虛不可治痢惟補氣血以大劑人參當歸主之蓐勞血崩產後蓐勞屬風冷搏於氣血大全曰產後蓐勞由生產日淺血氣虛弱飲食未平不滿百日將養失所風冷客之搏於氣血不能溫於肌膚使虛乏勞倦乍臥乍起顏容憔悴飲食不消風冷邪氣感於肺肺受微寒故咳嗽口乾遂覺頭昏百節疼痛營衛受風邪流注臟腑須臾頻發時有盜汗寒熱如瘧背膊煩悶四肢不舉沉重著床此蓐勞之候也產後蓐勞屬憂勞思慮所致陳良甫曰婦人因產理不順疲極筋力憂勞思慮致令虛羸喘乏寒熱如瘧頭痛自汗肢體倦怠咳嗽痰逆腹中絞刺名曰蓐勞產後蓐勞屬虧損血氣所致產寶百問曰產後虛羸漸成蓐勞皆由產下虧損血氣所致須慎起居節飲食調養百日庶保無疾若中年及難產者毋論日期必須調養平復方可動作否則氣血復傷虛羸之證作矣產後蓐勞當補脾胃養正氣為主薛立齋曰蓐勞當扶養正氣為主多因脾胃虛弱飲食減少致諸經疲憊當補脾胃飲食一進精氣生化諸臟有所賴其病自愈慎齋按已上四條序產後有蓐勞之症也蓐勞之成因產後氣血虛損不慎起居或感風冷外邪或傷七情憂慮以致動作不時將養失所遂成蓐勞之候此產寶以調養為訓立齋以養正為先也產後血崩屬勞役驚怒所致郭稽中曰產後血崩者何曰因產後所下過多血氣暴虛未得平復或因勞役或因驚怒致血暴崩又有營衛素傷氣血衰弱亦變崩中若小腹滿痛此肝經已壞為難治俱宜固經丸止之若小腹脹滿此為內有瘀血未可止之必致淋瀝產後血崩屬酸鹹不節以傷營衛陳良甫曰產後傷耗經脈未得平復勞役損動致血暴崩或因酸鹹不節以傷營衛亦變崩中產後血崩屬臟氣不平陳無擇曰血崩不是輕病況產後有此是謂重傷恐不止鹹酸不節所致多因驚憂恚怒臟氣不平或產後服斷血藥早致惡血不消鬱滿作堅亦或崩中固經丸自難責效不若大料煮芎藭湯加芍藥隨證治之產後血崩分證用藥薛立齋曰前證屬血滯小腹脹滿用失笑散肝火血妄行加味逍遙散脾郁不統血加味歸脾湯脾虛不攝血補中湯厚味積熱傷血清胃散加槐花風熱相搏傷血四君子加防風枳殼慎齋按已上四條序產後有血崩之證也產後已亡血而又有崩證似非輕病多屬陰虛氣脫所致稽中主於勞役驚怒是本內傷七情為病若良甫以酸鹹不節無擇以血藥斷早均非病機之要予謂產後下多亡陰須用仲景法血脫益氣純用血藥無濟也觀薛氏醫案有婦人血崩如湧以六君子加黑姜而愈得其旨矣大便秘小便秘產後便秘屬亡津液胃燥金匱要略曰新產婦人有三病三者大便難何謂也而亡津液胃燥故大便難產後便難屬內亡津液聖濟總錄曰大腸者傳道之官變化出焉產後津液減耗胃中枯燥潤養不足糟粕壅滯故令大便難或致不通蓋新產之人喜病者由去血過多內亡津液故也產後便秘屬血虛火燥薛立齋曰產後大便不通因去血過多大腸乾涸或血虛火燥不可計日期飲食數多用藥通潤之必待脹滿覺脹自欲去不能去乃結在直腸宜溫膽導之若服苦寒藥通之反傷中焦元氣或逾難通或通而瀉不止必成敗證若血虛火燥加味逍遙散氣血俱虛八珍湯慎不可用麻仁杏仁枳殼之類產後便秘屬津液不足不可服寒藥郭稽中曰產後大便秘澀者何答曰產後水血俱下腸胃虛竭津液不足是以大便秘澀不通若過五六日悶脹者此燥屎在臟腑乾澀未能出耳宜麻仁丸以潤之若誤以為有熱投寒藥則陽消陰長變證百出矣產後秘結屬血少腸燥不可用峻利藥單養賢曰產後大便日久不通因血少腸燥故也宜多服生化湯則血旺氣順傳化如常自無燥澀之意切不可用硝黃峻利之劑以亡陰血致中氣虛而便秘愈甚遂成脹滿者有之產後便秘戒輕用大黃陳無擇曰產後不得利利者百無一生去血過多臟燥大便秘澀固當滑之大黃似難輕用惟蔥涎調臘茶為丸復以臘茶下之慎齋按已上六條序產後有大便秘結之證也產後水血俱下則大腸燥澀便秘不通金匱聖濟均主津液內亡立齋主血虛火燥自是元氣內乏受病故戒不可以苦寒峻利再傷氣血漸致不救也產後小便不通屬內積冷氣產乳集曰產後小便不通腹脹如鼓悶亂不醒蓋緣未產前內積冷氣遂致產時尿胞運動用鹽於臍中填平用蔥白搗一指厚安鹽上以艾炷餅上灸之覺熱氣入腹內即時便通神驗產後淋屬熱客胞中大全曰產後諸淋因產後有熱氣客脬中內虛則頻數熱則小便澀痛故謂之淋產後淋屬熱邪搏血滲入胞中大全曰有因產損氣虛挾熱熱邪搏血流滲胞中血流小便而出則為血淋產後淋治法宜量虛實陳無擇曰治諸產前後淋其法不同產前當安胎產後當去血如冷熱膏石氣淋等為治則一但量虛實用之瞿麥蒲黃是產後要藥惟當尋究所因則不失機要矣慎齋按已上四條序產後有小便不通淋秘之證也三因云產前當安胎產後當去血此二語為吃緊如產前淋或由氣虛不化當用參耆補氣安胎不可過服滲利產後淋或由汙血阻滯當以瞿麥蒲黃為要藥若血虛熱鬱當用六味丸逍遙散補陰養血滋其化源佐以導血藥可也產後二便不通屬津液燥竭大全曰產後大小便不通腸胃本挾熱因產水血俱下津液燥竭腸胃痞塞熱氣結於腸胃故令大小便不通有婦產患二便不通飲牛乳而通人乳尤善產後小便數屬氣虛不制大全曰產後數者氣虛不能制也產後小便不禁屬脾腎虛薛立齋曰產後遺尿腎氣不固也五味子丸主之若脾腎虛弱用還少丹仍以補中湯為主虛寒加肉果補骨或四神丸若脾腎虛寒用八味丸四神丸佐之產後小便不禁屬產傷膀胱陳良甫曰婦人產理不順致傷膀胱遺尿無時產後小便淋瀝屬損破尿脬朱丹溪曰有收生不謹損破產婦尿脬致病淋瀝用豬羊胞煎湯入藥參耆為君歸地為佐桃仁陳皮茯苓為使於極飢時飲之令氣血驟長其胞自完稍緩亦難成功也產後小便淋瀝分證用藥薛立齋曰穩婆不慎致胞損而小便淋瀝者八珍湯補氣血若因膀胱氣虛小便頻數當補脾肺若膀胱陰虛小便淋瀝須補肺腎方用補中湯加山茱山藥為主佐以桑螵蛸散慎齋按已上六條序產後小便有數有不禁遺尿有淋瀝之證也經云腎主二便開竅二陰小便不禁淋瀝前陰病也產後氣血大虛有傷臟腑非肺氣虛而不能約制為遺尿為不禁即腎氣竭而多有虛熱移於膀胱為瀝為淋總以補養氣血加升提固澀之劑為主若用滲利疏導是重虛也戒之產後小便出血屬熱乘胞內大全曰產後小便出血因血氣虛而熱乘之血得熱則流散滲於胞內故血隨小便出有產婦尿血面黃脅脹少食此肝木乘脾土也用加味逍遙散補中湯兼服而愈產後大便出血分諸證用藥薛立齋曰產後便血或飲食起居或六淫七情致元氣虧損陽絡外傷治法若因膏粱積熱加味清胃散因醇酒濕毒葛花解酲湯怒動肝火六君子加芎歸芍藥柴胡因鬱結傷脾加味歸脾湯思慮傷心妙香散大腸風熱四物加柏葉荊防枳殼槐花大腸血熱四物加芩連腸胃虛弱六君子加升柴腸胃虛寒六君子加肉果木香因元氣下陷補中湯加茯苓半夏胃氣虛弱六君子加升麻血虛四物加升麻氣血虛八珍加升柴溫補慎齋按已上二條序產後有二便下血之證也產後既亡血而大小二便復有下血之患此非尋常火熱滲於膀胱歸於大腸可例治也非血虛即氣脫心主血脾統血心氣虛則小腸不能制而血流脾氣弱則大腸無移蔭而血下故二便出血當責之心脾二經為病若大全競以熱論立齋一條分因雜出詳證配方未免膠柱似難責效立齋之書補元陰元陽動以滋化源立論開發後人有功來學不少但每證輒以方配某病用某方似欲後人按圖索驥刻舟求劍矣善讀立齋之書者不知予言為河漢否也產後發癰疽不可用治毒藥產寶新書曰產後發癰疽宜生化湯加連翹金銀花甘草乳香綠豆粉和服不可用大黃等藥並敗毒散之類慎齋按新產婦人或在十朝十五朝之後忽發癰腫於四肢胸腹間或是敗血不盡或是氣血虛弱營氣不從逆於肉裡發為癰毒如敗血瘀滯經絡者當補血行血導瘀疏氣為主如氣血虛弱營衛運遲成壅腫者當補氣活血為主切不可從毒治用寒涼清火解毒藥只用大補如十全八珍之屬以固本元扶胃氣氣壯血流其毒自解若欲攻毒勢必潰爛不能收功矣月水乳病玉門產後月水不調屬風邪冷熱客經絡大全曰產後月水不調由產傷動血氣虛損未復風邪冷熱之氣客於經絡乍冷乍熱冷則血結熱則血消故令血或多或少或在月前或在月後名不調也產後月水不調屬風冷傷經大全曰產傷動血氣虛損未復為風冷所傷血得冷則凝結故風冷傷於經血結胞絡之間令月水不通凡血結月水不通則成血瘕水血相併復遇脾胃衰弱肌肉虛者為水腫產後月水不通不必藥陳良甫曰婦人衝任之脈為經絡之海皆起胞內手太陽小腸手少陰心此二經上為乳汁下為月水若產後月水不通新產後勞傷氣血或去血過多乳汁自然不通若乳子半歲或一歲之內月經不行此常候非病也若半歲而行或四五個月便行是少年血盛之人若產後一二年月經不通無疾者亦不必服藥或勞傷氣血衝任脈虛氣血衰少不行但服健脾胃資氣血之藥自然通行以藥通之為害滋大慎齋按已上三條序產後有月水不調不通之證也月水不行為婦人要病至產後不行又不可以病言也大全二條均主風冷邪傷專以外感為病亦屬偏論夫產後月水不調不通有因於產動勞傷臟氣血虛弱者有因於懷子自乳血脈上為乳汁者有因脾胃氣虛飲食少進者不止風邪冷熱之感也良甫一條甚悉病機至云但服健脾胃資氣血藥不必通經尤見探本之論產後乳汁不行屬亡津液大全曰婦人乳汁氣血所化不行者由氣血虛弱經絡不調所致或謂產後必有乳乳雖脹而產後寡作者此年少之人初經產乳有風熱須服清利之藥則乳行若累經產而無乳者亡津液故也須服滋益之藥助之若有乳不甚多者須服通經之藥仍以羹臛引之蓋婦人之乳資以衝脈與胃經通故也有屢經產而乳汁常多者亦婦人血氣不衰使然若婦人素有疾在沖在經者乳汁少而色黃生子亦怯弱多疾產後乳汁不行有二陳無擇曰產婦有二種乳汁不行有氣血盛而壅閉不行有血氣少弱澀而不行虛當補之盛當疏之盛者當用通草漏蘆土瓜根虛者用煉鍾乳粉豬蹄鯽魚之屬產婦乳汁不行宜壯脾胃以滋化源薛立齋曰前證屬氣血虛弱不能生化者宜壯脾胃怒動肝火乳腫汁出者宜清肝火乳汁乃氣血所化在上為乳在下為經若屢產無乳或大便澀滯者亡津液也當滋化源衝任之脈盛脾胃之氣壯則乳汁多而濃衰則淡而少所乳之子亦弱而多病產後乳自出屬胃氣虛大全曰產後乳汁自出胃氣虛也宜補藥以止之若未產而乳自出者謂之乳泣生子多不育若產婦勞役乳汁湧下此陽虛而厥也獨參湯補之乳房腫脹用麥芽薛立齋曰凡婦人氣血方盛乳房作脹或無兒飲痛脹寒熱用麥芽二三兩炒熟水煎服之立消其耗散血氣如此何脾胃虛弱飲食不消方中多用之一云麥芽最消腎若氣血虛而乳汁自然出者宜十全大補湯產後乳癰屬邪熱攻陽明血搏氣滯聖濟總錄曰產後衝任不足氣血俱虛其熱潛行入足陽明之脈直行者從缺盆下乳內廉下夾臍入氣街中衝脈者起於氣街蓋足陽明之經夾臍上行至胸中而散其經為邪熱攻衝則血為之擊搏氣為之滯留擊搏則痛作留滯則腫生產後多有此疾由乳汁壅積與氣相擊搏故也慎齋按已上六條序產婦有乳汁不行之證也婦人以血用事上為乳汁下為月水而血之所化則本於脾胃飲食之精微運行而為乳為經產後脾胃之氣旺則血旺而乳多脾胃之氣衰則血減而乳少此立齋治乳汁以壯脾胃滋化源為要也若不顧脾胃以補氣血徒從事於通乳之劑是猶求千金以乞丐而不可得矣產後陰脫屬產勞太過所致陳三因曰婦人趣產勞力努咽太過致陰下脫及陰下挺出逼迫腫痛舉重房勞皆能發作清水續續小便淋瀝硫黃烏賊骨五味子為末摻之產後玉門不閉屬氣血不能收攝陳良甫曰產門不閉由元氣素弱胎前失於調養以致血氣不能收攝故也十全大補湯有初產陰戶腫脹或焮然痛不閉加味逍遙散若腫不閉者補中湯加五味子切忌寒涼之藥產門不閉腫痛分證用藥薛立齋曰玉門不閉氣血虛弱也十全大補湯脹脹焮痛肝經虛熱也加味逍遙散慎齋按已上三條序產後有陰脫不閉之二證也產後一切證總以氣血大虛為治況陰挺下脫玉門不閉乎故丹溪立齋醫案有產戶下一物如手帕者有下一物如合缽有二歧者有出肉線一條者有子宮損落一片者凡此皆氣虛血脫故子戶胞門見證種種其立方處治不過參耆歸地加以升提收澀臨證之工可以神明之矣
