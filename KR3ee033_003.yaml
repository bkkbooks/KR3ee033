body:
  text: 卷三胎前門上惡阻惡阻生於二月時心煩悶亂食難施胚胎經隧多壅塞濁氣攻衝運化遲氣鬱停痰兼胃實虛寒肝火併憂思大都止嘔調脾胃順氣和中最得宜金匱曰婦人得平脈不能食名妊娠子法六十日當有此證設醫者治逆加吐下則絶之絶止也言止藥也令自愈也巢元方曰妊娠惡阻由經血既閉水潰於臟臟氣不宜通故心煩慣悶氣逆而嘔吐也但脈理和平為有孕陳良甫曰惡阻産寶謂之子病由胃氣怯弱中脘停痰脈息和順但體重頭眩擇食惟嗜酸甚者寒熱脘悶半夏茯苓丸主之眉批戴復庵曰惡阻者孕婦噁心阻其飲食是也胎前惡阻見食嘔吐喜酸物多臥少起俗名病兒蓋其八宿有痰飲血壅遏而不行故飲隨氣上停滯肝經肝之味酸則必喜啖酸物金剋木以辛勝之小半夏湯或二陳湯羅太無曰孕婦三月嘔吐痰並飲食每寅卯時覺少腹有氣上衝然後膈滿而吐此肝脈挾衝脈之火上衝也用沉香磨水化抱龍丸一服膈寬吐止眉批少腹平明氣上衝因而鬱塞滿胸中厥陰相火衝於胃茹桔蘆根用總同太無用沉香化抱龍丸不如此方妥孫思邈曰婦人血氣不足腎氣又弱或當風飲冷太過心下有痰水者欲有胎而喜病阻其人月水雖止顏色肌膚如常但苦沉重憒悶不欲飲食又不知患之所在其脈順時和平則是欲有娠也宜半夏茯苓湯數劑後服茯苓丸消除痰水便欲是也金匱曰妊娠吐嘔不止乾薑人參半夏丸主之徐忠可曰諸嘔吐酸皆屬於火此言暫作嘔吐也若嘔吐不止則寒而吐不止則虛矣故以半夏治嘔乾薑治寒人參補虛而以生薑和半夏以下其所逆之氣眉批胃虛令人常吐食胃冷無緣納水漿二者必然脈遲細人參半夏與乾薑朱丹溪曰凡孕二三月間嘔逆不食或心煩悶此氣血積聚以養胎元精血內郁穢腐之氣上攻於胃是以嘔逆不能食用參桔飲又妊兩月嘔吐眩暈脈左弦而弱此惡阻因怒氣所激肝氣傷挾胎氣上逆參術補之大非所宜以茯苓半夏湯下抑青丸眉批氣血成胎二月間中焦壅塞不能還必然穢濁攻於胃水穀如何得下關用蘆根湯其方蘆根橘皮生薑大腹皮枇杷葉也婁全善曰大全方謂半夏動胎不用以胎初結慮其辛燥易散也今觀仲景用人參半夏乾薑丸羅謙甫用半夏茯苓湯朱丹溪用二陳加減並治胎前惡阻豫亦用之未嘗動胎經云有故無殞也眉批王子亨白朮散局方人參丁香散揚振人參桔皮湯齊士明醒脾飲不用半夏不效薛立齊曰前證若中脘停痰用二陳加枳殼若飲食停滯六君加枳殼若脾胃虛弱異功散若胃氣不足人參桔皮湯兼氣腦加枳殼胸脅痞悶加蘇梗脅痛加柴胡若飲食少思六君加紫蘇枳殼頭暈體倦六君子湯若脾胃虛弱嘔吐不食半夏茯苓湯蓋半夏乃健脾氣化痰滯之主藥也豫嘗用之驗眉批李茂翁曰左脈弱而嘔服諸藥不止者當服理血歸原藥則愈矣經曰無陰則嘔是也用歸原散其方六君加芎歸芍枳桔丁香也此半夏茯苓之類而曰歸原何歟豈當歸丁香之故耶嘔吐痰水寸必治滑澀為郁遲為寒微為虛數為熱怒氣傷肝脈弦而弱慎齊曰妊證先見惡阻而自金匱有絶之法以下病機非一端巢氏主於氣凝血聚陳氏主於停痰積飲若羅氏趙氏作火論仲景以寒治於惡阻病機可謂詳悉但胎前無寒産後無熱此常法也故惡阻嘔吐大抵寒者少熱者多總屬血壅胎元臟氣不能宣通停痰積飲鬱熱壅滯變而為火有熱無寒致生諸證故丹溪立齊論治每以枳殼蘇梗木香砂仁為降氣順氣之法所謂胎前須順氣者此也眉批大全曰婦人經不行身無病似病脈滑大而六脈俱勻是孕脈也眉批以二陳加枳殼砂仁安胃化痰若脾虛六君加蘇梗枳殼砂仁香附薑棗子煩液燥血渴産寶云子煩者肺臟虛而熱乘於心則令煩也停痰積飲衝心亦令煩也若熱而煩者但熱而已若痰飲而煩嘔吐涎沫惡聞食氣煩躁不安也朱丹溪曰子煩由胎元壅鬱熱氣上衝以致煩悶法當清熱疏郁眉批大全曰妊娠若煩悶者以四月受少陰君火之氣以養精六月受少陽相火之氣以養氣若母心驚膽怯多致煩悶名曰子煩子煩屬熱脈必洪數沉為氣滑為痰虛為無力薛立齊曰前證若因內熱竹葉湯氣滯紫蘇飲痰滯二陳加條芩枳殼氣鬱分氣飲加川芎脾胃虛弱六君加紫蘇山梔陳良甫曰足太陰脾經其氣通於口手少陰心經其氣通於舌若臟腑氣虛榮衛不和致陰陽隔絶熱乘心脾津液枯燥故心煩而口乾宜知母丸薛立齊曰前證若胃經實火竹葉石膏湯胃經虛熱人參黃耆散或黃耆六一湯黃耆六錢甘草一錢胃經氣虛補中湯若肺經虛熱紫蘇飲若肝經火動加味逍遙散若脾氣鬱結加味歸脾湯若腎經火動加味地黃丸大全曰有孕婦暴渴惟飲五味汁名醫耿隅診其脈曰此血欲凝也非疾也已而果孕然古方有血欲凝而渴飲五味之證不可不知慎齊曰妊娠煩躁本屬肺腎二經有火仲景云火入於肺則煩入於腎則躁胎繫於腎腎水養其胎元則元氣弱不足以滋腎中之火火上爍肺肺受火刑變為煩躁此金虧水涸之候法當滋其化源清金保肺壯水滋腎為主産寶以停痰積飲論子煩丹溪以胎壅氣熱論子煩未悉病機之要者也若液燥屬心脾熱乘血渴屬胎血將凝亦胎前所見之證故備載於此眉批子煩者心煩悶亂莫可言狀用淡竹葉湯若氣滯痰凝而悶者二陳湯加白朮黃芩蘇梗若脾胃虛弱嘔吐而煩六君加香砂但此症不善調攝則胎動不安須防小産之患又有吐久氣逆胃元大虛不能進食恐致産母氣脫故初亟宜降火繼即安胃進食此一定之法也子懸脈浮滑者痰尺伏而絶者心氣悶絶李氏曰子懸者心腹脹滿痛也妊娠四五月君相二火養胎平素有熱故胎熱氣逆上湊心胸脹滿痞悶名曰子懸法用補氣血疏壅滯嚴氏紫蘇飲加山梔條芩之類何松庵曰子懸者濁氣舉胎上湊也胎熱氣逆心胃脹滿此證挾氣者居多疏氣舒郁非紫蘇腹皮川芎陳皮無以流氣非歸芍無以養血氣血既利而胎自降然邪之所湊其人必虛故以人參甘草補之仲景曰婦人懷孕六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子臟寒故也當附子湯溫其臟眉批附子胎前禁用而此以治臟寒正所謂有故無殞也大全云妊娠子懸由腹內宿有寒邪停飲致陽氣壅滯上湊心腹與氣相爭故令脹滿也李氏曰火盛極一時心氣悶絶而死丹溪云氣有餘便是火當治其氣紫蘇飲連進救之若誤服動胎藥以致胎損上逆心腹脹滿者芎歸湯主之脈浮滑蔥白湯薛氏曰前證若外感風寒內傷飲食用藿香正氣散若食傷脾胃六君子湯若陽氣壅滯胎上逼心用紫蘇飲眉批此雖言寒氣停飲所致然大概陽氣壅滯則令上湊心腹故以紫蘇飲寬氣下氣以火盛極而連進紫蘇飲須知是氣作悶薛立齊曰妊婦飲食停滯心腹脹滿其胎上攻噁心不食右關脈浮大按之則弦此土虛木侮也用六君子加升柴而愈後小腹痞滿以補中益氣升舉脾氣而瘥子懸用升舉法是立齊巧處然須認症真確一妊婦腹脹小便不利吐逆諸醫雜進溫胃寬氣等藥反吐加脹滿湊心驗之胎死已久服下死胎藥不能通因得鯉魚湯其論曰娠婦通身腫滿或胸腹急脹名曰胎水遂去妊婦胸前看之胸肚不分急以鯉魚湯三五服大小便皆下惡水腫消脹退方得分娩死胎眉批須識此症愚按子懸一症有因熱因寒因火因停飲因挾食因肝鬱因脾虛因胎水者而要皆不離乎氣蓋胎壅氣逆乘勢上攻緊塞於胸次之間如懸物然故曰子懸良甫松庵主乎熱立論甚當李氏以嚴氏紫蘇飲治火盛悶絶取寬氣和中之意其義同也若金匱大全主於臟寒冷飲當以脈證為憑此證絶少若脾虛挾食或胎水上泛當從薛氏法而愚謂婦人性多忿鬱肝病居多忿則氣逆而胎亦逆又當以疏肝為要也子滿即子腫胎水同陳良甫曰妊娠經血壅閉養胎忽然虛腫是胎中挾水水血相搏脾胃惡濕主身之肌肉濕漬氣弱則肌肉虛水氣流溢故令身腫滿齊仲甫曰妊娠體腫皆由脾胃虛而臟腑之間宿有停水所挾謂雲子滿若水停不去浸漬其胎則令胎壞如脈浮腹滿兼喘者胎未壞也聖濟曰脾候肌肉土氣和則能制水水自傳化無有停積若妊娠脾胃氣虛經血壅閉則水飲不化濕氣淫溢外攻形體內注胞胎懷妊之始腫滿必傷胎氣何松庵曰妊娠三月後腫滿如水氣俗呼為琉璃胎古方一主於濕大率脾虛者多脾虛不運則清濁不分須以補脾兼分利若夜腫日消是血虛宜健脾兼養血主之陳良甫曰孕婦五六月腹大異常胸腹脹滿手足面目浮腫氣逆不安狀類子懸此由胞中畜水名曰胎水不早治生子軟短有疾或胎死腹中用千金鯉魚湯治其水眉批巢氏曰此由脾胃虛弱有停水而挾以妊娠也水漬於胞則令胎壞惟將産之月而腳微腫則其産易蓋胞髒水血多也初妊娠者則反壞胎金匱曰妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散主之水停則身重水逆則小便不利惡寒者衛氣不行頭眩者內有水氣厥陽逆陰氣上蒸也薛立齊曰前證若胸滿腹脹小便不通遍身浮腫千金鯉魚湯脾胃虛弱佐以四君子若面目虛浮肢體如水氣全生白朮散未應六君子湯若脾虛濕熱下部作腫補中湯加茯苓若飲食失節嘔吐泄瀉六君子湯若腿足發腫喘悶不寧或指縫出水天仙藤散若脾肺氣滯加味歸脾湯佐加味逍遙散慎齊曰子滿有水血相搏有停痰受濕有經血壅閉有清濁不分總因脾土虛不能制水所致故立齊治法不外健脾滲濕順氣安胎為主若濟陰云但一瀉氣利水則愈此謬論也眉批古方用鯉魚湯葵茯散皆有妙處豫每用五皮飲如水腫治法亦效不得已再用鯉魚湯初起勿用參術早補總宜利濕為先如體厚而輕小便通者産後自消勿藥可也子瘇者由脾土不足水穀之濕莫運而胞胎壅遏膀胱不化水泛橫流致肺氣下降小便不利腫於四肢頭面肌肉之間此屬有形之水子滿者胞膈脹滿或腹滿而四支頭面不腫此屬無形之氣若胎水一證屬脾虛血少氣不健運水漬胞胎胎多損壞一經泛濫遍身皆瘇與子腫異名同治也子氣産乳集曰妊娠三月成胎後足跗漸腫喘悶如水氣狀腳指間有黃水出者謂之子氣直至分娩方消此由素有風氣或衝任經有血風未可妄投湯藥亦慮將産之際有不測之憂故不可不治於未産之前也眉批子氣者因子而肝脾氣阻土遂不能制水故一香附散足以療之然不服藥亦無害陳無擇曰婦人宿有風寒濕冷妊娠喜腳腫陳良甫曰妊娠兩腳浮腫名曰脆腳因脾衰不能制水血化成水所致全生白朮散主之丹溪曰妊娠兩足脛腫至膝甚則足指間出水此由中氣聚養胎元壅鬱不得升發當疏鬱滯天仙藤散主之松庵曰孕婦六七月間兩足浮腫足太陰脾經養胎也脾主四支此時胎已垂下故腫見兩足分娩即愈齊仲甫曰妊娠腳腫非水氣也至八九月脛及腿俱腫不可以水病治之及傷真氣有此者必易産因胞臟中水血俱多不致胎燥故也慎齊曰妊娠有遍身胸腹頭面四肢浮腫者曰子滿有止足脛腫漸至腿膝者曰子氣子氣即子腫也要皆本於脾虛中氣不運以致水穀濕熱之氣浸漬肌肉流溢四肢此大全以下三論為見本之治若産乳三因是兼外邪論矣腹痛胎痛大全曰妊娠脘腹痛或宿有痰飲或新觸風寒皆因臟虛而致邪正相擊而並於氣隨氣上衝則心痛下攻則腹痛痛甚必致害胎甚則傷墮醫官王師復治蔡元度寵人妊娠胸腹間氣刺滿痛或腸鳴嘔逆此由忿怒憂思過度飲食失節所致香莪丸淡鹽湯下三服瘥憂思過度則木鬱飲食失節則土虛木邪乘土氣鬱化火火載胎上榮衛不通致心腹滿痛腸鳴嘔逆香莪丸肝脾並治鹽湯下所以制火下行也慎齊曰以上序腹痛有風寒客邪痰飲七情為有餘金匱曰假令妊娠腹中痛為胞阻膠艾湯主之薛立齊曰胎或作脹或腹作痛此是脾胃氣虛不能承載用安胎飲加升麻白朮不應用補中湯金匱曰婦人懷胎腹中㽲痛當歸芍藥散主之又婦人腹中痛小建中湯主之劉宗厚曰潔古地黃當歸湯治婦人有孕胎痛胎痛者丹溪以血虛治之故四物去川芎倍加熟地此心法也薛立齊曰妊娠腹中不時作痛或小腹重墜名脹痛用內補丸不應加參朮陳皮或因脾氣虛四君加歸地慎齊曰以上序胎前腹痛有氣阻氣虛血虛為不足病也胎前有脾胃氣虛而腹痛者用補氣調氣之法有陰虧血虛而腹痛者用補血溫經之法與前條外因證迥別臨證審之薛立齊曰頓僕胎動腹痛下血膠艾湯未應八珍湯加膠艾若胎傷用佛手散未應八珍湯下知母丸王叔和曰婦人有胎腹痛令人摸之如覆杯者男如肘脛參差起者女也冷者為死溫者為生慎齊曰以上序胎前腹痛有頓僕傷胎胎動不安此不內外因一辨用藥之法一辨生死之法心痛妊娠心痛大全主風邪痰飲交結豫謂肝氣不暢者多若傷於絡則乍作乍安名曰厥痛若胎動下血則傷觸子臟也用安胎飲火龍散手拈散輕者一味砂仁湯氣調自安若果真心痛指甲青朝發夕死夕發旦死無能為也然此證懷孕者少蓋真心痛為寒冷入心水剋火也而懷孕者必有胎熱當之不致寒水上凌於心慎齊曰妊娠心氣虛而血少亦足致此腰痛何松庵曰胞系於腎勞力任重致傷胞系則腰必痛甚則胞系欲脫多致小産宜安胎為主胎安而痛自愈若素享安逸而腰痛必房事不節致傷胞系也若脈緩遇天陰或久坐而痛者濕熱也腰重如帶物而冷者寒濕也脈大而痛不已者腎虛也脈澀而日輕夜重者氣血凝滯也脈浮者為風邪所乘脈實者閃挫也治法腎虛者青娥丸氣血凝滯者縮砂飲風邪大豆紫湯閃挫通氣散總以固胎為主汪石山曰婦人懷娠八月病腰痛不能轉側大便燥結此血滯血熱也四物加木香乳沒黃柏麻仁薛立齊曰前證若外邪所傷用獨活寄生物勞傷血氣八珍湯加杜仲砂仁膠艾脾腎不足前藥加白朮補骨脂氣血鬱滯紫蘇飲加枳桔肝火動小柴胡湯加白朮枳殼山梔肝脾鬱結歸脾湯加柴枳慎齊曰妊娠腰痛有外感有內傷松庵以勞力房事論治悉病機之要矣小腹痛大全曰妊娠小腹痛由胞絡虛風寒相搏痛甚令胎動慎齊曰小腹為足厥陰肝經部分是經或陰血不足或鬱怒氣滯皆足致小腹痛況胎繫於腎腎肝同原大全論風寒相搏止就外邪一端言之耳妊娠下血激經胞阻漏胎千金謂漏胞王叔和曰婦人月經下但微少寸口脈按之則滑身反灑淅不欲食頭痛心亂嘔吐此為有軀陽多氣溢陰滑氣盛設復陽盛當妊二胎今陽不足故令激經也婁全善曰妊娠經來不多飲食精神如故六脈和緩滑大無病也者血盛有餘也兒大能飲自不來矣有妊娠月信不斷而胎不損産科熊宗古曰婦人血盛氣衰月信來而胎不損若作漏胎治則胎必墜按激經者妊娠經信時至也叔和主陽微不足全善主血盛有餘宗古主血盛氣衰與漏胎迥別誤治則墮金匱曰妊娠下血腹中痛者為胞阻芎歸膠艾湯又婦人宿有癥病經斷未及三月漏下不止胎動在臍上者為癥痼害當下其癥桂枝茯苓丸主之眉批婁氏曰凡胎動多當臍今動在臍上故知是癥也愚按胞阻者謂有所阻於胞也金匱於腹中痛用芎歸膠艾取其養血溫經也於癥痼害用桂枝茯苓丸取去邪存正也陳良甫曰胎漏者由衝任脈虛不能約制手太陽少陰之經血故也懷妊之人經水不行者壅之以養胎也若衝任氣虛則胞內泄不能制其經血故月水時下亦名胞漏血盡則斃千金方曰妊娠下血名曰漏胞胞干便死宜用生地黃八兩清酒三升煮減半絞去滓服朱丹溪曰胞漏多因血熱然有氣虛血少者故良方論有服涼藥而下血益甚此脾氣虛而不能攝血也産寶曰胎息未實或因房室驚觸勞力過度傷動胞胎或因食毒物致令子宮虛滑經血淋漓若不急治敗血湊心子母難保産集曰婦人榮經有風則經血喜動以風勝故也榮經既為風所勝則所下者非養胎之血若作胎漏治強以藥滋之是實實也其胎終墮矣只以一藥治風經血可止或不服藥胎亦無恙榮經肝經也眉批漏胎用風藥亦是升舉肝氣使血不漏則胎自固不但疏風已也大全曰妊婦有宿疾子臟為風冷所乘氣血失度使胎不安致令下血也宿疾或癥瘕腹痛之類按以上五條序胎漏證也良甫以下三條主血虛氣虛屬內傷不足為病産集以下二條主風邪宿冷屬有餘客邪為病當分別治之方氏曰胎動胎漏皆下血而胎動有腹痛胎漏無腹痛為異爾故胎動宜行氣胎漏宜清熱心法云婦人經血孕則畜之以養胎産則變乳以養子倘妊婦忽然見紅名曰漏胎宜速治之不然血瀝多而胎不保也治法若因風熱動血者四物湯加防風黃芩丸二錢日二三服因怒動肝火者逍遙散加山梔黃芩血虛妄走者四物加膠艾茯苓蓮子脾虛不能攝血者歸脾加膠艾蓮子氣虛下陷者補中益氣湯去血太多者用八珍湯大補之若肝經有風下非胎血只服防風黃芩丸血下不止胞干便死急用千金法大全曰妊娠忽然下黃汁如膠或如豆汁胎動腹痛薛立齊曰前證若肝脾濕熱用升陽除濕湯肝脾風熱加味逍遙散肝脾鬱怒加味歸脾湯脾胃氣虛錢氏白朮散脾氣下陷補中益氣湯肝經風熱防風黃芩丸風入腸胃防風湯尿血李氏曰胎漏自人門下血尿血自尿門下血妊娠尿血屬胞熱者多四物加山梔發灰又方阿膠熟地大全云妊娠勞傷經絡有熱在內熱乘於血血得熱則流溢滲入於脬故令尿血眉批綱目云尿血之人皆從勞心斫長中來薛氏曰一娠婦因怒尿血內熱作渴寒熱往來胞乳間作脹脈弦弱此肝經血虛而熱也用加味逍遙散六味地黃丸兼服漸愈又用八珍湯加柴胡丹皮山梔痊治法因怒動火者小柴胡湯加山梔因勞動火者補中湯因厚味炙物宜清胃散加犀角連翹甘草因肝經血熱加味逍遙散心法云妊娠尿血不必驚慌方用斷續湯或膠地湯有血熱流滲於脬即為血淋用葵子一升研煮二升分三次服慎齊曰尿血易混於胎漏得李氏一辨已見分析但胎漏有無時頻出尿血是熱入膀胱本心經有火移小腸滲入膀胱溺時則下不溺則不下即是小便溺血但屬妊娠為異耳大小便不通大全曰妊娠血壅胎元臟腑之氣不通鬱而化熱大腸熱則大便不通小腸熱則小便不利大小腸俱熱則二便俱不通更推其因而藥之薛氏曰大腸血燥四物加條芩桃仁大腸氣滯紫蘇飲加杏仁條芩腸胃氣虛六君加紫蘇杏仁肝脾蘊熱龍膽瀉肝湯心肝虛熱加味逍遙散加車前子薛立齊治李亞卿側室妊娠患此或用降火理氣之劑元氣反虛肝脈弦急脾脈遲滯面青黃不澤曰此鬱怒所致也用加味歸脾湯為主佐以加味逍遙散而安此案獨其隻眼又治王主政內妊娠痢疾後患此用清熱之劑未效診其脈浮大而澀此氣血虛也朝用八珍湯加桃仁杏仁夕用加味逍遙加車前子而痊小便不通子淋轉胞遺尿大全云妊娠小便不通為小腸有熱傳於胞而不通耳若兼心肺氣滯則多喘急陳無擇云妊娠胎滿逼胞多致小便不利若心腎氣虛清濁相干則為諸淋若胞系了戾小便不通名曰轉胞若胎滿尿出名曰遺尿産寶曰腎者作強之官與膀胱為表裡男子藏精女子系胞妊娠淋者腎虛而膀胱有熱也腎虛不能制水則小便數客熱膀胱則水道澀而數淋瀝不宣名曰子淋地膚湯主之陳良甫曰孕婦小便澀少由氣血聚養胎元不及敷榮滲道遂使膀胱鬱熱法當養血以榮滲道利小便以導鬱熱用歸芍調血人參補氣麥冬清肺以滋腎水之源滑石通草利小便以清鬱滯名安榮散方內滑石恐墜胎若臨月極妙否則宜去此味加石斛山梔尤穩萬密齊曰子淋須分二證一則妊母自病一則子為母病然妊母自病又分二證或食辛熱生內熱者或自汗自利津液燥者子為母病亦分二證或胎氣熱壅者或胎形迫塞者證既不同治亦有別大抵熱則清之燥則潤之壅則通之塞則行之此治法也薛立齊曰妊娠小便淋漓用安榮散若肝經濕熱龍膽瀉肝湯肝經虛熱加味逍遙散若服燥劑而小便頻數或色黃四物用生地加知柏五味麥冬元參若肺氣虛而短少補中湯加山藥麥冬熱結膀胱而不利五淋散脾肺燥不能生化黃芩清肺飲膀胱陰虛陽無所生滋腎丸膀胱陽虛陰無所化腎氣丸慎齊曰淋有五丹溪一主於熱若妊娠淋病産寶良方以虛熱鬱熱屬之膀胱立齊又推原肝經有濕熱虛熱之別正以膀胱為藏溺之器而出溺之竅則為足厥陰之部分故欲清膀胱之熱必兼疏厥陰之氣也甲乙經曰轉胞不得溺少腹滿關元主之又曰小便難水脹溺出少胞轉曲骨主之金匱曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈腎氣丸主之眉批薛立齊治一婦用八味丸加車前子而愈探源於此此取氣化能出之義蓋經旨也此痛指臨圊小便作痛非小腹痛也若作小腹痛則巢氏明明有臍下急痛小便不通等症觀書者當詳審證治要訣云胞即膀胱也胎漸長且近下胞為胎逼而側故名轉胞與子淋相類但小便頻數點滴而痛者為子淋頻數出少不痛者為轉胞間有微痛終與子淋不同並宜生料五積散五苓散加阿膠聖濟録云胞受水液氣不轉行則小腸滿脹或飽食用力或因合陰陽令胞屈闢其候水道不通小腹急痛煩悶汗出氣逆奔迫甚則欲死名曰轉胞宜速治之眉批飽食則氣傷胎素弱不能自舉而下墜巢氏曰胞轉者臍下急痛小便不通是也其病由不同胞轉及胞落並致死楊仁齊曰凡強忍小便或尿急疾走或飽食忍尿或忍尿入房使水氣上逆氣逼於胞胞落即殂王海藏曰此疾非利藥所能利法當治其氣則愈沉香木香湯主之徐春甫曰轉胞由脬為熱所迫外水應入不得入內溲應出不得出內外壅滯脹滿不通故令脬轉其狀小腹急痛不得小便甚者致死趙養葵曰轉胞由中氣虛怯不能舉胎胎壓其胞所致以補氣藥中加升舉之品如補中湯加減之類是也眉批慎齊曰胎前轉胞大抵由氣虛血少血少則胎無以養氣虛則胎不能舉因下墜而壓於膀胱胞為之轉先生用補氣養血為主誠為探原之論獨具隻眼吐法絶妙所謂上氣泄則下氣得通也朱丹溪曰轉胞由氣血虛弱不能上載其胎下壓膀胱胎若舉起懸在中央胞系得疏水道自行法當補血養氣氣血既旺胎舉而安方用參朮陳皮炙草歸芍半夏生薑濃煎與四帖任其叫啖次早又與四帖渣作一帖頓飲之探喉令吐小便通皆黑水就此方加大腹皮枳殼砂仁青蔥二十劑以安之此病稟受弱者憂悶多者性急躁者食厚味者大率有之眉批憂悶則氣鬱而停飲故令墜胞又法令老婦香油塗手自産戶托起其胎出宿溺卻以大劑參耆服之又法健人同病婦皆仰臥兩隻相對健人以雙足抵病人足頻頻細聳令病人身亦細聳則胎且細聳而上胞不了戾而小便自通眉批此法甚妙然通後亦當以大劑參耆服之又法將病婦兩足倒提向上如是數次溺亦隨通眉批此法平人甚妙若妊婦恐不可用薛立齊曰此證悉如丹溪治法為當推廣言之又有脾肺氣虛不能下輸膀胱者有氣熱鬱結膀胱津液不利者有金為火爍脾土濕熱甚而不利者更當詳審施治妊娠遺尿屬脾肺氣虛脾主輸布肺主治節虛則氣弱而溲弱自遺宜補中益氣薛氏曰若脬中有熱加味逍遙散脾肺氣虛補中益氣湯加益智肝腎陰虛六味丸一妊婦遺尿內熱肝脈洪數按之微弱或兩太陽痛脅肋痛脹以肝火血虛用加味逍遙散六味丸尋愈後又寒熱恚怒前證復作用八珍逍遙散兼清肝火養肝血愈附方惡阻千金半夏茯苓湯治妊娠脾胃虛弱嘔吐不食製半夏赤茯苓一錢人參熟地川芎白芍五分酒炒橘皮一錢細辛半分紫蘇五分桔梗五分甘草三分上加生薑一斤水煎空心服數劑後服茯苓丸脾虛淡滯倍加白朮砂仁痰實去熟地川芎白芍細辛加旋覆花內熱去細辛加黃芩客熱煩渴去細辛加前胡知母胸滿去地黃倍紫蘇眉批妊娠經閉血凝水停心下則腎燥故用細辛行水以潤之若無痰水內停此味辛散不可輕用千金茯苓丸治妊娠心中煩悶吐痰眩暈赤苓製半夏陳皮一兩甘草炙二兩人參一兩白朮二兩炮姜桂心一兩葛根枳殼麩炒二兩上為細末煉蜜丸桐子大每服五十丸空心米飲下日三服一方加麥冬肘後方加五味子陳皮半夏湯治胎氣始盛逆動胃氣嘔吐不進飲食陳皮鹽水炒去白茯苓各五錢製半夏一錢半子芩薑汁炒枳殼麩炒紫蘇各八分炙草五分生薑二片水一鍾煎七分食遠溫服眉批此方足矣縮砂二陳湯治妊娠脾胃虛弱嘔吐半夏陳皮一錢茯苓二錢炙草五分砂仁炒一錢加生薑二片棗一枚烏梅肉少許水煎服眉批此方有辛散酸收之妙參橘飲楊振治妊娠吐逆痰水心虛煩悶四君加陳皮厚朴麥冬上加生薑竹茹水煎服眉批不用半夏重在心虛煩悶故用麥冬竹茹上方去茯苓甘草麥冬名橘皮湯治惡阻不下食武叔卿曰惡阻惡食責之脾虛嘔吐責之有火所謂諸逆於上皆屬於火也此方竹茹能平少火厚朴能下逆氣橘皮生薑所以開胃人參白朮所以益脾開胃益脾欲其安穀云爾人參半夏丸仲景治妊娠惡阻胸腹冷痛人參製半夏乾薑各五錢上為末生地汁浸蒸餅為丸桐子大每服四十丸米飲下眉批生地汁浸不特製半夏之燥而又不傷血分妙王子亨白朮散治妊娠嘔吐清水十餘日水漿不入者白朮人參甘草丁香上丁香飯丸三味加生薑煎湯送食前溫服此方亦治胃寒心腹痛上方去白朮甘草加藿香即局方人參丁香散治嘔吐心腹刺痛眉批不用半夏齊士明醒脾飲治妊娠嘔逆不食甚者中滿眉批醒脾二字足以盡之草豆蔻濕紙裹灰火中煨紙干取出去皮用厚朴薑汁各半兩乾薑一兩甘草一兩二錢半上為細末每服二錢水一盞棗二枚生薑三片煎八分呷服病輕者只一二服便能食眉批不用半夏白朮散治妊娠胎氣不和不進飲食炒白朮人參紫蘇各一錢青皮去白川芎訶子各八分炙草五分加生薑二斤水煎服縮砂散縮砂仁為末每服二錢生薑或米飲調下蘆根湯治相火上衝煩熱嘔吐生蘆根橘紅生薑大腹皮枇杷葉又方蘆根竹茹麥冬橘紅前胡體熱加地骨眉批以上皆不用半夏歸原散治妊娠惡阻諸藥不效者八珍去熟地加半夏陳皮丁香枳殼桔梗眉批此方用半夏子煩竹葉湯白茯苓三錢麥冬去心防風黃芩各二錢加竹茹十片水煎服無時一方有知母無黃芩一方有人參無黃芩知母飲治妊娠心脾壅熱咽膈渴苦煩悶多驚知母麥冬去心赤芍各一錢半黃芩黃耆各二錢甘草一錢上水二鍾入桑皮半錢煎一盞再入竹瀝些少同煎二三沸服無時眉批壅熱用耆要知是虛非實知母丸治妊娠固服藥致胎氣不安有似虛煩不得眠巢氏謂之子煩也醫者不知作虛煩治之損動胎氣宜矣知母焙洗二兩為細末棗肉丸彈子大每服一丸煎人參湯下麥門冬湯麥冬去心白茯苓防風各三錢人參一錢半加生薑一片淡竹葉十片煎服無時血虛者加生地白芍桑寄生生蘆根柴胡散治妊娠頭目昏重心胸煩悶不思飲食柴胡一兩半赤苓麥冬各一兩錢枇杷葉人參橘紅甘草各半兩㕮咀每服四錢水一盞姜三片煎七分服當歸飲當歸二錢川芎阿膠寄生豆豉各一錢蔥白七錢水煎溫服眉批用蔥豉川芎散熱又是一法竹茹湯淡青竹刮茹一兩水一升煮以四合徐徐服盡為度眉批清心涼肝妙劑又方治孕婦壅熱心神煩躁口舌乾渴人參知母梔子炒麥冬各一錢甘草條芩各五錢瓜蔞根犀角各八分棗水煎或加竹茹又方治嘔吐不食胸中煩躁人參麥冬梔子炒知母葛根蘆根各一錢竹茹一丸蔥白三寸葛根飲治妊娠煩渴口乾身熱家葛根子芩人參玉竹黃耆麥冬去心甘草竹茹渴甚加竹葉黃耆六一湯黃耆六錢甘草一錢治煩躁口渴良又方治口乾不得臥黃連為細末每服一錢粥飲調下子懸嚴氏紫蘇飲治妊娠胎氣上逆脹滿疼痛兼治臨産氣結連日不下一方無川芎名七寶散紫蘇一兩陳皮大腹皮人參各五錢當歸七錢半川芎半兩白芍半兩甘草二錢半上銼分三服每服水盞半生薑四片蔥白七寸煎七分空心服此神效方也訶黎勒散治妊婦心腹脹滿氣衝胸膈煩悶不思飲食訶黎勒赤苓前胡各一兩陳皮大腹皮桑皮各七錢半枳殼川芎白朮各半兩上為末每服四錢姜三片棗一枚水煮服眉批白朮宜少用枳殼湯治婦人妊娠腹脹枳殼黃芩如腹滿身重加白朮一兩蔥白湯治胎上逼心煩悶蔥白二七莖濃煎飲若胎未死即安已死即出未效再服婁全善曰此方神效脈浮滑者宜之眉批蔥白安胎人所未知艾醋煎治胎動上逼心痛艾葉雞子大頭醋四升煎二升半溫服當歸湯治胎動衝心煩悶欲死當歸川芎人參阿膠炙草各兩半連須蔥白一握上銼水二升煎四味至升半去滓下蔥再煎減三合阿膠溫服一劑眉批一劑分二三服仲景附子湯附子白朮茯苓白芍人參子腫子氣全生白朮散治妊娠面目虛浮如水腫狀白朮二錢半茯苓皮一錢半陳皮姜皮大腹皮桑白皮一錢本方去白朮指迷五皮散葶藶散崔氏治妊娠遍身浮腫葶藶子桑白皮澤瀉各二兩茯苓枳殼白朮各六兩上水六升取二升半分溫二服小便利即差眉批一方無澤瀉枳殼有郁李仁此方補脾瀉肺利大腸千金鯉魚湯治妊娠腹脹滿或渾身浮腫小便赤澀當歸白芍各一錢白茯苓一錢白朮二錢橘紅五分鯉魚一尾將鯉魚去鱗腸白水煮熱去魚用汁一盞半入生薑三片煎至一盞空心服胎水即下如未盡腹悶未除再服眉批鯉魚治懷妊身腫及胎氣不安煮食又下水氣利小便崔氏防己湯治妊娠遍身浮腫腹脹喘促小便不利木防己一錢半桑白皮炒紫蘇赤苓各二錢木香五分上加生薑四片煎服如大便不通加枳殼檳榔天仙藤散治妊娠三月足腫至膝喘悶妨食狀如水氣甚足指間出黃水者此方得於宋時李伯時家傳天仙藤用水川即青木香藤陳皮香附炒甘草烏藥木瓜各等分生薑三片紫蘇三莖日三服腫消止喘眉批天仙藤散即香附散元豐中淮南陳景初名醫獨論此症制香附散至李伯時名天仙藤散崔氏苓朮湯療妊娠有水氣心腹急滿茯苓白朮各四兩旋覆花二兩杏仁黃芩各三兩上水七升煮二升半分溫三服忌桃李腎著湯治妊娠腰腳腫茯苓白朮各二錢乾薑炮甘草各一錢杏仁錢半平胃散治妊娠腳腫脾衰不能制水血化成水所致蒼朮厚朴陳皮枳殼甘草加薑棗或紫蘇子和治腫小便不利用豬苓水調多濕丹溪用山梔末米飲下葵苓散仲景治妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子炒半升茯苓三兩為末服方寸匕日三服小便利則愈心腹痛子痛川芎散治妊娠素有冷氣忽心腹痛如刀刺川芎當歸各一錢白芍七分半人參五分茯苓四錢甘草二分吳萸厚朴薑製各五分枳殼二分桔梗四分水煎熱服當歸芍藥散仲景治妊娠腹中㽲痛元和紀用經名六氣經緯丸安期先生賜李少君久餌之藥後仲景增減兩數治婦人懷妊腹中痛白芍炒四兩當歸茯苓白朮各二兩澤瀉川芎各一兩上為細末每服二錢食前溫服眉批産後忌芍藥而此方兼治以為君愚謂産後暈去血過多者可用若惡露不行作痛者不可用阿膠散治妊娠胎動腹中㽲痛不思飲食當歸炒陳皮各一兩白朮茯苓阿膠炒川芎各七錢半甘草二錢半上㕮咀每服三錢水一盞姜三片棗一枚煎七分服又方當歸三兩川芎阿膠人參厚朴各一錢蔥白切一升上㕮咀水七升煎三升分三服一方有甘草無厚朴川芎香術丸治妊五月後胸腹間氣刺滿痛或腸鳴甚至嘔逆此由憂慮所致也蔡元度寵人有子夫人怒欲逐之遂病醫官王師復處此方三服而愈廣茂炒一兩丁香半兩粉草二錢半上為末空心鹽湯點服一天一錢覺腸中如物按下之狀愈原方作散有木香古今録驗方治妊娠腹內冷痛忽胎動薤白一升當歸切四兩水五升煮取四升作三服一方治腹痛不可忍胎欲落上等銀二斤茅根二斤水九升煮銀取五升入清酒一升同煎茅根取三升分一服立安眉批鎮墜解熱方法俱妙於體強暴病者可用血熱血虛腹痛若此方甚妙一方治妊娠腹痛生地三斤取汁酒一升煎減半頓服愈一方孕四五月腹㽲痛大紅棗十四枚炒黑鹽一錢炒紅為末取一攝酒調服愈一方棗十四枚燒存性為末童便調下地黃當歸湯潔古治婦人胎痛當歸一兩熟地二兩加味四物湯治血少胎痛四物加香附為末每三錢紫蘇湯下眉批血虛痛妙丹溪方治胎痛不可近發熱惡食須安胎散滯氣青皮三錢黃芩白芍各二錢歸尾一錢半川芎一錢木香五分甘草炙少許加苧根兩大片補遺手拈散四七湯加歸芍四磨湯小烏沉湯以上諸方皆可選用安胎和氣飲治胎冷腹痛引兩脅小便頻數大便虛滑訶子即訶黎勒麥煨去核白朮各二錢陳皮去白高良薑炒木香白芍陳米甘草炙各一錢加生薑五片水煎服生冷之物心痛方火龍散治妊娠心氣疼川楝子茴香炒各三錢艾葉鹽炒一錢半水煎服無時産寶方川芎當歸茯苓厚朴千金方青竹茹一升羊脂八兩白蜜三兩上三味合煎每服棗核大三枚食前頓服日三服眉批按此可治燥熱心痛炮炙論云心痛欲死急覓延胡腰痛方通氣散治妊娠腰痛不可忍破故紙瓦上炒香為末空心嚼胡桃肉一枚溫酒調下末三錢五加皮散治妊娠腰痛不可忍先服此杜仲四兩五加皮阿膠炙另入防風狗脊川芎白芍細辛萆薢各三兩杏仁八十個去皮尖炒上㕮咀水九升煮二升去滓下膠作三服五加皮丸服前散後服此眉批此與前方不甚相遠而以杏仁易訶子通塞不同者審之續斷炒杜仲各二兩半川芎獨活各三兩五加皮狗脊萆薢白芍訶子各四兩上為末煉蜜丸桐子大每服四十丸空心酒下日三服眉批通塞不同用者審之當歸蔥白湯療妊娠氣壅攻腰痛不可忍兼治腹痛當歸二兩阿膠甘草各二兩蔥白切二升溫分三服小品苧根湯療損動胎腰腹痛去血胎動向下生地苧根各二兩當歸白芍阿膠甘草各二兩上銼水六升煮二升去渣內膠煎煬分溫三服大地黃丸治産後腰腹疼一切血疼兼治血氣虛四肢不舉骨體熱疼熟地黃二兩烏梅肉當歸各一兩上為末煉蜜丸彈子大每一丸空心白湯嚼下眉批此方不特産前後妙即平日血虛內熱者亦宜紫酒大黑豆二合炒令香熟酒一大盞煮取七分去豆空心頓服小腹痛方當歸川芎各八分阿膠炙人參艾葉各四分茯苓一錢大棗二十枚水五升煮三升溫分三服妊娠下血方加減膠艾湯治胎動漏血有效阿膠炒成珠一錢艾葉一分當歸川芎白芍炒地榆各一錢甘草一分水煎空心服漏血多起於氣腦血逆火動之故可加炒黃芩炒香附炒砂仁研細同煎要墮者前方去榆艾加白朮黃芩杜續熟地氣虛加人參黃耆之類當歸寄生湯治妊娠胎漏非時下血當歸川芎艾葉白朮各一錢人參桑寄生續斷熟地水煎空心溫服二黃散治婦人胎漏下血生熟二地等分為末每服二錢煎白朮枳殼湯食前調服眉批白朮枳殼煎湯調地黃末意見超卓阿膠散治妊娠無故卒然下血阿膠蛤粉炒成珠二兩為末生地半斤搗汁上清水三升攪勻溫分三服枳殼湯枳殼炒五錢白朮一兩黃芩五錢水煎食前溫服防風黃芩丸治肝經有風熱致血不歸經條芩炒防風上為末酒糊丸桐子大每服三五十丸食遠米飲下眉批防風治風黃芩治熱仲景桂枝茯苓丸治妊娠下血宿有癥病桂枝茯苓丹皮桃仁炒白芍各等分上為丸煉蜜丸兔屎大每食煎服一丸不愈加至三丸眉批凡遇此症最宜斟酌本事方治漏血不止取樹上瘤桃燒灰和水服瘥本草云桃奴破血又治伏梁氣積大全方治妊娠忽下黃汁或如豆汁胎動腹痛黃耆炒六兩糯米五合水七升取二升分四服銀苧酒治妊娠下黃汁或如赤豆白苧根去黑皮切二兩銀五兩水酒各一大盞煎服眉批黃赤為熱故用苧根以涼之下黃赤為疏氣之疏泄故重用銀以鎮之尿血方續斷湯治妊娠下血及尿血續斷五錢當歸一兩生地一兩赤芍二錢半上為末每服二錢空心蔥白湯調下姜蜜湯治妊娠小便尿血生薑七片蜜半盞白茅根一握濃煎服加減五苓散本方去桂加阿膠炒同為粗末每服四錢用車前子白茅根濃煎溫服一方葵子一升研細水五升煮三升分溫三服一方白茅根濃煎吞酒蒸黃連丸一方龍骨一兩蒲黃半兩為末每服二錢酒調日三服大小便不通方大腹皮散大腹皮赤苓枳殼各一兩甘草炙一錢上為細末每服二錢濃煎蔥白湯調下一方入郁李仁錢半水煎空心連服以通為度如不通必六腑熱祕用枳殼錢半大黃炮二錢炙草一錢研細末作三服濃煎蔥白湯調下又方治妊娠風氣大便祕澀麩炒枳殼三兩防風二兩炙草一兩上為末每服一二錢空心白滾湯調服日三次又方治虛羸大便祕枳殼阿膠炒各等分上為末煉蜜丸桐子大滑石末為衣溫湯下二十丸未通加至五十丸葵子湯治妊娠大小便不利安胎除熱葵子三升滑石四兩碎水五升煮一升去渣盡服須臾當下便愈小便不通方轉胞子淋遺尿冬葵子散治孕婦轉胞小便不通及男子小便不通皆效冬葵子山梔炒滑石各五錢木通三錢水煎空心溫服外以冬葵子滑石梔子為末田螺肉搗膏或蔥汁調膏貼臍中立通眉批當歸貝母苦參丸仲景治妊娠小便難飲食如故當歸貝母苦參上為末蜜丸小豆大飲服三丸加至十丸全生茯苓散治妊娠小便不通赤苓冬葵子各等分水煎空心服濟生云如小便不通恐是轉胞加發灰少許極效眉批發灰能使氣血上行故轉胞加之妙獨聖散蔓荊子為末每服二錢食前濃煎蔥白湯調下眉批蔓荊涼諸經之血其性上行有升舉之意五淋散治孕婦熱結膀胱小便淋瀝赤芍山梔各二錢當歸一錢子芩六分甘草梢五分赤苓二錢子淋散治妊娠小便澀痛麥冬赤苓大腹皮木通甘草梢淡竹葉等分安榮散治子淋麥冬通草滑石人參細辛各三錢當歸酒浸燈草甘草各五錢上為末每服二錢麥冬湯調下眉批此用細辛自有深意蓋腎苦燥故用辛以潤之欲使天降之陰沛然於陰分也一方無滑石燈心有車前萹蓄滑石太重胎前慎之加味木通湯治妊婦奉養太厚喜食炙煿酒面辛熱之物致內熱小便赤澀作痛者木通生地赤芍條芩甘草梢各等分淡竹葉十二片冬葵子湯治婦素淡滋味小便澀痛此胎熱也冬葵子一兩赤芍條芩各五錢赤苓車前子上為末每服二錢米飲調服或是轉胞加發灰極效地膚子湯治孕婦小便澀數名曰子淋地膚子車前子知母黃芩赤芍白芍枳殼麩炒升麻通草甘草梢炙各二分眉批此方寓升於降妙地膚大黃湯治子淋宜下大黃炒地膚草各三兩知母黃芩炒豬苓赤芍通草升麻枳實炒甘草各三兩每服四五錢水煎服眉批此治實熱而淋者大便通則小便自利矣忘憂散治娠婦心經蘊熱小便赤澀淋漓作痛琥珀五分研細末萱草根一握濃煎調末服白薇散治妊娠尿出不知白薇白芍各等分上為末每服三錢食前溫酒調服眉批本草謂芍藥白補赤瀉蓋金收而火散也故子淋方中多用赤而遺尿方多用白也桑螵蛸散治妊娠小便不禁桑螵蛸炙黃二十枚上為末每服二錢空心米飲調下一方益智為末米飲下亦效
